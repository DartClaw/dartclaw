[mcp_servers.chrome-devtools]
args = [
    "chrome-devtools-mcp@latest",
    "--headless",
    "--isolated",
    "--chromeArg=--no-sandbox",
    "--chromeArg=--disable-setuid-sandbox",
    "--chromeArg=--disable-dev-shm-usage",
]
command = "npx"

[mcp_servers.dart]
args = ["mcp-server"]
command = "dart"

[features]
hooks = true

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = "bash -lc 'cd \"$(git rev-parse --show-toplevel)\" && dart format --line-length=120 . >/dev/null && printf \"{}\"'"
timeout = 120
statusMessage = "Running dart format..."
