name: plan-and-implement-inline
description: >-
  Inline variant of plan-and-implement – same multi-story pipeline, but runs
  directly on the current branch in the live checkout: no integration branch,
  no per-story worktrees, no merge-back. Stories execute sequentially because
  parallel sessions in a shared checkout would clobber each other.
variables:
  FEATURE:
    required: true
    description: "Path to a PRD or path hint pointing at one – plan-and-implement requires an existing PRD"
  PROJECT:
    required: false
    description: Target project for coding steps (omit for default project)
  BRANCH:
    required: false
    description: >-
      Injected by run.sh from the operator's current branch. Not consumed by
      this workflow – review prompts scope by the FIS, not by branch diff,
      because inline mode has no synthetic base ref.
    default: ""

project: "{{PROJECT}}"

gitStrategy:
  integrationBranch: false
  worktree: inline
  # Inline mode runs in the live checkout. Don't auto-commit generated artifacts –
  # the operator owns the commit boundary on their working branch. There is no
  # integration branch to abandon and no auto-commit boundary, so a mid-pipeline
  # crash leaves PRD / plan / FIS / code edits intermixed with operator state in
  # the working tree; recovery is manual (operator stages or discards the partial
  # output and re-runs). Use the worktree-isolated `plan-and-implement` for any
  # batch where uncommitted-state risk is unacceptable.
  artifacts:
    commit: false

stepDefaults:
  - match: "plan"
    provider: "@planner"
    model: "@planner"
  - match: "revise*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate*"
    provider: "@executor"
    model: "@executor"
  - match: "simplify-code"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  - id: discover-plan-state
    name: Discover Plan State
    skill: dartclaw-discover-andthen-plan
    allowedTools: [shell, file_read]
    # FEATURE is auto-framed as a <FEATURE> data tag (untrusted
    # input). Never reference {{FEATURE}} inline – that would suppress
    # auto-framing and route attacker-controlled text through as instructions.
    workflowVariables: [FEATURE]
    outputs:
      prd:
        format: path
        resolver: filesystem
        pathPattern: '**/*prd.md'
        preferPatterns: ['prd.md']
        description: Workspace-relative path to the required PRD on disk.
      plan:
        format: path
        resolver: filesystem
        pathPattern: '**/*plan.{json,md}'
        preferPatterns: ['plan.json', 'plan.md']
        description: "Workspace-relative path to plan.json (preferred) or plan.md (legacy) on disk; empty when no plan exists yet."
      story_specs: story_specs

  - id: plan
    name: Plan Stories and Specs
    skill: andthen:plan
    entryGate: "plan == null || plan == '' || story_specs == null || story_specs.items == null"
    # `prd` is interpolated inline as the skill argument; only `plan` needs
    # auto-framing (reuse-vs-synthesize signal, not referenced in the prompt).
    inputs: [plan]
    onFailure: retry
    maxRetries: 1
    prompt: "--auto {{context.prd}}"
    outputs:
      story_specs: story_specs
      plan:
        format: path
        resolver: filesystem
        pathPattern: '**/*plan.{json,md}'
        preferPatterns: ['plan.json', 'plan.md']
        description: "Workspace-relative path to plan.json (preferred) or plan.md (legacy) on disk; empty when no plan exists yet."

  - id: story-pipeline
    name: Per-Story Pipeline
    type: foreach
    map_over: story_specs
    max_parallel: 1
    onFailure: continue
    outputs:
      story_results:
        format: json
    steps:
      # The shared runtime review dir is pre-created; story-specific dirs are
      # not knowable before foreach iteration.
      - id: revise-story-spec
        name: Revise Story Spec (low confidence)
        skill: andthen:review
        entryGate: "map.item.spec_source == synthesized && map.item.spec_confidence > 0 && map.item.spec_confidence < 7"
        prompt: >-
          --mode doc --fix --auto
          --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR"
          {{map.item.spec_path}}

      - id: implement
        name: Implement Story
        skill: andthen:exec-spec
        # No allowedTools grant here (unlike the built-in): the maintainer profile
        # runs under a broader permission mode, so mutating steps in the inline
        # customs deliberately omit per-tool allowlists.
        maxRetries: 1
        prompt: "--auto {{map.item.spec_path}}"
        outputs:
          story_result:
            schema: narrative_text
            description: Per-story result for this work item only. Report success when scoped acceptance checks pass; unrelated sibling or baseline failures are non-blocking and should be named as external context, not as this story's failure.

      - id: simplify-code
        name: Simplify Story Code
        skill: andthen:simplify-code
        # Per-iteration session isolation is structural – foreach_iteration_runner
        # builds a fresh iterContext per iteration so iteration N+1's
        # continueSession cannot resolve to iteration N's session. See the
        # matching note in the built-in plan-and-implement.yaml.
        provider: "@executor"
        model: "@executor"
        continueSession: true
        # Best-effort cleanup: a red baseline or advisory blockage should not
        # prevent independent story execution or plan-level review.
        onFailure: continue
        prompt: >-
          --auto simplify only the changes for this story; preserve
          behavior; no scope creep into other packages.

      # Per-story review: catch intent-drift + code/security defects in this
      # story before integration, instead of deferring everything to the
      # diffuse whole-plan pass. Writes bare canonical review keys into the
      # per-iteration context that the nested loop's exit gate reads.
      - id: review-story
        name: Review Story
        skill: andthen:review
        allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
        inputs: [story_result]
        prompt: >-
          --mode gap,code,security --auto
          --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR"
          Review the implementation of {{map.item.spec_path}}. Scope strictly
          to this story's FIS; the live checkout may contain unrelated operator
          work, so do not flag it.
        outputs:
          review_report_path: review_report_path
          findings_count: findings_count
          gating_findings_count: gating_findings_count

      # Per-story converging review→remediate→re-review loop. Runs against this
      # foreach item's context only; its review outputs never leak to the
      # plan-level context (the loop step declares no outputs:).
      - id: story-remediation
        name: Story Remediation Loop
        type: loop
        maxIterations: 3
        # On exhaustion with residual gating findings, escalate the story to
        # needs-review (pause for approval) instead of hard-failing it — the
        # foreach-nested counterpart to the top-level loop's onMaxIterations: continue.
        onMaxIterations: escalate
        entryGate: "gating_findings_count > 0"
        exitGate: "gating_findings_count == 0"
        steps:
          - id: remediate-story
            name: Remediate Story Findings
            skill: andthen:remediate-findings
            prompt: "--auto {{context.review_report_path}}"
            outputs:
              remediation_summary:
                schema: narrative_text
                description: Summary of what was changed during this remediation pass.
          - id: re-review-story
            name: Re-review Story
            skill: andthen:review
            allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
            inputs: [story_result, remediation_summary]
            prompt: >-
              --mode gap,code,security --auto
              --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR"
              Review the implementation of {{map.item.spec_path}}. Scope
              strictly to this story's FIS; the live checkout may contain
              unrelated operator work, so do not flag it.
            outputs:
              review_report_path: review_report_path
              findings_count: findings_count
              gating_findings_count: gating_findings_count

  - id: plan-review
    name: Review Full Implementation
    skill: andthen:review
    parallel: true
    onFailure: retry
    maxRetries: 1
    inputs: [story_specs, story_results]
    allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
    prompt: >-
      --mode gap --auto
      --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR"
      Review implementation of {{context.plan}}. Scope by the plan and
      per-story FIS – assess only the working-tree state implementing this
      plan; the live checkout may contain unrelated operator work, so do
      not flag it.
    outputs:
      plan-review.review_report_path: review_report_path
      plan-review.findings_count: findings_count
      plan-review.gating_findings_count: gating_findings_count

  - id: plan-review-council
    name: Review Full Implementation with Council
    skill: andthen:review
    parallel: true
    # Advisory extra-perspective pass: the codex plan-review + architecture-review
    # carry the gating signal, and the council writes its report to the reviews
    # output-dir regardless. A council flake (provider stall, output-capture edge
    # case) must not abort the whole milestone, so continue past its failure
    # rather than failing the parallel barrier.
    onFailure: continue
    maxRetries: 1
    provider: claude
    model: opus[1m]
    effort: xhigh
    inputs: [story_specs, story_results]
    allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
    prompt: >-
      --mode code,security --council --auto
      --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR"
      Review implementation of {{context.plan}}. Scope by the plan and
      per-story FIS – assess only the working-tree state implementing this
      plan; the live checkout may contain unrelated operator work, so do
      not flag it.
    outputs:
      plan-review-council.review_report_path: review_report_path
      plan-review-council.findings_count: findings_count
      plan-review-council.gating_findings_count: gating_findings_count

  - id: architecture-review
    name: Architecture Review
    skill: andthen:architecture
    parallel: true
    onFailure: retry
    maxRetries: 1
    inputs: [story_specs, story_results]
    allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
    prompt: >-
      --mode review --auto
      --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR"
      {{context.plan}}. Scope by the plan and
      per-story FIS – review only packages this plan touched in the
      working tree; ignore unrelated operator work in other parts of the
      live checkout.
    outputs:
      architecture-review.review_report_path: review_report_path
      architecture-review.findings_count: findings_count
      architecture-review.gating_findings_count: gating_findings_count

  - id: review-aggregate
    name: Aggregate Review Findings
    type: aggregate-reviews
    aggregateReviews: [plan-review, plan-review-council, architecture-review]
    outputs:
      review_report_path: review_report_path
      findings_count: findings_count
      gating_findings_count: gating_findings_count

  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 5
    entryGate: "gating_findings_count > 0"
    exitGate: "gating_findings_count == 0"
    # On exhaustion, fall through to the deterministic verify-all → verify-fix-loop
    # gate below instead of failing the run; that gate mechanically resolves
    # guardrail-class residue and is the genuine fail point if it cannot.
    onMaxIterations: continue
    steps:
      - id: remediate
        name: Remediate Findings
        skill: andthen:remediate-findings
        entryGate: "gating_findings_count > 0"
        inputs: [story_results]
        prompt: "--auto {{context.review_report_path}}"
        outputs:
          remediation_summary:
            schema: narrative_text
            description: Summary of what was changed during this remediation pass.

      - id: re-review
        name: Re-review After Remediation
        skill: andthen:review
        allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
        inputs: [story_specs, story_results, remediation_summary]
        prompt: >-
          --mode gap,code,security --auto
          --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR"
          Review implementation of {{context.plan}}. Scope by the plan
          and per-story FIS – assess only the working-tree state
          implementing this plan; the live checkout may contain unrelated
          operator work, so do not flag it.
        outputs:
          review_report_path: review_report_path
          findings_count: findings_count
          gating_findings_count: gating_findings_count

  # --- Deterministic verification gate ----------------------------------------
  # After the review/remediation loop, run the CI-equivalent gates as a
  # deterministic bash step. Unlike the
  # skill-driven steps above, these don't depend on an agent choosing to run
  # verification: verify-gate.sh runs fixed commands, captures output under the
  # run artifacts dir, and prints `pass`/`fail` that the fix loop branches on.
  #
  # Bash steps execute on the host with a sandboxed workdir (<dataDir>/workspace);
  # verify-gate.sh lives at <dataDir>/workflows/custom (committed under
  # .dartclaw/workflows/custom/) and locates the repo itself.
  - id: verify-all
    name: Verify CI Gate
    type: bash
    timeout: 90m
    script: >-
      bash ../workflows/custom/scripts/verify-gate.sh all
      {{workflow.runtime_artifacts_dir}}
    outputs:
      verify-all.result: text

  - id: verify-fix-loop
    name: Verification Fix Loop
    type: loop
    maxIterations: 3
    entryGate: "verify-all.result == fail"
    exitGate: "verify-recheck.result == pass"
    steps:
      - id: fix-verification
        name: Fix Verification Failures
        skill: andthen:triage
        provider: "@executor"
        model: "@executor"
        prompt: >-
          --auto The deterministic verification gate failed. Read the failure
          logs under {{workflow.runtime_artifacts_dir}}/verify/ (format.log,
          analyze.log, test.log, arch.log, fitness.log, whitespace.log) and
          fix only the reported gate failures. Scope strictly to these failures
          — preserve behavior and do not refactor unrelated code or touch other
          operator work in the checkout.

      - id: verify-recheck
        name: Re-run Verification Gate
        type: bash
        timeout: 90m
        script: >-
          bash ../workflows/custom/scripts/verify-gate.sh all
          {{workflow.runtime_artifacts_dir}}
        outputs:
          verify-recheck.result: text
