name: spec-and-implement-inline
description: >-
  Inline variant of spec-and-implement – same pipeline, but runs directly on
  the current branch in the live checkout: no integration branch, no worktree,
  no merge-back at the end. Use when you want the workflow to operate on the
  branch you are already working on.
variables:
  FEATURE:
    required: true
    description: "Feature description – free text or path to an existing FIS file"
  PROJECT:
    required: false
    description: Target project for coding steps (omit for default project)
  BRANCH:
    required: false
    description: >-
      Injected by run.sh from the operator's current branch. Not consumed by
      this workflow – review prompts scope by the FIS, not by branch diff,
      because inline mode has no synthetic base ref.
    default: ""

project: "{{PROJECT}}"

gitStrategy:
  integrationBranch: false
  worktree: inline

stepDefaults:
  - match: "spec"
    provider: "@planner"
    model: "@planner"
  - match: "revise*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate*"
    provider: "@executor"
    model: "@executor"
  - match: "simplify-code"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  - id: detect-spec-input
    name: Detect Spec Input
    skill: dartclaw-discover-andthen-spec
    allowedTools: [shell, file_read]
    # FEATURE is auto-framed as a <FEATURE> data tag (untrusted input).
    # Never reference {{FEATURE}} inline – that would suppress auto-framing
    # and route attacker-controlled text through as instructions.
    workflowVariables: [FEATURE]
    outputs:
      spec_path:
        format: path
        schema:
          type: string
        description: Workspace-relative path to the existing implementation specification on disk, or empty when input requires spec synthesis.
      spec_source:
        schema: narrative_text
        description: "'existing' when input resolves to a reusable implementation specification, 'synthesized' when the spec skill authored a new one."
      spec_confidence:
        format: json
        schema: non_negative_integer
        description: "Self-rated 1-10 readiness of a synthesized specification authored by the spec skill. Emit 0 in every other case: at the detection step and when an existing specification is reused without synthesis."

  - id: spec
    name: Generate Specification
    skill: andthen:spec
    entryGate: "spec_source == synthesized"
    # FEATURE is interpolated inline by design – the spec skill acts on the
    # feature description, so it is a direct argument, not auto-framed.
    prompt: "--auto {{FEATURE}}"
    outputs:
      spec_path:
        format: path
        schema:
          type: string
        description: Workspace-relative path to the implementation specification on disk.
      spec_source:
        schema: narrative_text
        description: "'existing' when input resolves to a reusable implementation specification, 'synthesized' when the spec skill authored a new one."
      spec_confidence:
        format: json
        schema: non_negative_integer
        description: "Self-rated 1-10 readiness of a synthesized specification authored by the spec skill. Emit 0 in every other case: at the detection step and when an existing specification is reused without synthesis."

  - id: revise-spec
    name: Revise Spec (low confidence)
    skill: andthen:review
    entryGate: "spec_confidence > 0 && spec_confidence < 7"
    inputs: [spec_confidence]
    prompt: >-
      --mode doc --fix --auto
      --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR"
      {{context.spec_path}}

  - id: implement
    name: Implement
    skill: andthen:exec-spec
    # No allowedTools grant here (unlike the built-in): the maintainer profile
    # runs under a broader permission mode, so mutating steps in the inline
    # customs deliberately omit per-tool allowlists rather than mirror the
    # built-in's file_edit grants.
    # Task-level retry covers transient provider/CLI exits without retrying an
    # explicit semantic failed step outcome.
    maxRetries: 1
    prompt: "--auto {{context.spec_path}}"

  - id: simplify-code
    name: Simplify Code
    skill: andthen:simplify-code
    # provider/model resolve to @executor via the `simplify-code` stepDefault.
    # Best-effort cleanup: red baseline or advisory blockage should be recorded
    # without parking the live-checkout workflow after required work landed.
    onFailure: continue
    prompt: >-
      --auto - simplify only the changes implementing {{context.spec_path}}
      in the live checkout; preserve behavior; no scope creep into unrelated
      operator work.

  - id: integrated-review
    name: Integrated Review
    skill: andthen:review
    parallel: true
    onFailure: retry
    maxRetries: 1
    allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
    prompt: >-
      --mode gap --auto
      --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR"
      Review implementation of {{context.spec_path}}. Scope by the FIS –
      assess only the working-tree state implementing this spec; the live
      checkout may contain unrelated operator work, so do not flag it.
    outputs:
      integrated-review.review_report_path: review_report_path
      integrated-review.findings_count: findings_count
      integrated-review.gating_findings_count: gating_findings_count

  - id: integrated-review-council
    name: Integrated Review with Council
    skill: andthen:review
    parallel: true
    # Advisory extra-perspective pass: the gap + architecture reviews carry the
    # gating signal, and the council writes its report to the reviews
    # output-dir regardless. A council flake (provider stall, output-capture
    # edge case) must not abort the parallel barrier, so continue past its
    # failure; its real findings still gate via the aggregator.
    onFailure: continue
    maxRetries: 1
    provider: claude
    model: opus[1m]
    effort: xhigh
    allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
    prompt: >-
      --mode code,security --council --auto
      --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR"
      Review implementation of {{context.spec_path}}. Scope by the FIS –
      assess only the working-tree state implementing this spec; the live
      checkout may contain unrelated operator work, so do not flag it.
    outputs:
      integrated-review-council.review_report_path: review_report_path
      integrated-review-council.findings_count: findings_count
      integrated-review-council.gating_findings_count: gating_findings_count

  - id: architecture-review
    name: Architecture Review
    skill: andthen:architecture
    parallel: true
    onFailure: retry
    maxRetries: 1
    allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
    prompt: >-
      --mode review --auto
      --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR"
      {{context.spec_path}}. Scope by the FIS – review
      only packages this spec touched in the working tree; ignore unrelated
      operator work in other parts of the live checkout.
    outputs:
      architecture-review.review_report_path: review_report_path
      architecture-review.findings_count: findings_count
      architecture-review.gating_findings_count: gating_findings_count

  - id: review-aggregate
    name: Aggregate Review Findings
    type: aggregate-reviews
    aggregateReviews: [integrated-review, integrated-review-council, architecture-review]
    outputs:
      review_report_path: review_report_path
      findings_count: findings_count
      gating_findings_count: gating_findings_count

  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 5
    entryGate: "gating_findings_count > 0"
    exitGate: "gating_findings_count == 0"
    # On exhaustion, fall through to the deterministic verify-all → verify-fix-loop
    # gate below instead of failing the run; that gate mechanically resolves
    # guardrail-class residue and is the genuine fail point if it cannot.
    onMaxIterations: continue
    steps:
      - id: remediate
        name: Remediate Findings
        skill: andthen:remediate-findings
        entryGate: "gating_findings_count > 0"
        inputs: [spec_path]
        prompt: "--auto {{context.review_report_path}}"
        outputs:
          remediation_summary:
            schema: narrative_text
            description: Summary of what was changed during this remediation pass.

      - id: re-review
        name: Re-review Gaps
        skill: andthen:review
        allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
        inputs: [remediation_summary]
        prompt: >-
          --mode gap,code,security --auto
          --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR"
          Review implementation of {{context.spec_path}}. Scope by the FIS
          – assess only the working-tree state implementing this spec; the
          live checkout may contain unrelated operator work, so do not
          flag it.
        outputs:
          review_report_path: review_report_path
          findings_count: findings_count
          gating_findings_count: gating_findings_count

  # --- Deterministic verification gate ----------------------------------------
  # After the review/remediation loop, run the CI-equivalent gates as a
  # deterministic bash step. Unlike the
  # skill-driven steps above, these don't depend on an agent choosing to run
  # verification: verify-gate.sh runs fixed commands, captures output under the
  # run artifacts dir, and prints `pass`/`fail` that the fix loop branches on.
  #
  # Bash steps execute on the host with a sandboxed workdir (<dataDir>/workspace);
  # verify-gate.sh lives at <dataDir>/workflows/custom (committed under
  # .dartclaw/workflows/custom/) and locates the repo itself.
  - id: verify-all
    name: Verify CI Gate
    type: bash
    timeout: 90m
    script: >-
      bash ../workflows/custom/scripts/verify-gate.sh all
      {{workflow.runtime_artifacts_dir}}
    outputs:
      verify-all.result: text

  - id: verify-fix-loop
    name: Verification Fix Loop
    type: loop
    maxIterations: 3
    entryGate: "verify-all.result == fail"
    exitGate: "verify-recheck.result == pass"
    steps:
      - id: fix-verification
        name: Fix Verification Failures
        skill: andthen:triage
        provider: "@executor"
        model: "@executor"
        prompt: >-
          --auto The deterministic verification gate failed. Read the failure
          logs under {{workflow.runtime_artifacts_dir}}/verify/ (format.log,
          analyze.log, test.log, arch.log, fitness.log, whitespace.log) and
          fix only the reported gate failures. Scope strictly to these failures
          — preserve behavior and do not refactor unrelated code or touch other
          operator work in the checkout.

      - id: verify-recheck
        name: Re-run Verification Gate
        type: bash
        timeout: 90m
        script: >-
          bash ../workflows/custom/scripts/verify-gate.sh all
          {{workflow.runtime_artifacts_dir}}
        outputs:
          verify-recheck.result: text
