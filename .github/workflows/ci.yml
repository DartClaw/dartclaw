name: Checks

on:
  push:
  pull_request:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test
        run: bash dev/tools/test_workspace.sh

      - name: Architecture check
        run: dart run dev/tools/arch_check.dart

      - name: Fitness functions
        run: bash dev/tools/fitness/run_all.sh
