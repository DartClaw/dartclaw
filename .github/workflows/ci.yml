name: Checks
# Action-update process: to bump a pinned action, re-resolve the tag to its current SHA with
#   gh api repos/<owner>/<repo>/commits/<tag> --jq .sha
# then update both the SHA and the trailing # vX comment on the uses: line.

on:
  push:
    # The branch filter also excludes tag pushes, so release tagging does not re-run Checks.
    branches: ['**']
  pull_request:

jobs:
  check:
    name: Check
    # Same-repo PR branches already run via push; keep pull_request for fork PRs only.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: 3.12.0

      - name: Install dependencies
        run: dart pub get

      - name: Format check
        run: dart format --line-length=120 --output=none --set-exit-if-changed .

      - name: Embedded asset drift check
        run: |
          git ls-files --error-unmatch -- \
            packages/dartclaw_server/lib/src/generated/embedded_assets.g.dart \
            packages/dartclaw_workflow/lib/src/generated/embedded_assets.g.dart
          dart run dev/tools/embed_assets.dart
          git diff --exit-code -- '**/generated/embedded_assets.g.dart'

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test
        run: bash dev/tools/test_workspace.sh

      - name: Architecture check
        run: dart run dev/tools/arch_check.dart

      - name: Fitness functions
        run: bash dev/tools/fitness/run_all.sh
