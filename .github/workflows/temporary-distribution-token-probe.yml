name: Temporary Distribution Token Probe

on:
  push:
    branches:
      - feat/0.21

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Verify shared token repository access
        env:
          DISTRIBUTION_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$DISTRIBUTION_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured." >&2
            exit 1
          fi

          for repository in homebrew-dartclaw scoop-dartclaw; do
            url="https://x-access-token:${DISTRIBUTION_TOKEN}@github.com/DartClaw/${repository}.git"
            git ls-remote "$url" HEAD >/dev/null
            git clone --depth 1 "$url" "$repository"
            git -C "$repository" push --dry-run origin HEAD:main
          done
