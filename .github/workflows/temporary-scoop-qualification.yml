name: Temporary Scoop Qualification

on:
  push:
    branches:
      - feat/0.21

permissions:
  actions: read
  contents: read

jobs:
  qualify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download qualified Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-x64-qualification
          path: qualification
          github-token: ${{ github.token }}
          run-id: 29181756146

      - name: Install Scoop
        shell: pwsh
        run: |
          $installer = Invoke-RestMethod `
            https://raw.githubusercontent.com/ScoopInstaller/Install/b0ee913725139b816f9178163af0aecdba07a7ed/install.ps1
          Invoke-Expression "& {$installer} -RunAsAdmin"
          "$env:USERPROFILE\scoop\shims" >> $env:GITHUB_PATH

      - name: Qualify manifest install, update, and uninstall
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '0.20.1'
          $archiveName = "dartclaw-v$version-windows-x64.zip"
          $assetDirectory = (Resolve-Path 'qualification/build').Path
          $archive = Join-Path $assetDirectory $archiveName
          $manifestPath = 'package/scoop/dartclaw.json'
          $bucketSource = Join-Path $env:RUNNER_TEMP 'dartclaw-scoop-bucket-source'
          $bucketManifestDirectory = Join-Path $bucketSource 'bucket'

          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          $manifest.architecture.'64bit'.url = "http://127.0.0.1:8765/$archiveName"
          $manifest.architecture.'64bit'.hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()

          New-Item -ItemType Directory -Path $bucketManifestDirectory | Out-Null
          $manifest | ConvertTo-Json -Depth 10 | Set-Content (Join-Path $bucketManifestDirectory 'dartclaw.json')
          git -C $bucketSource init -b main | Out-Null
          git -C $bucketSource config user.name 'DartClaw qualification'
          git -C $bucketSource config user.email 'qualification@dartclaw.local'
          git -C $bucketSource add bucket/dartclaw.json
          git -C $bucketSource commit -m "dartclaw $version" | Out-Null

          $server = Start-Process python -ArgumentList @(
            '-m', 'http.server', '8765', '--bind', '127.0.0.1', '--directory', $assetDirectory
          ) -PassThru
          try {
            Start-Sleep -Seconds 2
            $bucketUrl = 'file:///' + ($bucketSource -replace '\\', '/')
            scoop bucket add dartclaw-local $bucketUrl
            scoop install dartclaw-local/dartclaw

            $versionOutput = (& dartclaw --version | Out-String).Trim()
            if ($LASTEXITCODE -ne 0 -or $versionOutput -notmatch [regex]::Escape($version)) {
              throw "unexpected dartclaw version output: $versionOutput"
            }
            Write-Output "VERSION_OK=$versionOutput"

            $current = (& scoop prefix dartclaw | Out-String).Trim()
            if ($LASTEXITCODE -ne 0) {
              throw 'scoop prefix dartclaw failed'
            }
            $appRoot = Join-Path (Split-Path $current -Parent) $version
            $executable = Join-Path $appRoot 'bin\dartclaw.exe'
            $sqliteModule = Join-Path $appRoot 'lib\sqlite3.dll'
            $sqliteOutput = (& $executable release-sqlite-check --expected-module $sqliteModule | Out-String).Trim()
            if ($LASTEXITCODE -ne 0) {
              throw "bundled SQLite identity check failed: $sqliteOutput"
            }
            Write-Output "SQLITE_OK=$sqliteOutput"

            scoop update dartclaw
            scoop uninstall dartclaw
            scoop bucket rm dartclaw-local
            if (Get-Command dartclaw -ErrorAction SilentlyContinue) {
              throw 'dartclaw shim remains after Scoop uninstall'
            }
            Write-Output 'SCOOP_QUALIFICATION=PASS'
          } finally {
            Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
          }
