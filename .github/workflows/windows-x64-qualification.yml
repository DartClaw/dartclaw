name: Temporary Windows x64 Qualification

on:
  push:
    branches:
      - feat/0.21
    paths:
      - '.github/workflows/windows-x64-qualification.yml'
      - 'apps/**'
      - 'packages/**'
      - 'dev/testing/**'
      - 'dev/tools/build_windows.ps1'
      - 'pubspec.yaml'
      - 'pubspec.lock'

permissions:
  actions: read
  contents: read

jobs:
  qualify:
    name: Windows x64 qualification
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: 3.12.0

      - name: Install dependencies
        shell: pwsh
        run: dart pub get --enforce-lockfile

      - name: Verify native x64 candidate identity
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path qualification -Force | Out-Null
          $architecture = [Runtime.InteropServices.RuntimeInformation]::OSArchitecture
          if ($architecture -ne [Runtime.InteropServices.Architecture]::X64) {
            throw "Expected native x64 host, found $architecture."
          }

          @(
            "Timestamp: $([DateTimeOffset]::Now.ToString('o'))"
            "Run: https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
            "GitHub SHA: $env:GITHUB_SHA"
            "OS: $([Runtime.InteropServices.RuntimeInformation]::OSDescription)"
            "Architecture: $architecture"
            "Dart: $(& dart --version 2>&1)"
            "Claude evidence target: 2.1.207 (Claude Code)"
            "Codex evidence target: codex-cli 0.139.0"
          ) | Set-Content -LiteralPath qualification/qualification-identity.txt -Encoding utf8

      - name: Test and build Windows artifact
        shell: pwsh
        run: |
          ./dev/tools/build_windows_test.ps1
          ./dev/tools/build_windows.ps1 -ReleaseTarget windows-x64

      - name: Verify and record artifact identity
        shell: pwsh
        run: |
          $artifacts = @(Get-ChildItem -LiteralPath build -Filter 'dartclaw-v*-windows-x64.zip' -File)
          if ($artifacts.Count -ne 1) { throw "Expected one Windows artifact, found $($artifacts.Count)." }
          $artifact = $artifacts[0]
          $sidecar = "$($artifact.FullName).sha256"
          if (-not (Test-Path -LiteralPath $sidecar -PathType Leaf)) {
            throw "Missing artifact checksum: $sidecar"
          }

          $checksumLine = (Get-Content -LiteralPath $sidecar -Raw).Trim()
          $checksumMatch = [regex]::Match($checksumLine, '^([0-9a-f]{64})  (.+)$')
          if (-not $checksumMatch.Success -or $checksumMatch.Groups[2].Value -ne $artifact.Name) {
            throw "Malformed artifact checksum: $checksumLine"
          }
          $actualHash = (Get-FileHash -LiteralPath $artifact.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($checksumMatch.Groups[1].Value -cne $actualHash) {
            throw "Artifact checksum mismatch: expected $($checksumMatch.Groups[1].Value), got $actualHash."
          }

          Add-Content -LiteralPath qualification/qualification-identity.txt -Value @(
            "Artifact: $($artifact.Name)"
            "Artifact SHA256: $actualHash"
            "Checksum: $([IO.Path]::GetFileName($sidecar)) verified"
          )

      - name: Upload candidate artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-x64-candidate-artifact
          if-no-files-found: error
          path: |
            build/dartclaw-v*-windows-x64.zip
            build/dartclaw-v*-windows-x64.zip.sha256

      - name: Qualify native process lifecycle owners
        shell: pwsh
        run: |
          $tests = @(
            'packages/dartclaw_core/test/harness/process_lifecycle_test.dart'
            'packages/dartclaw_core/test/harness/base_harness_test.dart'
            'packages/dartclaw_server/test/harness_pool_test.dart'
            'packages/dartclaw_server/test/task/cli_provider_output_drain_test.dart'
            'packages/dartclaw_signal/test/signal_cli_manager_test.dart'
            'packages/dartclaw_whatsapp/test/gowa_manager_test.dart'
          )
          foreach ($test in $tests) {
            "## $test" | Tee-Object -FilePath qualification/windows-process-lifecycle.txt -Append
            & dart test --reporter=expanded $test 2>&1 |
              Tee-Object -FilePath qualification/windows-process-lifecycle.txt -Append
            if ($LASTEXITCODE -ne 0) { throw "Lifecycle qualification failed: $test" }
          }

      - name: Qualify focused Git Bash behavior
        shell: pwsh
        run: |
          Push-Location packages/dartclaw_workflow
          try {
            $filter = 'accepts a custom Git Bash installation root|skips non-Git bash candidates returned first|' +
              'rejects a non-Git bash candidate|Windows .*|' +
              'bash step timeout (pauses workflow|terminates the spawned process|terminates background children)'
            & dart test --reporter=expanded test/workflow/bash_step_runner_test.dart -n $filter 2>&1 |
              Tee-Object -FilePath ../../qualification/windows-bash-focused-tests.txt
            if ($LASTEXITCODE -ne 0) { throw 'Focused Git Bash runner tests failed.' }
            & dart test --reporter=expanded test/workflow/bash_process_ownership_test.dart 2>&1 |
              Tee-Object -FilePath ../../qualification/windows-bash-focused-tests.txt -Append
            if ($LASTEXITCODE -ne 0) { throw 'Bash ownership tests failed.' }
          } finally {
            Pop-Location
          }

      - name: Read provider evidence bootstrap identity
        id: provider_evidence
        shell: pwsh
        run: |
          $content = Get-Content -LiteralPath dev/testing/evidence/windows-harness-turns.md -Raw
          $runMatches = [regex]::Matches(
            $content,
            '(?mi)^\*\*Qualification bootstrap run ID\*\*:\s*`?([0-9]+)`?\s*$'
          )
          $revisionMatches = [regex]::Matches(
            $content,
            '(?mi)^\*\*Runtime source revision\*\*:\s*`?([0-9a-f]{40})`?\s*$'
          )
          $hashMatches = [regex]::Matches(
            $content,
            '(?mi)^\*\*Artifact SHA256\*\*:\s*`?([0-9a-f]{64})`?\s*$'
          )
          if ($runMatches.Count -ne 1) { throw 'Provider evidence must name one qualification bootstrap run ID.' }
          if ($revisionMatches.Count -ne 1) { throw 'Provider evidence must name one runtime source revision.' }
          if ($hashMatches.Count -ne 1) { throw 'Provider evidence must name one artifact SHA256.' }
          "run_id=$($runMatches[0].Groups[1].Value)" >> $env:GITHUB_OUTPUT
          "runtime_revision=$($revisionMatches[0].Groups[1].Value)" >> $env:GITHUB_OUTPUT
          "artifact_sha256=$($hashMatches[0].Groups[1].Value)" >> $env:GITHUB_OUTPUT

      - name: Download provider-qualified bootstrap artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-x64-candidate-artifact
          path: qualification/bootstrap-candidate
          github-token: ${{ github.token }}
          run-id: ${{ steps.provider_evidence.outputs.run_id }}

      - name: Verify provider evidence identity
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $evidencePath = 'dev/testing/evidence/windows-harness-turns.md'
          $content = Get-Content -LiteralPath $evidencePath -Raw
          if ($content -notmatch '(?m)^\*\*Status\*\*:\s*QUALIFIED\s*$') {
            throw 'Provider evidence is not QUALIFIED.'
          }
          $providerRevision = '${{ steps.provider_evidence.outputs.runtime_revision }}'
          $bootstrapRunId = '${{ steps.provider_evidence.outputs.run_id }}'
          $expectedArtifactHash = '${{ steps.provider_evidence.outputs.artifact_sha256 }}'
          git cat-file -e "$providerRevision^{commit}"
          if ($LASTEXITCODE -ne 0) { throw 'Provider evidence revision is unavailable.' }
          git diff --quiet $providerRevision $env:GITHUB_SHA -- `
            apps packages pubspec.yaml pubspec.lock dev/tools/build_windows.ps1
          if ($LASTEXITCODE -ne 0) {
            throw 'Provider evidence does not match the qualified runtime/build tree.'
          }

          $bootstrapRun = gh api "repos/$env:GITHUB_REPOSITORY/actions/runs/$bootstrapRunId" |
            ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) { throw 'Unable to read qualification bootstrap run.' }
          if ($bootstrapRun.status -ne 'completed' -or
              $bootstrapRun.event -ne 'push' -or
              $bootstrapRun.name -ne 'Temporary Windows x64 Qualification' -or
              $bootstrapRun.path -ne '.github/workflows/windows-x64-qualification.yml' -or
              $bootstrapRun.head_branch -ne 'feat/0.21' -or
              $bootstrapRun.head_sha -ne $providerRevision) {
            throw 'Qualification bootstrap run does not identify the provider-tested source revision.'
          }

          $bootstrapArtifacts = @(
            Get-ChildItem -LiteralPath qualification/bootstrap-candidate `
              -Filter 'dartclaw-v*-windows-x64.zip' -File
          )
          if ($bootstrapArtifacts.Count -ne 1) {
            throw "Expected one downloaded bootstrap artifact, found $($bootstrapArtifacts.Count)."
          }
          $bootstrapArtifact = $bootstrapArtifacts[0]
          $bootstrapSidecar = "$($bootstrapArtifact.FullName).sha256"
          if (-not (Test-Path -LiteralPath $bootstrapSidecar -PathType Leaf)) {
            throw 'Downloaded bootstrap artifact lacks its checksum sidecar.'
          }
          $sidecarMatch = [regex]::Match(
            (Get-Content -LiteralPath $bootstrapSidecar -Raw).Trim(),
            '^([0-9a-f]{64})  (.+)$'
          )
          $actualArtifactHash = (
            Get-FileHash -LiteralPath $bootstrapArtifact.FullName -Algorithm SHA256
          ).Hash.ToLowerInvariant()
          if (-not $sidecarMatch.Success -or
              $sidecarMatch.Groups[2].Value -ne $bootstrapArtifact.Name -or
              $sidecarMatch.Groups[1].Value -cne $actualArtifactHash -or
              $actualArtifactHash -cne $expectedArtifactHash) {
            throw 'Provider evidence does not match the downloaded bootstrap artifact and checksum.'
          }

          & pwsh -NoLogo -NoProfile -File ./dev/testing/profiles/windows-runtime/run.ps1 `
            -ArtifactPath $bootstrapArtifact.FullName `
            -SkipProviders `
            -ExpectedClaudeVersion '2.1.207 (Claude Code)' `
            -ExpectedCodexVersion 'codex-cli 0.139.0' `
            -ProviderEvidencePath $evidencePath `
            -EvidencePath qualification/windows-bootstrap-runtime-smoke.md
          if ($LASTEXITCODE -ne 0) { throw 'Provider-qualified bootstrap artifact smoke failed.' }
          $smokeReport = Get-Content -LiteralPath qualification/windows-bootstrap-runtime-smoke.md -Raw
          if ($smokeReport -notmatch '(?m)^\*\*Overall status\*\*: supported\s*$' -or
              $smokeReport -notmatch '(?m)^\*\*Release ready\*\*: true\s*$') {
            throw 'Matching provider evidence did not produce a supported, release-ready artifact smoke result.'
          }

          Copy-Item -LiteralPath $evidencePath -Destination qualification/windows-harness-turns-input.md
          Add-Content -LiteralPath qualification/qualification-identity.txt -Value @(
            "Provider runtime source revision: $providerRevision"
            "Provider qualification bootstrap run: $bootstrapRunId"
            "Provider-qualified artifact SHA256: $actualArtifactHash"
          )

      - name: Qualify Git Bash workflow step
        shell: pwsh
        run: |
          $gitBash = 'C:\Program Files\Git\bin\bash.exe'
          if (-not (Test-Path -LiteralPath $gitBash -PathType Leaf)) {
            throw "Git Bash not found at $gitBash."
          }
          $bootstrapArtifacts = @(
            Get-ChildItem -LiteralPath qualification/bootstrap-candidate `
              -Filter 'dartclaw-v*-windows-x64.zip' -File
          )
          if ($bootstrapArtifacts.Count -ne 1) {
            throw "Expected one downloaded bootstrap artifact, found $($bootstrapArtifacts.Count)."
          }
          $bootstrapBundle = 'qualification/bootstrap-git-bash'
          Remove-Item -LiteralPath $bootstrapBundle -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive -LiteralPath $bootstrapArtifacts[0].FullName -DestinationPath $bootstrapBundle
          $bundleExecutable = (Resolve-Path -LiteralPath `
            (Join-Path $bootstrapBundle 'bin/dartclaw.exe')).Path
          $env:PATH = "$(Split-Path -Parent $gitBash);$env:PATH"
          $dataDir = 'C:\DartClaw Bash Step Qualification'
          $workspaceDir = Join-Path $dataDir 'workspace with spaces'
          $workflowDir = Join-Path $dataDir 'workflows\custom'
          Remove-Item -LiteralPath $dataDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $workspaceDir, $workflowDir | Out-Null
          [IO.File]::WriteAllText(
            (Join-Path $workspaceDir 'fixture file.txt'),
            'relative-file-ok',
            [Text.UTF8Encoding]::new($false)
          )
          @"
          data_dir: '$dataDir'
          security:
            bash_step:
              env_allowlist:
                - DARTCLAW_BASH_QUALIFICATION
          "@ | Set-Content -LiteralPath (Join-Path $dataDir 'dartclaw.yaml') -Encoding utf8
          @"
          name: windows-bash-step-qualification
          description: Qualify native Windows Git Bash workflow-step behavior
          steps:
            - id: qualify-bash
              name: Qualify Bash
              type: bash
              workdir: '$workspaceDir'
              script: |
                set -eu
                printf 'git_bash_version=%s\n' "`$(bash --version | head -n 1)"
                printf 'git_bash_pwd=%s\n' "`$(pwd)"
                printf 'relative_file=%s\n' "`$(cat './fixture file.txt')"
                printf 'allowlisted_env=%s\n' "`$DARTCLAW_BASH_QUALIFICATION"
                printf 'posix_result=%s\n' "`$(printf 'one\ntwo\n' | wc -l | tr -d ' ')"
              outputs:
                qualification_output:
                  format: text
          "@ | Set-Content -LiteralPath (Join-Path $workflowDir 'windows-bash-step-qualification.yaml') -Encoding utf8

          $resolvedBash = (& where.exe bash | Select-Object -First 1).Trim()
          if ($resolvedBash -ne $gitBash) { throw "Expected $gitBash, resolved $resolvedBash." }
          @(
            "Timestamp: $([DateTimeOffset]::Now.ToString('o'))"
            "Location: $(Get-Location)"
            "OS: $([Runtime.InteropServices.RuntimeInformation]::OSDescription)"
            "Architecture: $([Runtime.InteropServices.RuntimeInformation]::OSArchitecture)"
            "Revision: $(& git rev-parse HEAD)"
            "Dart: $(& dart --version 2>&1)"
            "DartClaw executable: $bundleExecutable"
            "Git Bash: $gitBash"
            "Git Bash version: $(& $gitBash --version | Select-Object -First 1)"
            "Native cwd: $workspaceDir"
            "Resolved Bash: $resolvedBash"
          ) | Set-Content -LiteralPath qualification/windows-bash-step-metadata.txt -Encoding utf8

          $env:DARTCLAW_BASH_QUALIFICATION = 'allowlist-ok'
          $output = & $bundleExecutable workflow run windows-bash-step-qualification `
            --standalone --force --json --no-skill-bootstrap --config (Join-Path $dataDir 'dartclaw.yaml') 2>&1
          $exitCode = $LASTEXITCODE
          $output | Tee-Object -FilePath qualification/windows-bash-step-output.txt
          if ($exitCode -ne 0) { throw "Bash qualification exited $exitCode." }
          $events = @($output | ForEach-Object {
            try { $_.ToString() | ConvertFrom-Json -ErrorAction Stop } catch { $null }
          })
          $completed = @($events | Where-Object {
            $_.type -eq 'workflow_status_changed' -and $_.newStatus -eq 'completed'
          } | Select-Object -Last 1)
          if ($completed.Count -ne 1) { throw 'Workflow did not emit a completed terminal event.' }
          $contextPath = Join-Path $dataDir "workflows\runs\$($completed[0].runId)\context.json"
          if (-not (Test-Path -LiteralPath $contextPath -PathType Leaf)) { throw "Missing workflow context: $contextPath" }
          Copy-Item -LiteralPath $contextPath -Destination qualification/windows-bash-step-context.json
          $context = Get-Content -LiteralPath $contextPath -Raw | ConvertFrom-Json
          if ($context.data.'qualify-bash.status' -ne 'success') { throw 'Bash step status was not success.' }
          if ($context.data.'qualify-bash.exitCode' -ne 0) { throw 'Bash step exit code was not zero.' }
          $joined = $context.data.qualification_output
          foreach ($expected in @(
            'git_bash_version='
            'git_bash_pwd=/c/DartClaw Bash Step Qualification/workspace with spaces'
            'relative_file=relative-file-ok'
            'allowlisted_env=allowlist-ok'
            'posix_result=2'
          )) {
            if (-not $joined.Contains($expected)) { throw "Missing Bash qualification marker: $expected" }
          }

      - name: Run x64 artifact smoke
        shell: pwsh
        run: |
          $artifacts = @(Get-ChildItem -LiteralPath build -Filter 'dartclaw-v*-windows-x64.zip' -File)
          if ($artifacts.Count -ne 1) { throw "Expected one Windows artifact, found $($artifacts.Count)." }
          $smokeStartInfo = [Diagnostics.ProcessStartInfo]::new()
          $smokeStartInfo.FileName = (Get-Command pwsh).Source
          $smokeStartInfo.UseShellExecute = $false
          foreach ($argument in @(
            '-NoLogo',
            '-NoProfile',
            '-File',
            (Resolve-Path -LiteralPath './dev/testing/profiles/windows-runtime/run.ps1').Path,
            '-ArtifactPath',
            $artifacts[0].FullName,
            '-SkipProviders',
            '-ExpectedClaudeVersion',
            '2.1.207 (Claude Code)',
            '-ExpectedCodexVersion',
            'codex-cli 0.139.0',
            '-ProviderEvidencePath',
            (Resolve-Path -LiteralPath 'dev/testing/evidence/windows-harness-turns.md').Path,
            '-EvidencePath',
            [IO.Path]::GetFullPath('qualification/windows-current-runtime-smoke.md')
          )) {
            $smokeStartInfo.ArgumentList.Add($argument)
          }
          $smokeProcess = [Diagnostics.Process]::Start($smokeStartInfo)
          $smokeProcess.WaitForExit()
          $smokeExitCode = $smokeProcess.ExitCode
          if ($smokeExitCode -eq 1) { throw 'Windows artifact smoke failed.' }
          if ($smokeExitCode -notin @(0, 2)) { throw "Windows artifact smoke returned unexpected exit code $smokeExitCode." }

          $report = Get-Content -LiteralPath qualification/windows-current-runtime-smoke.md -Raw
          if ($smokeExitCode -eq 2) {
            if ($report -notmatch '(?m)^\*\*Overall status\*\*: incomplete\s*$' -or
                $report -notmatch '(?m)^\*\*Release ready\*\*: false\s*$') {
              throw 'Exit 2 was not an incomplete, non-release-ready provider-skip result.'
            }
            foreach ($layer in @('windows-x64-host', 'server-startup', 'web-ui', 'fts5-search', 'config-reload')) {
              if ($report -notmatch "(?m)^\| $([regex]::Escape($layer)) \| pass \|") {
                throw "Incomplete smoke did not pass required core layer: $layer"
              }
            }
            foreach ($provider in @('claude-turn', 'codex-turn')) {
              if ($report -notmatch "(?m)^\| $([regex]::Escape($provider)) \| skipped \|") {
                throw "Incomplete smoke was not limited to provider skips: $provider"
              }
            }
          }

      - name: Record provider evidence identity
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path qualification -Force | Out-Null
          $evidenceInput = 'qualification/windows-harness-turns-input.md'
          if (Test-Path -LiteralPath $evidenceInput -PathType Leaf) {
            $hash = (Get-FileHash -LiteralPath $evidenceInput -Algorithm SHA256).Hash.ToLowerInvariant()
            Add-Content -LiteralPath qualification/qualification-identity.txt -Value "Provider evidence SHA256: $hash"
          } else {
            Add-Content -LiteralPath qualification/qualification-identity.txt -Value 'Provider evidence SHA256: unavailable'
          }

      - name: Upload qualification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-x64-qualification
          if-no-files-found: error
          path: |
            qualification/
            build/dartclaw-v*-windows-x64.zip
            build/dartclaw-v*-windows-x64.zip.sha256
