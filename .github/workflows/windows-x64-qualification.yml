name: Temporary Windows x64 Qualification

on:
  push:
    branches:
      - feat/0.21
    paths:
      - '.github/workflows/windows-x64-qualification.yml'
      - 'apps/**'
      - 'packages/**'
      - 'dev/testing/**'
      - 'dev/tools/build_windows.ps1'
      - 'pubspec.yaml'
      - 'pubspec.lock'

permissions:
  contents: read

jobs:
  qualify:
    name: Windows x64 qualification
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: 3.12.0

      - name: Install dependencies and provider CLIs
        shell: pwsh
        run: |
          dart pub get
          npm install --global @anthropic-ai/claude-code@2.1.207 @openai/codex@0.139.0

      - name: Verify native x64 host and provider evidence identity
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path qualification -Force | Out-Null
          $architecture = [Runtime.InteropServices.RuntimeInformation]::OSArchitecture
          if ($architecture -ne [Runtime.InteropServices.Architecture]::X64) {
            throw "Expected native x64 host, found $architecture."
          }

          $evidencePath = 'dev/testing/evidence/windows-harness-turns.md'
          $content = Get-Content -LiteralPath $evidencePath -Raw
          if ($content -notmatch '(?m)^\*\*Status\*\*:\s*QUALIFIED\s*$') {
            throw 'Provider evidence is not QUALIFIED.'
          }
          $revisionMatch = [regex]::Match(
            $content,
            '(?mi)^\*\*Runtime source revision\*\*:\s*`?([0-9a-f]{40})`?\s*$'
          )
          if (-not $revisionMatch.Success) { throw 'Provider evidence lacks Runtime source revision.' }
          $providerRevision = $revisionMatch.Groups[1].Value
          git cat-file -e "$providerRevision^{commit}"
          if ($LASTEXITCODE -ne 0) { throw 'Provider evidence revision is unavailable.' }
          git diff --quiet $providerRevision $env:GITHUB_SHA -- `
            apps packages pubspec.yaml pubspec.lock dev/tools/build_windows.ps1
          if ($LASTEXITCODE -ne 0) {
            throw 'Provider evidence does not match the qualified runtime/build tree.'
          }

          Copy-Item -LiteralPath $evidencePath -Destination qualification/windows-harness-turns-input.md
          @(
            "Timestamp: $([DateTimeOffset]::Now.ToString('o'))"
            "Run: https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
            "GitHub SHA: $env:GITHUB_SHA"
            "Provider runtime source revision: $providerRevision"
            "OS: $([Runtime.InteropServices.RuntimeInformation]::OSDescription)"
            "Architecture: $architecture"
            "Dart: $(& dart --version 2>&1)"
          ) | Set-Content -LiteralPath qualification/qualification-identity.txt -Encoding utf8

      - name: Qualify native process lifecycle owners
        shell: pwsh
        run: |
          $tests = @(
            'packages/dartclaw_core/test/harness/process_lifecycle_test.dart'
            'packages/dartclaw_core/test/harness/base_harness_test.dart'
            'packages/dartclaw_server/test/harness_pool_test.dart'
            'packages/dartclaw_server/test/task/cli_provider_output_drain_test.dart'
            'packages/dartclaw_server/test/task/workflow_cli_runner_test.dart'
            'packages/dartclaw_signal/test/signal_cli_manager_test.dart'
            'packages/dartclaw_whatsapp/test/gowa_manager_test.dart'
          )
          foreach ($test in $tests) {
            "## $test" | Tee-Object -FilePath qualification/windows-process-lifecycle.txt -Append
            & dart test --reporter=expanded $test 2>&1 |
              Tee-Object -FilePath qualification/windows-process-lifecycle.txt -Append
            if ($LASTEXITCODE -ne 0) { throw "Lifecycle qualification failed: $test" }
          }

      - name: Qualify focused Git Bash behavior
        shell: pwsh
        run: |
          Push-Location packages/dartclaw_workflow
          try {
            $filter = 'accepts a custom Git Bash installation root|skips non-Git bash candidates returned first|' +
              'rejects a non-Git bash candidate|Windows .*|' +
              'bash step timeout (pauses workflow|terminates the spawned process|terminates background children)'
            & dart test --reporter=expanded test/workflow/bash_step_runner_test.dart -n $filter 2>&1 |
              Tee-Object -FilePath ../../qualification/windows-bash-focused-tests.txt
            if ($LASTEXITCODE -ne 0) { throw 'Focused Git Bash runner tests failed.' }
            & dart test --reporter=expanded test/workflow/bash_process_ownership_test.dart 2>&1 |
              Tee-Object -FilePath ../../qualification/windows-bash-focused-tests.txt -Append
            if ($LASTEXITCODE -ne 0) { throw 'Bash ownership tests failed.' }
          } finally {
            Pop-Location
          }

      - name: Qualify Git Bash workflow step
        shell: pwsh
        run: |
          $gitBash = 'C:\Program Files\Git\bin\bash.exe'
          if (-not (Test-Path -LiteralPath $gitBash -PathType Leaf)) {
            throw "Git Bash not found at $gitBash."
          }
          $env:PATH = "$(Split-Path -Parent $gitBash);$env:PATH"
          $dataDir = 'C:\DartClaw Bash Step Qualification'
          $workspaceDir = Join-Path $dataDir 'workspace with spaces'
          $workflowDir = Join-Path $dataDir 'workflows\custom'
          Remove-Item -LiteralPath $dataDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $workspaceDir, $workflowDir | Out-Null
          [IO.File]::WriteAllText(
            (Join-Path $workspaceDir 'fixture file.txt'),
            'relative-file-ok',
            [Text.UTF8Encoding]::new($false)
          )
          @"
          data_dir: '$dataDir'
          security:
            bash_step:
              env_allowlist:
                - DARTCLAW_BASH_QUALIFICATION
          "@ | Set-Content -LiteralPath (Join-Path $dataDir 'dartclaw.yaml') -Encoding utf8
          @"
          name: windows-bash-step-qualification
          description: Qualify native Windows Git Bash workflow-step behavior
          steps:
            - id: qualify-bash
              name: Qualify Bash
              type: bash
              workdir: '$workspaceDir'
              script: |
                set -eu
                printf 'git_bash_version=%s\n' "`$(bash --version | head -n 1)"
                printf 'git_bash_pwd=%s\n' "`$(pwd)"
                printf 'relative_file=%s\n' "`$(cat './fixture file.txt')"
                printf 'allowlisted_env=%s\n' "`$DARTCLAW_BASH_QUALIFICATION"
                printf 'posix_result=%s\n' "`$(printf 'one\ntwo\n' | wc -l | tr -d ' ')"
              outputs:
                qualification_output:
                  format: text
          "@ | Set-Content -LiteralPath (Join-Path $workflowDir 'windows-bash-step-qualification.yaml') -Encoding utf8

          $resolvedBash = (& where.exe bash | Select-Object -First 1).Trim()
          if ($resolvedBash -ne $gitBash) { throw "Expected $gitBash, resolved $resolvedBash." }
          @(
            "Timestamp: $([DateTimeOffset]::Now.ToString('o'))"
            "Location: $(Get-Location)"
            "OS: $([Runtime.InteropServices.RuntimeInformation]::OSDescription)"
            "Architecture: $([Runtime.InteropServices.RuntimeInformation]::OSArchitecture)"
            "Revision: $(& git rev-parse HEAD)"
            "Dart: $(& dart --version 2>&1)"
            "Git Bash: $gitBash"
            "Git Bash version: $(& $gitBash --version | Select-Object -First 1)"
            "Native cwd: $workspaceDir"
            "Resolved Bash: $resolvedBash"
          ) | Set-Content -LiteralPath qualification/windows-bash-step-metadata.txt -Encoding utf8

          $env:DARTCLAW_BASH_QUALIFICATION = 'allowlist-ok'
          $output = & dart run dartclaw_cli:dartclaw workflow run windows-bash-step-qualification `
            --standalone --force --json --no-skill-bootstrap --config (Join-Path $dataDir 'dartclaw.yaml') 2>&1
          $exitCode = $LASTEXITCODE
          $output | Tee-Object -FilePath qualification/windows-bash-step-output.txt
          if ($exitCode -ne 0) { throw "Bash qualification exited $exitCode." }
          $events = @($output | ForEach-Object {
            try { $_.ToString() | ConvertFrom-Json -ErrorAction Stop } catch { $null }
          })
          $completed = @($events | Where-Object {
            $_.type -eq 'workflow_status_changed' -and $_.newStatus -eq 'completed'
          } | Select-Object -Last 1)
          if ($completed.Count -ne 1) { throw 'Workflow did not emit a completed terminal event.' }
          $contextPath = Join-Path $dataDir "workflows\runs\$($completed[0].runId)\context.json"
          if (-not (Test-Path -LiteralPath $contextPath -PathType Leaf)) { throw "Missing workflow context: $contextPath" }
          Copy-Item -LiteralPath $contextPath -Destination qualification/windows-bash-step-context.json
          $context = Get-Content -LiteralPath $contextPath -Raw | ConvertFrom-Json
          if ($context.data.'qualify-bash.status' -ne 'success') { throw 'Bash step status was not success.' }
          if ($context.data.'qualify-bash.exitCode' -ne 0) { throw 'Bash step exit code was not zero.' }
          $joined = $context.data.qualification_output
          foreach ($expected in @(
            'git_bash_version='
            'git_bash_pwd=/c/DartClaw Bash Step Qualification/workspace with spaces'
            'relative_file=relative-file-ok'
            'allowlisted_env=allowlist-ok'
            'posix_result=2'
          )) {
            if (-not $joined.Contains($expected)) { throw "Missing Bash qualification marker: $expected" }
          }

      - name: Test and build Windows artifact
        shell: pwsh
        run: |
          ./dev/tools/build_windows_test.ps1
          ./dev/tools/build_windows.ps1 -ReleaseTarget windows-x64

      - name: Run x64 artifact smoke
        shell: pwsh
        run: |
          $artifact = Get-ChildItem -LiteralPath build -Filter 'dartclaw-v*-windows-x64.zip' -File
          if (@($artifact).Count -ne 1) { throw "Expected one Windows artifact, found $(@($artifact).Count)." }
          ./dev/testing/profiles/windows-runtime/run.ps1 `
            -ArtifactPath $artifact.FullName `
            -SkipProviders `
            -ProviderEvidencePath dev/testing/evidence/windows-harness-turns.md `
            -EvidencePath qualification/windows-runtime-smoke.md

      - name: Record artifact identity
        if: always()
        shell: pwsh
        run: |
          $artifact = Get-ChildItem -LiteralPath build -Filter 'dartclaw-v*-windows-x64.zip' -File |
            Select-Object -First 1
          if ($null -ne $artifact) {
            Add-Content -LiteralPath qualification/qualification-identity.txt -Value @(
              "Artifact: $($artifact.Name)"
              "Artifact SHA256: $((Get-FileHash -LiteralPath $artifact.FullName -Algorithm SHA256).Hash.ToLowerInvariant())"
              "Provider evidence SHA256: $((Get-FileHash -LiteralPath qualification/windows-harness-turns-input.md -Algorithm SHA256).Hash.ToLowerInvariant())"
            )
          }

      - name: Upload qualification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-x64-qualification
          if-no-files-found: error
          path: qualification/
