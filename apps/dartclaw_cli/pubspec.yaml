name: dartclaw_cli
description: Reference DartClaw CLI application for serve, deploy, status, and maintenance workflows.
publish_to: none
version: 0.16.4
repository: https://github.com/DartClaw/dartclaw/tree/main/apps/dartclaw_cli
homepage: https://github.com/DartClaw/dartclaw
issue_tracker: https://github.com/DartClaw/dartclaw/issues
topics:
  - ai
  - cli
  - agents

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  dartclaw_config:
    path: ../../packages/dartclaw_config
  dartclaw_core:
    path: ../../packages/dartclaw_core
  dartclaw_workflow:
    path: ../../packages/dartclaw_workflow
  dartclaw_security:
    path: ../../packages/dartclaw_security
  dartclaw_storage:
    path: ../../packages/dartclaw_storage
  dartclaw_server:
    path: ../../packages/dartclaw_server
  dartclaw_google_chat:
    path: ../../packages/dartclaw_google_chat
  dartclaw_whatsapp:
    path: ../../packages/dartclaw_whatsapp
  dartclaw_signal:
    path: ../../packages/dartclaw_signal
  args: ^2.7.0
  archive: ^4.0.9
  crypto: ^3.0.7
  http: ^1.6.0
  logging: ^1.3.0
  mason_logger: ^0.3.5
  meta: ^1.18.0
  path: ^1.9.1
  shelf: ^1.4.2
  sqlite3: ^3.1.6
  yaml: ^3.1.2
  yaml_edit: ^2.2.2

dev_dependencies:
  dartclaw_testing:
    path: ../../packages/dartclaw_testing
  fake_async: ^1.3.3
  test: ^1.31.0
  lints: ^6.1.0

hooks:
  user_defines:
    sqlite3:
      source: system
