# DartClaw — Personal Assistant Config
# Usage: dartclaw --config examples/personal-assistant.yaml serve
# Long-running knowledge companion with journaling, research, and git backup.
# See docs/guide/use-cases/00-personal-assistant.md for the full guide.

name: Jarvis
data_dir: ~/.dartclaw-assistant

agent:
  model: sonnet
  max_turns: 100
  agents:
    search:
      tools: [WebSearch, WebFetch]
      model: haiku
    cron:
      model: sonnet                    # cost-optimized for scheduled jobs

memory_max_bytes: 65536

sessions:
  idle_timeout_minutes: 480
  dm_scope: per-contact
  group_scope: shared
  maintenance:
    mode: enforce
    prune_after_days: 90
    max_sessions: 500

scheduling:
  heartbeat:
    enabled: true
    interval_minutes: 60
  jobs:
    - id: daily-journal
      prompt: "Review today's conversations and update MEMORY.md with key insights, decisions, and action items."
      schedule:
        type: cron
        expression: "0 22 * * *"
      delivery: none
    - id: weekly-review
      prompt: "Summarize this week's activity, highlight patterns, and suggest focus areas for next week."
      schedule:
        type: cron
        expression: "0 10 * * 1"
      delivery: announce

workspace:
  git_sync:
    enabled: true
    push_enabled: true

# Guards enabled but relaxed for personal use
guards:
  enabled: true
  fail_open: false
  content:
    enabled: true
    model: claude-haiku-4-5-20251001
  input_sanitizer:
    enabled: true
    channels_only: true

