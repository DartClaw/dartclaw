# DartClaw — Production Config
# Usage: dartclaw --config production.yaml serve
# Assumes secrets injected via env vars.

host: 0.0.0.0

gateway:
  auth_mode: token
  token: ${DARTCLAW_TOKEN}

# Defense-in-depth: guards + container isolation
guards:
  enabled: true
  fail_open: false
  command:
    extra_blocked_patterns:
      - 'curl.*--upload'
      - 'wget.*--post'
  file:
    extra_rules:
      - pattern: '*.pem'
        level: no_access
      - pattern: '*.key'
        level: no_access
  network:
    extra_allowed_domains:
      - api.anthropic.com
  input_sanitizer:
    enabled: true
    channels_only: true        # only scan channel messages (WhatsApp/Signal); web UI bypasses
    # extra_patterns:           # additional regex patterns (case-insensitive)
    #   - 'custom\s+injection'
  content:
    enabled: true
    model: claude-haiku-4-5-20251001
    max_bytes: 51200

container:
  enabled: true
  image: dartclaw-sandbox:latest
  mount_allowlist:
    - ~/projects

logging:
  level: INFO
  format: json
  file: ${HOME}/.dartclaw/logs/dartclaw.log
  redact_patterns:
    - 'sk-ant-[a-zA-Z0-9-]+'
    - 'Bearer [a-zA-Z0-9._-]+'

sessions:
  idle_timeout_minutes: 120

concurrency:
  max_parallel_turns: 2

# Search agent uses cheaper/faster model by default (claude-haiku-4-5).
# Override here if needed:
# agent:
#   agents:
#     search:
#       model: claude-haiku-4-5

# Channel integrations (see docs/guide/whatsapp.md and docs/guide/signal.md)
# channels:
#   whatsapp:
#     enabled: true
#     gowa_executable: whatsapp    # binary name or absolute path
#     gowa_port: 3000
#     dm_access: pairing           # pairing | allowlist | open | disabled
#     group_access: disabled       # allowlist | open | disabled
#     require_mention: true
#     mention_patterns:
#       - '@DartClaw'
#     max_chunk_size: 4000
#   signal:
#     enabled: true
#     phone_number: "+1234567890"  # E.164 format
#     executable: signal-cli       # binary name or absolute path
#     port: 8080
#     dm_access: allowlist         # allowlist | open | disabled
#     group_access: disabled       # allowlist | open | disabled
#     require_mention: true
#     mention_patterns:
#       - '@DartClaw'
#     max_chunk_size: 4000

context:
  reserve_tokens: 25000
