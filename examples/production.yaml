# DartClaw — Production Config
# Usage: dartclaw --config production.yaml serve
# Assumes secrets injected via env vars.

host: 0.0.0.0

gateway:
  auth_mode: token
  token: ${DARTCLAW_TOKEN}

# Defense-in-depth: guards + container isolation
guards:
  enabled: true
  fail_open: false
  command:
    extra_blocked_patterns:
      - 'curl.*--upload'
      - 'wget.*--post'
  file:
    extra_rules:
      - pattern: '*.pem'
        level: no_access
      - pattern: '*.key'
        level: no_access
  network:
    extra_allowed_domains:
      - api.anthropic.com
  input_sanitizer:
    enabled: true
    channels_only: true        # only scan channel messages (WhatsApp/Signal); web UI bypasses
    # extra_patterns:           # additional regex patterns (case-insensitive)
    #   - 'custom\s+injection'
  content:
    enabled: true
    model: haiku
    max_bytes: 51200

container:
  enabled: true
  image: dartclaw-sandbox:latest
  mount_allowlist:
    - ~/projects

logging:
  level: INFO
  format: json
  file: ${HOME}/.dartclaw/logs/dartclaw.log
  redact_patterns:
    - 'sk-ant-[a-zA-Z0-9-]+'
    - 'Bearer [a-zA-Z0-9._-]+'

sessions:
  idle_timeout_minutes: 120

concurrency:
  max_parallel_turns: 2

# Agent model and reasoning effort (default: opus[1m]).
# Models: haiku, sonnet, opus, opus[1m]. Effort: low, medium, high, max.
# agent:
#   model: sonnet              # override to use a cheaper model
#   effort: high
#   agents:
#     search:
#       model: haiku
#       effort: low

# Channel integrations (see docs/guide/whatsapp.md and docs/guide/signal.md)
# channels:
#   whatsapp:
#     enabled: true
#     gowa_executable: whatsapp    # binary name or absolute path
#     gowa_port: 3000
#     dm_access: pairing           # pairing | allowlist | open | disabled
#     group_access: disabled       # allowlist | open | disabled
#     require_mention: true
#     mention_patterns:
#       - '@DartClaw'
#     max_chunk_size: 4000
#   signal:
#     enabled: true
#     phone_number: "+1234567890"  # E.164 format
#     executable: signal-cli       # binary name or absolute path
#     port: 8080
#     dm_access: allowlist         # allowlist | open | disabled
#     group_access: disabled       # allowlist | open | disabled
#     require_mention: true
#     mention_patterns:
#       - '@DartClaw'
#     max_chunk_size: 4000

# Codex provider (OpenAI models) — uncomment to enable alongside Claude
# providers:
#   claude:
#     executable: claude
#     pool_size: 1
#   codex:
#     executable: codex
#     pool_size: 2
#     approval: never              # prevents approval deadlock on tool-use turns
#     sandbox: danger-full-access  # prevents sandbox-related stalls
#                                  # DartClaw's guard chain + container isolation remain active
# credentials:
#   anthropic:
#     api_key: ${ANTHROPIC_API_KEY}
#   openai:
#     # CODEX_API_KEY is preferred for non-interactive `codex exec`; OPENAI_API_KEY is accepted as a legacy fallback.
#     api_key: ${CODEX_API_KEY}

context:
  reserve_tokens: 25000
