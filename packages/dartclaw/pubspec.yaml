name: dartclaw
description: >-
  An experimental, security-conscious AI agent runtime built with Dart.
  Subprocess harness for the Claude CLI binary via JSONL control protocol,
  with guard chain, session management, and multi-channel messaging.
version: 0.9.0
publish_to: none
repository: https://github.com/DartClaw/dartclaw
homepage: https://github.com/DartClaw/dartclaw
issue_tracker: https://github.com/DartClaw/dartclaw/issues
topics:
  - ai
  - cli
  - agents
  - security
  - chat

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  dartclaw_core:
    path: ../dartclaw_core
  dartclaw_storage:
    path: ../dartclaw_storage
  dartclaw_whatsapp:
    path: ../dartclaw_whatsapp
  dartclaw_signal:
    path: ../dartclaw_signal
  dartclaw_google_chat:
    path: ../dartclaw_google_chat

dev_dependencies:
  dartclaw_config:
    path: ../dartclaw_config
  test: ^1.31.0
  lints: ^6.1.0
