name: dartclaw
description: >-
  Security-hardened AI agent runtime for Dart. Subprocess harness for the
  Claude CLI binary via JSONL control protocol, with guard chain, session
  management, and multi-channel messaging.
version: 0.6.0
publish_to: none
repository: https://github.com/tolo/dartclaw

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  dartclaw_core:
    path: ../dartclaw_core
  dartclaw_storage:
    path: ../dartclaw_storage
