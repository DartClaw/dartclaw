  meta: ^1.16.0
  path: ^1.9.1
  yaml: ^3.1.3

dev_dependencies:
  dartclaw_google_chat:
    path: ../dartclaw_google_chat
  dartclaw_testing:
    path: ../dartclaw_testing
  test: ^1.29.0
  lints: ^6.0.0
