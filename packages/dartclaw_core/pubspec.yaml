name: dartclaw_core
description: Core DartClaw runtime primitives for channel management, harness orchestration, tasks, and memory services.
publish_to: none
version: 0.9.0
repository: https://github.com/tolo/dartclaw/tree/main/packages/dartclaw_core
homepage: https://github.com/tolo/dartclaw
