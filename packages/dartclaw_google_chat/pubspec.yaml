name: dartclaw_google_chat
description: Google Chat channel adapter for DartClaw, including inbound messages and outbound API responses.
publish_to: none
version: 0.9.0
repository: https://github.com/tolo/dartclaw/tree/main/packages/dartclaw_google_chat
homepage: https://github.com/tolo/dartclaw
issue_tracker: https://github.com/tolo/dartclaw/issues
topics:
  - ai
  - chat
  - messaging
  - agents

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  dartclaw_core:
    path: ../dartclaw_core
  googleapis_auth: ^1.6.0
  http: ^1.5.0
  logging: ^1.3.0

dev_dependencies:
  test: ^1.29.0
  lints: ^6.0.0
