<div class="shell">
  <div tl:utext="${sidebar}">sidebar</div>
  <div tl:utext="${topbar}">topbar</div>
  <main id="main-content" tabindex="-1" hx-history-elt class="page-content">
    <div class="page-inner">
      <div tl:if="${bannerHtml}" tl:utext="${bannerHtml}">banner</div>

      <style>
        .canvas-admin-grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 1.5rem;
        }
        @media (max-width: 960px) {
          .canvas-admin-grid { grid-template-columns: 1fr; }
        }

        .canvas-admin-card {
          background: var(--surface-0, #181825);
          border: 1px solid var(--surface-2, rgba(255, 255, 255, 0.08));
          border-radius: 18px;
          padding: 1.25rem;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .canvas-admin-card h2 {
          margin: 0 0 0.5rem;
        }

        .canvas-admin-card p {
          margin: 0 0 1rem;
          color: var(--text-muted, #a6adc8);
        }

        .canvas-embed-frame {
          width: 100%;
          min-height: 28rem;
          border: 0;
          border-radius: 14px;
          background: #0f172a;
        }

        .canvas-controls {
          display: grid;
          gap: 1rem;
        }

        .canvas-controls-row {
          display: flex;
          flex-wrap: wrap;
          gap: 0.75rem;
        }

        .canvas-controls-row input,
        .canvas-controls-row select {
          min-width: 11rem;
        }

        .canvas-share-list {
          display: grid;
          gap: 0.75rem;
        }

        .canvas-share-item {
          border: 1px solid var(--surface-2, rgba(255, 255, 255, 0.08));
          border-radius: 14px;
          padding: 0.9rem;
          display: grid;
          gap: 0.6rem;
        }

        .canvas-share-meta {
          display: flex;
          flex-wrap: wrap;
          gap: 0.75rem;
          color: var(--text-muted, #a6adc8);
          font-size: 0.92rem;
        }

        .canvas-share-url {
          font-family: var(--font-mono, "SF Mono", monospace);
          font-size: 0.92rem;
          word-break: break-all;
        }

        .canvas-share-actions {
          display: flex;
          flex-wrap: wrap;
          gap: 0.5rem;
        }

        .canvas-qr {
          max-width: 13rem;
          background: white;
          border-radius: 12px;
          padding: 0.75rem;
        }

        .canvas-empty-state {
          color: var(--text-muted, #a6adc8);
          font-style: italic;
        }
      </style>

      <section class="canvas-admin-grid" data-controller="dc-canvas-admin" tl:attr="data-dc-canvas-admin-session-key-value=${sessionKey}">
        <article class="canvas-admin-card">
          <h2>Live Canvas</h2>
          <p>Sandboxed embed of the shareable canvas surface.</p>
          <iframe
            sandbox="allow-scripts allow-forms"
            tl:attr="src=${embedUrl}"
            class="canvas-embed-frame"></iframe>
        </article>

        <article class="canvas-admin-card">
          <h2>Share Links</h2>
          <p>Create and revoke public canvas links for workshop viewers.</p>
          <div class="canvas-controls">
            <div class="canvas-controls-row">
              <select id="canvas-share-permission" data-dc-canvas-admin-target="permission">
                <option value="interact">Interact</option>
                <option value="view">View only</option>
              </select>
              <input id="canvas-share-label" data-dc-canvas-admin-target="label" type="text" maxlength="60" placeholder="Optional label">
              <button id="canvas-share-generate" class="btn btn-primary" type="button" data-action="click->dc-canvas-admin#generateShare">Generate Share Link</button>
            </div>
            <div id="canvas-share-list" class="canvas-share-list" data-dc-canvas-admin-target="list" data-action="click->dc-canvas-admin#listClick">
              <div class="canvas-empty-state">No active share links yet.</div>
            </div>
          </div>
        </article>
      </section>
    </div>
  </main>
</div>
