<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DartClaw Canvas Embed</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --surface: rgba(15, 23, 42, 0.88);
        --text: #e2e8f0;
        --muted: #94a3b8;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.14), transparent 32%), var(--bg);
        color: var(--text);
        font-family: "SF Pro Display", "Segoe UI", sans-serif;
      }

      body.canvas-hidden #canvas-content {
        opacity: 0.35;
      }

      #canvas-content {
        min-height: 100vh;
        padding: 1.25rem;
        background: var(--surface);
        transition: opacity 160ms ease;
      }

      .canvas-empty {
        min-height: calc(100vh - 2.5rem);
        display: grid;
        place-items: center;
        text-align: center;
        color: var(--muted);
      }
    </style>
  </head>
  <body tl:attr="data-session-key=${sessionKey},data-stream-url=${streamUrl}">
    <main id="canvas-content">
      <div class="canvas-empty">Waiting for canvas content...</div>
    </main>
    <script tl:attr="nonce=${nonce}">
      (() => {
        const body = document.body;
        const content = document.getElementById('canvas-content');
        const emptyHtml = content.innerHTML;
        const streamUrl = body.dataset.streamUrl;
        let source = null;

        function updateHtml(html) {
          content.innerHTML = html || emptyHtml;
        }

        function setVisible(visible) {
          body.classList.toggle('canvas-hidden', visible === false);
        }

        function connect() {
          if (source) {
            source.close();
          }
          source = new EventSource(streamUrl);
          source.addEventListener('canvas_state', (event) => {
            const payload = JSON.parse(event.data);
            updateHtml(payload.html);
            setVisible(payload.visible);
          });
          source.addEventListener('canvas_update', (event) => {
            const payload = JSON.parse(event.data);
            updateHtml(payload.html);
            setVisible(payload.visible);
          });
          source.addEventListener('canvas_clear', (event) => {
            const payload = JSON.parse(event.data);
            updateHtml('');
            setVisible(payload.visible);
          });
          source.addEventListener('canvas_visible', (event) => {
            const payload = JSON.parse(event.data);
            setVisible(payload.visible);
          });
        }

        connect();
      })();
    </script>
  </body>
</html>
