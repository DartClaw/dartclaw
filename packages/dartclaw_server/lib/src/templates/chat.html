<div tl:fragment="userMessage" class="msg msg-user">
  <div class="msg-role"><span tl:if="${hasSenderName}" tl:text="${senderName}">Alice</span><span tl:unless="${hasSenderName}">You</span></div>
  <div class="msg-content"><p tl:text="${content}">Message</p></div>
</div>

<div tl:fragment="assistantMessage" class="msg msg-assistant">
  <div class="msg-role">Assistant</div>
  <div class="msg-content" data-markdown="" tl:text="${content}">Response</div>
</div>

<div tl:fragment="guardBlock" class="msg msg-guard-block">
  <div class="guard-block-header">
    <span class="guard-block-icon icon icon-shield-alert" aria-hidden="true"></span>
    <span class="guard-block-label">GUARD BLOCKED</span>
  </div>
  <div class="guard-block-reason" tl:text="${detail}">Blocked</div>
</div>

<div tl:fragment="turnFailed" class="msg msg-turn-failed">
  <div class="msg-turn-failed-header">
    <span class="msg-turn-failed-icon icon icon-triangle-alert" aria-hidden="true"></span>
    <span class="msg-turn-failed-label">Turn failed</span>
  </div>
  <div tl:if="${detail}" class="msg-turn-failed-detail" tl:text="${detail}">Error detail</div>
</div>

<main tl:fragment="chatArea" id="main-content" tabindex="-1" hx-history-elt class="chat-area"
  tl:attr="data-session-id=${sessionId},data-has-title=${hasTitle},data-earliest-cursor=${earliestCursor}">
  <div tl:if="${bannerHtml}" tl:utext="${bannerHtml}">banner</div>
  <div class="chat-load-earlier">
    <button id="load-earlier-btn" type="button" class="btn btn-ghost" data-load-earlier=""
            tl:attr="hidden=${loadEarlierHidden}">
      Load earlier messages
    </button>
  </div>
  <div class="messages" id="messages" tl:utext="${messagesHtml}">messages</div>
  <div tl:if="${readOnly}" class="input-area">
    <div class="archive-notice">This is an archived session. Resume it to continue the conversation.</div>
  </div>
  <div tl:unless="${readOnly}" class="input-area">
    <form id="chat-form" tl:attr="hx-post=${sendUrl}" hx-target="#messages" hx-swap="beforeend">
      <label class="sr-only" for="message-input">Message</label>
      <textarea id="message-input" name="message" rows="1"
                tl:attr="placeholder=${placeholder},disabled=${inputDisabled}"></textarea>
      <button id="send-btn" class="btn btn-primary btn-send" type="submit"
              tl:attr="disabled=${inputDisabled}">Send</button>
    </form>
  </div>
</main>

<tl:block tl:fragment="sendResponse">
  <div class="msg msg-user">
    <div class="msg-role">You</div>
    <div class="msg-content"><p tl:text="${message}">message</p></div>
  </div>
  <div class="msg msg-assistant" id="streaming-msg"
       hx-ext="sse"
       tl:attr="sse-connect=${sseUrl}"
       sse-close="done">
    <div class="msg-role">Assistant</div>
    <div class="msg-content streaming" id="streaming-content"
         sse-swap="delta" hx-swap="beforeend">
    </div>
    <div id="tool-container"
         sse-swap="tool_use" hx-swap="beforeend">
    </div>
    <div sse-swap="tool_result" hx-swap="none"></div>
    <div id="turn-error-target" sse-swap="turn_error" hx-swap="innerHTML" style="display:none"
         hx-on::after-swap="dartclaw.handleTurnError(event)"></div>
  </div>
</tl:block>
