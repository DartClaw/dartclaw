<div tl:fragment="banner" class="banner" tl:classappend="'banner-' + ${type}">
  <span tl:text="${message}">Notification message</span>
  <button class="dismiss" aria-label="Dismiss" data-icon="x"></button>
</div>

<div tl:fragment="emptyState" class="empty-state">
  <div class="icon">&#10095;_</div>
  <p><strong>No messages yet</strong></p>
  <p>Send a message to start the conversation.</p>
</div>

<main tl:fragment="emptyAppState" id="main-content" tabindex="-1" hx-history-elt class="chat-area">
  <div class="empty-state flex-fill">
    <div class="icon">&#10095;_</div>
    <p><strong>No chats yet</strong></p>
    <p tl:text="'Create a new chat to start chatting with ' + ${appName} + '.'">Create a new chat to start chatting with DartClaw.</p>
    <button class="btn btn-primary" data-action="create-session">+ New Chat</button>
  </div>
</main>

<span tl:fragment="statusBadge" class="status-badge"
      tl:classappend="'status-badge-' + ${variant}"
      tl:text="${text}">status</span>

<div tl:fragment="metricCard" class="card card-metric"
     tl:classappend="'card-metric--' + ${color}">
  <div class="metric-value" tl:text="${value}">0</div>
  <div class="metric-label" tl:text="${label}">Metric</div>
</div>

<div tl:fragment="infoCard" class="card">
  <div class="card-header">
    <span class="card-title" tl:text="${title}">Title</span>
    <span class="card-badge" tl:classappend="${badgeClass}" tl:text="${badgeText}">ok</span>
  </div>
  <div class="card-rows">
    <div class="card-row" tl:each="row : ${rows}">
      <span class="card-row-label" tl:text="${row.label}">Label</span>
      <span class="card-row-value" tl:classappend="${row.valueClass}" tl:text="${row.value}">Value</span>
    </div>
  </div>
</div>
