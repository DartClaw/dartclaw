<div tl:fragment="healthDashboard" class="shell">
  <div tl:utext="${sidebar}"><!-- sidebar --></div>
  <div tl:utext="${topbar}"><!-- topbar --></div>
  <main id="main-content" tabindex="-1" hx-history-elt class="dashboard">
    <div tl:if="${bannerHtml}" tl:utext="${bannerHtml}">restart banner</div>
    <div class="dashboard-inner">

      <div class="status-hero" tl:classappend="${statusColorClass}">
        <div class="status-indicator" tl:utext="${statusIcon}"><!-- icon --></div>
        <div class="status-details">
          <div class="status-label" tl:text="${statusLabel}">Healthy</div>
          <dl class="status-meta">
            <div><dt>Uptime</dt><dd tl:text="${uptimeStr}">0m</dd></div>
            <div><dt>Version</dt><dd tl:text="${version}">0.0.0</dd></div>
            <div><dt>Worker</dt><dd tl:text="${workerState}">unknown</dd></div>
          </dl>
        </div>
      </div>

      <h2 class="section-label">Services</h2>
      <div class="card-grid">
        <tl:block tl:utext="${cardsHtml}"><!-- service info cards --></tl:block>
      </div>

      <h2 class="section-label">Metrics</h2>
      <div class="metrics-grid">
        <tl:block tl:utext="${metricsHtml}"><!-- metric cards --></tl:block>
      </div>

      <h2 class="section-label">Guard Activity</h2>
      <div class="table-section" tl:utext="${auditSection}"><!-- audit table --></div>

    </div>
  </main>
</div>
