<div tl:fragment="healthDashboard" class="shell">
  <div tl:utext="${sidebar}"><!-- sidebar --></div>
  <div tl:utext="${topbar}"><!-- topbar --></div>
  <main id="main-content" tabindex="-1" hx-history-elt class="content-area print-in">
    <div tl:if="${bannerHtml}" tl:utext="${bannerHtml}">restart banner</div>
    <div class="content-inner"
         data-controller="dc-health"
         data-health-refresh
         hx-get="/health-dashboard"
         hx-target="this"
         hx-select=".content-inner"
         hx-swap="outerHTML"
         hx-trigger="refresh">

      <div class="card" tl:classappend="${statusCardClass}">
        <div class="card-header">
          <span class="status-badge" tl:classappend="${statusBadgeClass}">
            <span class="status-dot" tl:classappend="${statusDotClass}" aria-hidden="true"></span>
            <span tl:text="${statusLabel}">Healthy</span>
          </span>
        </div>
        <div class="card-rows">
          <div class="card-row"><span class="card-row-label">Uptime</span><span class="card-row-value" tl:text="${uptimeStr}">0m</span></div>
          <div class="card-row"><span class="card-row-label">Version</span><span class="card-row-value" tl:text="${version}">0.0.0</span></div>
          <div class="card-row"><span class="card-row-label">Worker</span><span class="card-row-value" tl:text="${workerState}">unknown</span></div>
        </div>
      </div>

      <h2 class="section-label">Services</h2>
      <div class="card-grid">
        <tl:block tl:utext="${cardsHtml}"><!-- service info cards --></tl:block>
      </div>

      <h2 class="section-label">Metrics</h2>
      <div class="metrics-grid">
        <tl:block tl:utext="${metricsHtml}"><!-- metric cards --></tl:block>
      </div>

      <h2 class="section-label">Guard Activity</h2>
      <div class="table-section" tl:utext="${auditSection}"><!-- audit table --></div>

    </div>
  </main>
</div>
