<div tl:fragment="sessionInfo" class="shell">
  <div tl:utext="${sidebar}">sidebar</div>
  <div tl:utext="${topbar}">topbar</div>
  <main id="main-content" tabindex="-1" hx-history-elt class="info-content">
    <div tl:if="${bannerHtml}" tl:utext="${bannerHtml}">restart banner</div>
    <div class="info-inner">

      <div>
        <div class="info-title" tl:text="${title}">Session Title</div>
        <div class="info-subtitle" tl:text="${sessionId}">session-id</div>
      </div>

      <div>
        <h2 class="section-label">Token Usage</h2>
        <div class="token-grid">
          <div class="token-stat">
            <div class="token-stat-label" tl:attr="title=${inputTooltip}" tl:text="${inputLabel}">Input</div>
            <div class="token-stat-value" tl:text="${inputStr}">0</div>
          </div>
          <div class="token-stat">
            <div class="token-stat-label">Output</div>
            <div class="token-stat-value" tl:text="${outputStr}">0</div>
          </div>
          <div class="token-stat total">
            <div>
              <div class="token-stat-label">Total</div>
              <div class="token-stat-value" tl:text="${totalStr}">0</div>
            </div>
          </div>
        </div>
        <div class="meta-row">
          <span class="meta-label">Cost</span>
          <span tl:if="${hasEstimatedCost}" class="meta-value" tl:text="${estimatedCostDisplay}">$0.00</span>
          <span tl:unless="${hasEstimatedCost}" class="meta-value"
            title="This provider does not report USD cost. Token counts are tracked for governance budgets.">cost unavailable</span>
        </div>
        <div tl:if="${hasCachedTokens}" class="meta-row">
          <span class="meta-label">Cached Input</span>
          <span class="meta-value" tl:text="${cachedTokensDisplay}">0</span>
        </div>
        <div tl:if="${hasEffectiveTokens}" class="meta-row">
          <span class="meta-label" tl:attr="title=${effectiveTokensTooltip}">Effective Tokens</span>
          <span class="meta-value" tl:text="${effectiveTokensDisplay}">0</span>
        </div>
      </div>

      <div>
        <h2 class="section-label">Session Details</h2>
        <div class="meta-row">
          <span class="meta-label">Messages</span>
          <span class="meta-value" tl:text="${messageCount}">0</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Created</span>
          <span class="meta-value" tl:text="${createdAt}">—</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Session ID</span>
          <span class="meta-value meta-value-mono" tl:text="${sessionId}">session-id</span>
        </div>
      </div>

      <div tl:if="${hasRecentTurns}">
        <h2 class="section-label">Recent Turns</h2>
        <div class="card card-compact">
          <div class="turns-list">
            <div tl:each="turn : ${recentTurns}" class="turn-row">
              <span class="turn-time" tl:text="${turn.time}">00:00</span>
              <span class="turn-role" tl:classappend="${turn.roleClass}" tl:text="${turn.roleLabel}">Role</span>
              <span class="turn-excerpt" tl:text="${turn.excerpt}">...</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>
