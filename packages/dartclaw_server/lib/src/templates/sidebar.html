<aside tl:fragment="sidebar" class="sidebar" id="sidebar" tl:attr="data-tasks-enabled=${tasksEnabledAttr}">
  <div class="sidebar-header">
    <span class="logo" tl:text="'❯ ' + ${appName}">❯ DartClaw</span>
  </div>

  <div tl:if="${mainSession}" class="sidebar-section-label">Workspace</div>
  <div tl:if="${mainSession}" class="session-item session-item-main"
    tl:classappend="${mainActive} ? 'active' : ''">
    <a tl:attr="href=${mainHref},hx-get=${mainHref},data-icon=${'terminal'}" class="session-item-link"
      hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true"
      hx-select-oob="#topbar,#sidebar">
      <span class="session-item-title">Agent</span>
      <span tl:if="${mainProvider}" class="provider-badge"
        tl:classappend="'provider-badge-' + ${mainProvider}"
        tl:text="${mainProviderLabel}">Claude</span></a>
  </div>

  <div tl:if="${showChannels}">
    <hr class="sidebar-divider">

    <div class="sidebar-section-label">Channels</div>
    <div tl:if="${noChannels}" class="sidebar-placeholder">No active channels</div>

    <div tl:if="${showDmLabel}" class="sidebar-subsection-label">DMs</div>
    <div tl:each="ch : ${dmChannels}" class="session-item session-item-channel"
      tl:classappend="${ch.active} ? 'active' : ''">
      <a tl:attr="href=${ch.href},hx-get=${ch.href},data-icon=${'hash'}" class="session-item-link"
        hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true"
        hx-select-oob="#topbar,#sidebar">
        <span class="session-item-title" tl:text="${ch.title}">Channel</span>
        <span tl:if="${ch.provider}" class="provider-badge"
          tl:classappend="'provider-badge-' + ${ch.provider}"
          tl:text="${ch.providerLabel}">Claude</span></a>
    </div>

    <div tl:if="${hasGroupChannels}" class="sidebar-subsection-label">Groups</div>
    <div tl:each="ch : ${groupChannels}" class="session-item session-item-channel"
      tl:classappend="${ch.active} ? 'active' : ''">
      <a tl:attr="href=${ch.href},hx-get=${ch.href},data-icon=${'hash'}" class="session-item-link"
        hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true"
        hx-select-oob="#topbar,#sidebar">
        <span class="session-item-title" tl:text="${ch.title}">Channel</span>
        <span tl:if="${ch.provider}" class="provider-badge"
          tl:classappend="'provider-badge-' + ${ch.provider}"
          tl:text="${ch.providerLabel}">Claude</span></a>
    </div>

    <hr class="sidebar-divider">
  </div>

  <div tl:if="${hasActiveTasks}" id="sidebar-running">
    <div class="sidebar-section-label sidebar-running-label">Running</div>
    <div tl:each="task : ${activeTasks}" class="session-item sidebar-running-item">
      <a tl:attr="href=${task.href},hx-get=${task.href}" class="session-item-link"
        hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true"
        hx-select-oob="#topbar,#sidebar">
        <span tl:if="${task.isReview}" class="status-dot status-dot--warning" aria-hidden="true"></span>
        <span tl:unless="${task.isReview}" class="status-dot status-dot--live" aria-hidden="true"></span>
        <span class="session-item-title" tl:text="${task.title}">Task</span>
        <span tl:if="${task.isReview}" class="running-review-label">review</span>
        <span tl:unless="${task.isReview}" class="task-elapsed running-elapsed"
          tl:attr="data-started-at=${task.startedAt}">--:--</span>
        <span class="provider-badge" tl:classappend="'provider-badge-' + ${task.provider}"
          tl:text="${task.providerLabel}">Claude</span>
      </a>
    </div>
    <hr class="sidebar-divider sidebar-running-divider">
  </div>

  <div tl:if="${hasActiveWorkflows}" id="sidebar-workflows">
    <div class="sidebar-section-label sidebar-workflows-label">Workflows</div>
    <div tl:each="workflow : ${activeWorkflows}" class="session-item sidebar-workflow-item">
      <a tl:attr="href=${workflow.href},hx-get=${workflow.href}" class="session-item-link"
        hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true"
        hx-select-oob="#topbar,#sidebar">
        <span tl:if="${workflow.isPaused}" class="status-dot status-dot--warning" aria-hidden="true"></span>
        <span tl:unless="${workflow.isPaused}" class="status-dot status-dot--live" aria-hidden="true"></span>
        <span class="session-item-title" tl:text="${workflow.title}">Workflow</span>
        <span class="workflow-step-progress" tl:text="${workflow.progress}">0/0</span>
      </a>
    </div>
    <hr class="sidebar-divider sidebar-workflows-divider">
  </div>

  <div class="sidebar-section-label">Chats</div>
  <button class="btn btn-ghost btn-new-session" data-action="create-session" data-icon="new-session">New Chat</button>
  <div tl:if="${noActiveEntries}" class="sidebar-placeholder">No chats yet</div>

  <div tl:each="entry : ${activeEntries}" class="session-item"
    tl:classappend="${entry.extraClass}">
    <a tl:attr="href=${entry.href},hx-get=${entry.href},data-icon=${'message-circle'}" class="session-item-link"
      hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true"
      hx-select-oob="#topbar,#sidebar">
      <span class="session-item-title" tl:text="${entry.title}">Session</span>
      <span tl:if="${entry.provider}" class="provider-badge"
        tl:classappend="'provider-badge-' + ${entry.provider}"
        tl:text="${entry.providerLabel}">Claude</span></a>
    <button class="session-delete" data-action="archive-session"
      tl:attr="data-session-id=${entry.id},data-icon=${'x'}" aria-label="Archive chat"></button>
  </div>

  <div tl:if="${hasArchivedEntries}" class="sidebar-archive-section"
    tl:classappend="${archiveContainsActive} ? 'force-expanded' : ''">
    <button class="sidebar-archive-toggle" aria-expanded="false"
      data-action="toggle-archive">
      <span class="sidebar-archive-label">Archived</span>
      <span class="sidebar-archive-count" tl:text="${archivedCount}">0</span>
      <span class="sidebar-archive-chevron" data-icon="chevron-down" aria-hidden="true"></span>
    </button>
    <div class="sidebar-archive-list" style="display: none;">
      <div tl:each="entry : ${archivedEntries}" class="session-item session-item-archive"
        tl:classappend="${entry.extraClass}">
        <a tl:attr="href=${entry.href},hx-get=${entry.href},data-icon=${'archive'}" class="session-item-link"
          hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true"
          hx-select-oob="#topbar,#sidebar">
          <span class="session-item-title" tl:text="${entry.title}">Archived session</span>
          <span tl:if="${entry.provider}" class="provider-badge"
            tl:classappend="'provider-badge-' + ${entry.provider}"
            tl:text="${entry.providerLabel}">Claude</span></a>
        <button class="session-delete" data-action="delete-session"
          tl:attr="data-session-id=${entry.id},data-icon=${'x'}" aria-label="Delete session"></button>
      </div>
    </div>
  </div>

  <nav tl:if="${hasNav}" class="sidebar-section" aria-label="Dashboard navigation">
    <div tl:if="${showSystemNav}" class="sidebar-section-label">System</div>
    <a tl:each="nav : ${systemNavItems}" class="sidebar-nav-item"
      tl:classappend="${nav.active} ? 'active' : ''"
      tl:attr="href=${nav.href},hx-get=${nav.href},aria-current=${nav.ariaCurrent},data-icon=${nav.icon}"
      hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true"
      hx-select-oob="#topbar,#sidebar"
      tl:utext="${nav.label}">Link</a>
    <div tl:if="${showExtensionNav}" class="sidebar-section-label">Extensions</div>
    <a tl:each="nav : ${extensionNavItems}" class="sidebar-nav-item"
      tl:classappend="${nav.active} ? 'active' : ''"
      tl:attr="href=${nav.href},hx-get=${nav.href},aria-current=${nav.ariaCurrent},data-icon=${nav.icon}"
      hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true"
      hx-select-oob="#topbar,#sidebar"
      tl:text="${nav.label}">Link</a>
  </nav>
</aside>
<button class="sidebar-scrim" type="button" aria-label="Close sidebar"></button>
