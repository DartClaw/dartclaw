<div class="shell">
  <div tl:utext="${sidebar}">sidebar</div>
  <div tl:utext="${topbar}">topbar</div>
  <main id="main-content" tabindex="-1" hx-history-elt class="page-content">
    <div class="page-inner workflow-detail-page" tl:attr="data-run-id=${runId}">

      <div tl:if="${bannerHtml}" tl:utext="${bannerHtml}">restart banner</div>

      <!-- Workflow metadata card grid -->
      <div class="workflow-metrics-grid">
        <div class="metric-card">
          <div class="metric-value"><span tl:classappend="${statusBadgeClass}" class="status-badge" tl:text="${statusLabel}">running</span></div>
          <div class="metric-label">Status</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" tl:text="${startedAtDisplay}">2h ago</div>
          <div class="metric-label">Started</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" tl:text="${totalTokens}">15,000</div>
          <div class="metric-label">Tokens</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" tl:text="${durationDisplay}">1h 42m</div>
          <div class="metric-label">Duration</div>
        </div>
      </div>
      <div tl:if="${hasError}" class="workflow-error-message">
        <span class="icon icon-triangle-alert" aria-hidden="true"></span>
        <span tl:text="${errorMessage}">Error message</span>
      </div>

      <!-- Progress bar -->
      <div class="workflow-progress-section">
        <div class="workflow-progress-bar">
          <div class="workflow-progress-fill" tl:attr="style='width: ' + ${progressPercent} + '%'"></div>
        </div>
        <div class="workflow-progress-text">
          <span><span tl:text="${completedSteps}">3</span> / <span tl:text="${totalSteps}">6</span> steps complete</span>
          <span class="workflow-progress-pct" tl:text="${progressPercent} + '%'">50%</span>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="workflow-actions">
        <button tl:if="${canPause}" type="button" class="btn btn-ghost"
                tl:attr="hx-post='/api/workflows/runs/' + ${runId} + '/pause'"
                hx-swap="none">
          Pause
        </button>
        <button tl:if="${canResume}" type="button" class="btn btn-primary"
                tl:attr="hx-post='/api/workflows/runs/' + ${runId} + '/resume'"
                hx-swap="none">
          Resume
        </button>
        <button tl:if="${canRetry}" type="button" class="btn btn-primary"
                tl:attr="hx-post='/api/workflows/runs/' + ${runId} + '/retry'"
                hx-swap="none">
          Retry
        </button>
        <button tl:if="${canCancel}" type="button" class="btn btn-danger"
                tl:attr="hx-post='/api/workflows/runs/' + ${runId} + '/cancel'"
                hx-swap="none"
                hx-confirm="Cancel this workflow? Running tasks will be stopped.">
          Cancel
        </button>
        <!-- Approval controls: shown for awaitingApproval holds -->
        <button tl:if="${canApprove}" type="button" class="btn btn-primary"
                tl:attr="hx-post='/api/workflows/runs/' + ${runId} + '/resume'"
                hx-swap="none">
          Approve
        </button>
        <button tl:if="${canReject}" type="button" class="btn btn-danger"
                tl:attr="hx-post='/api/workflows/runs/' + ${runId} + '/cancel'"
                hx-swap="none"
                hx-confirm="Reject this approval? The workflow will be cancelled.">
          Reject
        </button>
      </div>

      <!-- Vertical pipeline -->
      <div class="workflow-pipeline">
        <div tl:each="step : ${steps}" class="workflow-step-wrapper">
          <div class="workflow-step-connector" tl:unless="${stepStat.first}"></div>
          <div tl:classappend="${step.isActiveStep} ? 'workflow-step-active' : ''"
               class="workflow-step-card card"
               tl:attr="data-step-index=${step.index},data-step-status=${step.status},data-step-id=${step.id}">
            <div class="workflow-step-header" data-step-toggle="">
              <span tl:classappend="'workflow-step-icon--' + ${step.status}" class="workflow-step-icon"
                    tl:utext="${step.statusIcon}">&#x25CB;</span>
              <span class="workflow-step-name" tl:text="${step.name}">Research</span>
              <span tl:if="${step.isLoopStep}" class="workflow-loop-badge"
                    tl:attr="data-loop-id=${step.loopId}"
                    tl:text="'Iteration ' + ${step.loopIteration} + '/' + ${step.loopMaxIterations}">Iteration 1/3</span>
              <span tl:if="${step.isParallel}" class="workflow-parallel-badge">Parallel</span>
              <span class="workflow-step-type" tl:text="${step.typeLabel}">research</span>
              <span tl:if="${step.taskId}" class="workflow-step-task-link">
                <a tl:attr="href='/tasks/' + ${step.taskId}">View task</a>
              </span>
              <span class="workflow-step-expand-icon icon icon-chevron-down" aria-hidden="true"></span>
            </div>
            <div class="workflow-step-detail" tl:attr="id='step-detail-' + ${step.index}"
                 style="display: none;">
              <!-- Approval step: show message and no task link -->
              <div tl:if="${step.isApprovalStep}" class="workflow-approval-detail">
                <div tl:if="${step.hasApproval}" class="workflow-approval-message">
                  <span class="workflow-approval-message-label">Approval request:</span>
                  <span tl:text="${step.approvalMessage}">Approve?</span>
                </div>
                <div tl:if="${step.hasApprovalFeedback}" class="workflow-approval-feedback">
                  <span class="workflow-approval-feedback-label">Feedback:</span>
                  <span tl:text="${step.approvalFeedback}">Not ready</span>
                </div>
              </div>
              <!-- Standard task-backed step -->
              <div tl:unless="${step.isApprovalStep}" class="workflow-step-detail-loading"
                   tl:attr="hx-get='/workflows/' + ${runId} + '/steps/' + ${step.index},hx-trigger='intersect once',hx-swap='innerHTML'">
                Loading step details...
              </div>
            </div>
          </div>
        </div>
        <div tl:unless="${hasSteps}" class="empty-state-text">No steps defined.</div>
      </div>

      <!-- Shared context viewer -->
      <div tl:if="${hasContext}" class="workflow-context-viewer card">
        <div class="workflow-context-header" data-context-toggle="">
          <span>Shared Context</span>
          <span class="icon icon-chevron-down" aria-hidden="true"></span>
        </div>
        <div class="workflow-context-body" style="display: none;">
          <div tl:each="entry : ${contextEntries}" class="workflow-context-entry">
            <span class="workflow-context-key" tl:text="${entry.key}">key</span>
            <span tl:classappend="${entry.isLong} ? 'workflow-context-value-long' : ''"
                  class="workflow-context-value" tl:text="${entry.value}">value</span>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>
