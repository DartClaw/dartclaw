<div tl:fragment="stepDetail" class="workflow-step-detail-content">
  <div tl:if="${hasSession}" class="workflow-step-chat">
    <h4>Session</h4>
    <div class="messages" tl:utext="${messagesHtml}">messages</div>
  </div>
  <div tl:unless="${hasSession}" class="workflow-step-no-session">
    <span class="empty-state-text" tl:text="${noSessionText}">No session yet.</span>
  </div>

  <div tl:if="${hasArtifacts}" class="workflow-step-artifacts">
    <h4>Artifacts</h4>
    <div tl:each="artifact : ${artifacts}" class="artifact-item">
      <span tl:classappend="${artifact.badgeClass}" class="workflow-artifact-badge" tl:text="${artifact.kindLabel}">Document</span>
      <span class="artifact-name" tl:text="${artifact.name}">output.md</span>
    </div>
  </div>

  <div tl:if="${hasContextInputs}" class="workflow-step-context-io">
    <h4>Context Inputs</h4>
    <div tl:each="input : ${contextInputs}" class="workflow-context-entry">
      <span class="workflow-context-key" tl:text="${input.key}">key</span>
      <span class="workflow-context-value" tl:text="${input.value}">value</span>
    </div>
  </div>

  <div tl:if="${hasContextOutputs}" class="workflow-step-context-io">
    <h4>Context Outputs</h4>
    <div tl:each="output : ${contextOutputs}" class="workflow-context-entry">
      <span class="workflow-context-key" tl:text="${output.key}">key</span>
      <span class="workflow-context-value" tl:text="${output.value}">value</span>
    </div>
  </div>

  <div tl:if="${hasMetrics}" class="workflow-step-metrics">
    <span class="workflow-step-metric">Tokens: <span class="workflow-step-metric-value" tl:text="${tokenCount}">0</span></span>
    <span tl:if="${hasDuration}" class="workflow-step-metric">Duration: <span class="workflow-step-metric-value" tl:text="${durationDisplay}">--</span></span>
  </div>
</div>
