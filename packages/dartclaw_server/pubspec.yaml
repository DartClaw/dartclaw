name: dartclaw_server
description: Reference HTTP API server and HTMX web UI for DartClaw deployments and task workflows.
publish_to: none
version: 0.9.0
repository: https://github.com/tolo/dartclaw/tree/main/packages/dartclaw_server
homepage: https://github.com/tolo/dartclaw
issue_tracker: https://github.com/tolo/dartclaw/issues
topics:
  - ai
  - cli
  - agents
  - server

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  crypto: ^3.0.6
  dartclaw_config:
    path: ../dartclaw_config
  dartclaw_core:
    path: ../dartclaw_core
  dartclaw_security:
    path: ../dartclaw_security
  dartclaw_google_chat:
    path: ../dartclaw_google_chat
  dartclaw_whatsapp:
    path: ../dartclaw_whatsapp
  dartclaw_signal:
    path: ../dartclaw_signal
  dart_jsonwebtoken: ^2.14.0
  html2md: ^1.3.2
  dartclaw_storage:
    path: ../dartclaw_storage
  http: ^1.5.0
  meta: ^1.16.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_static: ^1.1.3
  logging: ^1.3.0
  path: ^1.9.1
  qr: ^3.0.2
  trellis: ^0.5.0
  uuid: ^4.5.2

dev_dependencies:
  async: ^2.12.0
  dartclaw_testing:
    path: ../dartclaw_testing
  sqlite3: ^3.1.6
  test: ^1.29.0
  lints: ^6.0.0
