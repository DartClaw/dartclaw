name: dartclaw_server
description: Reference HTTP API server and HTMX web UI for DartClaw deployments and task workflows.
publish_to: none
version: 0.16.4
repository: https://github.com/DartClaw/dartclaw/tree/main/packages/dartclaw_server
homepage: https://github.com/DartClaw/dartclaw
issue_tracker: https://github.com/DartClaw/dartclaw/issues
topics:
  - ai
  - cli
  - agents
  - server

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  anthropic_sdk_dart: ^2.2.0
  crypto: ^3.0.7
  dartclaw_config:
    path: ../dartclaw_config
  dartclaw_core:
    path: ../dartclaw_core
  dartclaw_models:
    path: ../dartclaw_models
  dartclaw_workflow:
    path: ../dartclaw_workflow
  dartclaw_security:
    path: ../dartclaw_security
  dartclaw_google_chat:
    path: ../dartclaw_google_chat
  dartclaw_whatsapp:
    path: ../dartclaw_whatsapp
  dartclaw_signal:
    path: ../dartclaw_signal
  dart_jsonwebtoken: ^3.4.1
  pointycastle: ^4.0.0
  html2md: ^1.3.2
  dartclaw_storage:
    path: ../dartclaw_storage
  http: ^1.6.0
  meta: ^1.18.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_static: ^1.1.3
  logging: ^1.3.0
  path: ^1.9.1
  qr: ^3.0.2
  trellis: ^0.6.0
  uuid: ^4.5.3
  yaml: ^3.1.0

dev_dependencies:
  async: ^2.13.0
  dartclaw_testing:
    path: ../dartclaw_testing
  fake_async: ^1.3.3
  sqlite3: ^3.1.6
  test: ^1.31.0
  lints: ^6.1.0

hooks:
  user_defines:
    sqlite3:
      source: system
