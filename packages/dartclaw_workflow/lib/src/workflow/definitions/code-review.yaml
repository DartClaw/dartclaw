name: code-review
description: >-
  Review and remediate a pull request, branch, or code area with a single
  review methodology and a bounded remediation loop.
variables:
  TARGET:
    required: true
    description: Review target — feature, branch, PR, module, or code area
  BRANCH:
    required: false
    description: Feature branch to review. Leave blank when reviewing PR_NUMBER.
    default: ""
  PR_NUMBER:
    required: false
    description: GitHub pull request number to review. Leave blank for branch diffs.
    default: ""
  BASE_BRANCH:
    required: false
    description: Base branch to diff against when using a branch review
    default: "main"
  PROJECT:
    required: false
    description: Target project for remediation steps (omit for default project)

gitStrategy:
  bootstrap: false
  worktree: shared
  promotion: none
  finalReview: true
  publish:
    enabled: false
  cleanup: always

stepDefaults:
  - match: "*verify*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  # Discover the project layout and relevant Git context before the review begins.
  - id: discover-project
    name: Discover Project
    type: research
    skill: dartclaw-discover-project
    project: "{{PROJECT}}"
    allowedTools: [shell, file_read]
    prompt: |
      Branch: {{BRANCH}}
      Base branch: {{BASE_BRANCH}}
      PR number: {{PR_NUMBER}}
    contextOutputs: [project_index]
    outputs:
      project_index:
        format: json
        schema:
          type: object
          required: [framework, project_root, document_locations, state_protocol]
          properties:
            framework:
              type: string
            project_root:
              type: string
            document_locations:
              type: object
            state_protocol:
              type: object

  # Run the initial code review and emit a structured verdict for the remediation loop.
  - id: review-code
    name: Review Code
    type: analysis
    skill: dartclaw-review-code
    continueSession: discover-project
    prompt: |
      Target: {{TARGET}}
      PR number: {{PR_NUMBER}}
      Branch: {{BRANCH}}
      Base branch: {{BASE_BRANCH}}
      <project_index>
      {{context.project_index}}
      </project_index>
    contextInputs: [project_index]
    contextOutputs: [review_summary, findings_count, review-code.findings_count]
    outputs:
      review_summary:
        format: json
        schema: verdict

  # Iterate remediation until both validation and re-review report a clean result or the loop is exhausted.
  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "review-code.findings_count > 0"
    exitGate: "re-review.findings_count == 0 && verify-refine.findings_count == 0"
    steps:
      # Apply fixes for the issues captured in the current review summary.
      - id: remediate
        name: Remediate Findings
        type: coding
        skill: dartclaw-remediate-findings
        project: "{{PROJECT}}"
        review: always
        prompt: |
          <review_summary>
          {{context.review_summary}}
          </review_summary>
          <validation_summary>
          {{context.validation_summary}}
          </validation_summary>
          <project_index>
          {{context.project_index}}
          </project_index>
        contextInputs: [project_index, review_summary, validation_summary]
        contextOutputs: [remediation_result, remediation_summary, diff_summary]
        outputs:
          remediation_result:
            format: json
            schema: remediation-result

      # Validate the remediation changes before re-running the code review.
      - id: verify-refine
        name: Validate Remediation
        type: coding
        skill: dartclaw-verify-refine
        project: "{{PROJECT}}"
        review: never
        continueSession: remediate
        prompt: |
          Target: {{TARGET}}
          PR number: {{PR_NUMBER}}
          Branch: {{BRANCH}}
          Base branch: {{BASE_BRANCH}}
          <project_index>
          {{context.project_index}}
          </project_index>
          <review_summary>
          {{context.review_summary}}
          </review_summary>
          <remediation_summary>
          {{context.remediation_summary}}
          </remediation_summary>
          <diff_summary>
          {{context.diff_summary}}
          </diff_summary>
        contextInputs: [project_index, review_summary, remediation_summary, diff_summary]
        contextOutputs: [validation_summary, findings_count, verify-refine.findings_count]

      # Re-run the code review on the remediated implementation to decide whether another pass is needed.
      - id: re-review
        name: Re-review
        type: analysis
        skill: dartclaw-review-code
        continueSession: verify-refine
        prompt: |
          Target: {{TARGET}}
          PR number: {{PR_NUMBER}}
          Branch: {{BRANCH}}
          Base branch: {{BASE_BRANCH}}
          <project_index>
          {{context.project_index}}
          </project_index>
          <review_summary>
          {{context.review_summary}}
          </review_summary>
          <validation_summary>
          {{context.validation_summary}}
          </validation_summary>
          <remediation_summary>
          {{context.remediation_summary}}
          </remediation_summary>
          <diff_summary>
          {{context.diff_summary}}
          </diff_summary>
        contextInputs: [project_index, review_summary, validation_summary, remediation_summary, diff_summary]
        contextOutputs: [review_summary, findings_count, re-review.findings_count]
        outputs:
          review_summary:
            format: json
            schema: verdict
