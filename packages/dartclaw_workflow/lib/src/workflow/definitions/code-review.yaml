name: code-review
description: >-
  Review and remediate a pull request, branch, or code area with a single
  review methodology and a bounded remediation loop.
variables:
  TARGET:
    required: true
    description: Review target — feature, branch, PR, module, or code area
  BRANCH:
    required: false
    description: Feature branch to review. Leave blank when reviewing PR_NUMBER.
    default: ""
  PR_NUMBER:
    required: false
    description: GitHub pull request number to review. Leave blank for branch diffs.
    default: ""
  BASE_BRANCH:
    required: false
    description: Base branch to diff against when using a branch review
    default: "main"
  PROJECT:
    required: false
    description: Target project for remediation steps (omit for default project)

project: "{{PROJECT}}"

gitStrategy:
  integrationBranch: false
  worktree: shared
  publish:
    enabled: false

stepDefaults:
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  # Run the initial code review and emit a structured verdict for the remediation loop.
  # TARGET identifies what to review; BRANCH / PR_NUMBER / BASE_BRANCH let the
  # review skill select the right diffing strategy (PR vs branch vs plain target).
  - id: review-code
    name: Review Code
    skill: andthen:review
    # File-backed review: the remediation skill consumes a report path, so
    # this step writes the review artifact under the workflow runtime artifacts
    # directory and emits its absolute path.
    allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
    # TARGET/BRANCH/PR_NUMBER/BASE_BRANCH are interpolated inline by design –
    # they direct the review target, so they are direct arguments, not
    # auto-framed. An empty BRANCH renders a dangling `branch=`; the review
    # skill tolerates the empty value, so the rendering is left as-is (no
    # template/engine conditional surface).
    prompt: |
      --auto --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR" {{TARGET}}
      branch={{BRANCH}}
      pr={{PR_NUMBER}}
      base={{BASE_BRANCH}}
    outputs:
      review_report_path: review_report_path
      review-code.findings_count: findings_count
      review-code.gating_findings_count: gating_findings_count

  # Iterate remediation until both validation and re-review report a clean result or the loop is exhausted.
  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "review-code.gating_findings_count > 0"
    exitGate: "re-review.gating_findings_count == 0"
    steps:
      # Apply fixes for the issues captured in the current review summary.
      # The remediation skill is responsible for running analysis/tests/linting
      # on its edits before emitting a completed remediation result.
      - id: remediate
        name: Remediate Findings
        skill: andthen:remediate-findings
        allowedTools: [shell, file_read, file_write, file_edit, web_fetch, mcp_call]
        prompt: "--auto {{context.review_report_path}}"
        outputs:
          remediation_summary:
            schema: narrative_text
            description: Summary of what was changed during this remediation pass.

      # Re-run the code review on the remediated implementation to decide whether
      # another pass is needed. The re-review must re-review the ORIGINAL review
      # target (same TARGET/BRANCH/PR_NUMBER/BASE_BRANCH framing and modes as
      # review-code) so the loop's exit gate is decided against the right diff
      # scope – not against the prior pass's remediation summary. That summary is
      # auto-framed as supporting context (<remediation_summary>), not the target.
      # review-code passes no explicit --mode, so neither does this step.
      - id: re-review
        name: Re-review
        skill: andthen:review
        # File-backed review: later remediation iterations consume this report path.
        allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
        inputs: [remediation_summary]
        prompt: |
          --auto --output-dir "$DARTCLAW_STEP_ARTIFACTS_DIR" {{TARGET}}
          branch={{BRANCH}}
          pr={{PR_NUMBER}}
          base={{BASE_BRANCH}}
        outputs:
          review_report_path: review_report_path
          re-review.findings_count: findings_count
          re-review.gating_findings_count: gating_findings_count
