name: code-review
description: >-
  Review and remediate a pull request, branch, or code area with a single
  review methodology and a bounded remediation loop.
variables:
  TARGET:
    required: true
    description: Review target — feature, branch, PR, module, or code area
  BRANCH:
    required: false
    description: Feature branch to review. Leave blank when reviewing PR_NUMBER.
    default: ""
  PR_NUMBER:
    required: false
    description: GitHub pull request number to review. Leave blank for branch diffs.
    default: ""
  BASE_BRANCH:
    required: false
    description: Base branch to diff against when using a branch review
    default: "main"
  PROJECT:
    required: false
    description: Target project for remediation steps (omit for default project)

project: "{{PROJECT}}"

gitStrategy:
  bootstrap: false
  worktree: shared
  publish:
    enabled: false

stepDefaults:
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  # Discover the project layout and relevant Git context before the review begins.
  - id: discover-project
    name: Discover Project
    type: custom
    skill: dartclaw-discover-project
    # read-only: discovers project layout, no writes — narrow surface preserves
    # step_config_policy.stepIsReadOnly inference (file_write non-membership).
    allowedTools: [shell, file_read]
    outputs:
      project_index:
        format: json
        schema: project-index
        description: Normalized snapshot of the project layout — framework, root path, document locations, and state protocol.

  # Run the initial code review and emit a structured verdict for the remediation loop.
  # TARGET identifies what to review; BRANCH / PR_NUMBER / BASE_BRANCH let the
  # review skill select the right diffing strategy (PR vs branch vs plain target).
  - id: review-code
    name: Review Code
    type: custom
    skill: dartclaw-review
    # read-only review: file_write absent preserves step_config_policy's
    # read-only inference. shell/web_fetch/mcp_call enable `git diff`,
    # `gh pr diff`, `dart analyze`, doc lookup, and MCP-routed checks.
    allowedTools: [shell, file_read, web_fetch, mcp_call]
    inputs: [project_index]
    workflowVariables: [TARGET, BRANCH, PR_NUMBER, BASE_BRANCH]
    prompt: |
      --auto {{TARGET}}
      branch={{BRANCH}}
      pr={{PR_NUMBER}}
      base={{BASE_BRANCH}}
    outputs:
      review_summary:
        format: json
        schema: verdict
        description: Structured verdict and findings from the code review.
      review-code.findings_count:
        format: json
        schema: non-negative-integer
        description: Number of findings flagged by the review; 0 means the remediation loop can exit.
      review-code.gating_findings_count:
        format: json
        schema: non-negative-integer
        description: "Count of MEDIUM-or-higher severity findings (per the unified severity scale in references/review-verdict.md). 0 means only LOW-severity findings remain — the remediation loop reads this field to decide whether to iterate."

  # Iterate remediation until both validation and re-review report a clean result or the loop is exhausted.
  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "review-code.gating_findings_count > 0"
    exitGate: "re-review.gating_findings_count == 0"
    steps:
      # Apply fixes for the issues captured in the current review summary.
      # The remediation skill is responsible for running analysis/tests/linting
      # on its edits before emitting a completed remediation result.
      - id: remediate
        name: Remediate Findings
        type: custom
        skill: dartclaw-remediate-findings
        inputs: [project_index, review_summary]
        prompt: "--auto {{context.review_summary}}"
        outputs:
          remediation_result:
            format: json
            schema: remediation-result
            description: Structured outcome record for this remediation pass.
          remediation_summary:
            format: text
            schema: remediation-summary
          diff_summary:
            format: text
            schema: diff-summary

      # Re-run the code review on the remediated implementation to decide whether another pass is needed.
      - id: re-review
        name: Re-review
        type: custom
        skill: dartclaw-review
        # read-only review: matches review-code's surface for the re-review pass.
        allowedTools: [shell, file_read, web_fetch, mcp_call]
        inputs: [project_index, review_summary, remediation_summary, diff_summary]
        prompt: "--mode code --auto {{context.remediation_summary}}"
        outputs:
          review_summary:
            format: json
            schema: verdict
            description: Structured verdict and findings from the code review.
          re-review.findings_count:
            format: json
            schema: non-negative-integer
            description: Number of remaining issues after this re-review; 0 exits the remediation loop.
          re-review.gating_findings_count:
            format: json
            schema: non-negative-integer
            description: "Count of MEDIUM-or-higher severity findings (per the unified severity scale in references/review-verdict.md). 0 means only LOW-severity findings remain — the remediation loop reads this field to decide whether to iterate."
