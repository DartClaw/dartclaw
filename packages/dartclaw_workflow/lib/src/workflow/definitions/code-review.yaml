name: code-review
description: >-
  Review and remediate a pull request, branch, or code area with a single
  review methodology and a bounded remediation loop.
variables:
  TARGET:
    required: true
    description: Review target — feature, branch, PR, module, or code area
  BRANCH:
    required: false
    description: Feature branch to review. Leave blank when reviewing PR_NUMBER.
    default: ""
  PR_NUMBER:
    required: false
    description: GitHub pull request number to review. Leave blank for branch diffs.
    default: ""
  BASE_BRANCH:
    required: false
    description: Base branch to diff against when using a branch review
    default: "main"
  PROJECT:
    required: false
    description: Target project for remediation steps (omit for default project)

gitStrategy:
  bootstrap: false
  worktree: shared
  quickReview: false
  promotion: none
  finalReview: true
  publish:
    enabled: false
  cleanup: always

stepDefaults:
  - match: "*validate*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  - id: discover-project
    name: Discover Project
    type: research
    skill: dartclaw-discover-project
    prompt: |
      Target:
      {{TARGET}}
    contextOutputs: [project_index]
    outputs:
      project_index:
        format: json
        schema:
          type: object
          required: [framework, project_root, document_locations, state_protocol]
          properties:
            framework:
              type: string
            project_root:
              type: string
            document_locations:
              type: object
            state_protocol:
              type: object

  - id: review-code
    name: Review Code
    type: analysis
    skill: dartclaw-review
    prompt: |
      Target: {{TARGET}}
      Mode: code
      PR number: {{PR_NUMBER}}
      Branch: {{BRANCH}}
      Base branch: {{BASE_BRANCH}}
      Project index:
      {{context.project_index}}
    contextInputs: [project_index]
    contextOutputs: [review_summary, findings_count]
    outputs:
      review_summary:
        format: json
        schema: verdict

  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    exitGate: "re-review.findings_count == 0 && validate.findings_count == 0"
    steps:
      - id: remediate
        name: Remediate Findings
        type: coding
        skill: dartclaw-remediate-findings
        project: "{{PROJECT}}"
        review: always
        prompt: |
          Review summary:
          {{context.review_summary}}
          Validation summary:
          {{context.validation_summary}}
          Project index:
          {{context.project_index}}
        contextInputs: [project_index, review_summary, validation_summary]
        contextOutputs: [remediation_result, remediation_summary, diff_summary]
        outputs:
          remediation_result:
            format: json
            schema: remediation-result

      - id: validate
        name: Validate Remediation
        type: coding
        skill: dartclaw-validate
        project: "{{PROJECT}}"
        review: never
        prompt: |
          Target: {{TARGET}}
          PR number: {{PR_NUMBER}}
          Branch: {{BRANCH}}
          Base branch: {{BASE_BRANCH}}
          Project index:
          {{context.project_index}}
          Original review summary:
          {{context.review_summary}}
          Remediation summary:
          {{context.remediation_summary}}
          Updated diff summary:
          {{context.diff_summary}}

          Run build, tests, static analysis, and simplification checks after remediation.
          If the project has no runnable test surface, skip tests and say so explicitly.

          For workflow handoff, end with `## Context Output` and a JSON object with:
          - validation_summary
          - findings_count
          - validate.findings_count
        contextInputs: [project_index, review_summary, remediation_summary, diff_summary]
        contextOutputs: [validation_summary, findings_count, validate.findings_count]

      - id: re-review
        name: Re-review
        type: analysis
        skill: dartclaw-review
        prompt: |
          Target: {{TARGET}}
          Mode: code
          PR number: {{PR_NUMBER}}
          Branch: {{BRANCH}}
          Base branch: {{BASE_BRANCH}}
          Project index:
          {{context.project_index}}
          Original review summary:
          {{context.review_summary}}
          Validation summary:
          {{context.validation_summary}}
          Remediation summary:
          {{context.remediation_summary}}
          Updated diff summary:
          {{context.diff_summary}}
        contextInputs: [project_index, review_summary, validation_summary, remediation_summary, diff_summary]
        contextOutputs: [review_summary, findings_count, re-review.findings_count]
        outputs:
          review_summary:
            format: json
            schema: verdict
