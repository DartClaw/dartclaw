name: plan-and-implement
description: >-
  Multi-story pipeline — discover the project, plan stories, spec-plan the full story set,
  implement + validate + review each story, iterate plan-level remediation, and update state.
variables:
  REQUIREMENTS:
    required: true
    description: Requirements, PRD, or feature description to implement
  PROJECT:
    required: false
    description: Project ID for worktree isolation
  BRANCH:
    required: false
    description: Base branch/ref used for workflow bootstrap and comparisons
    default: "main"
  MAX_PARALLEL:
    required: false
    description: Max parallel story executions
    default: "2"

gitStrategy:
  bootstrap: true
  worktree: per-map-item
  promotion: merge
  finalReview: true
  publish:
    enabled: true
  cleanup: preserve-on-failure

stepDefaults:
  - match: "plan"
    provider: "@planner"
    model: "@planner"
  - match: "spec*"
    provider: "@planner"
    model: "@planner"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*verify*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "update-state"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  - id: discover-project
    name: Discover Project
    type: research
    skill: dartclaw-discover-project
    project: "{{PROJECT}}"
    allowedTools: [shell, file_read]
    prompt: |
      Branch: {{BRANCH}}
    contextOutputs: [project_index]
    outputs:
      project_index:
        format: json
        schema:
          type: object
          required: [framework, project_root, document_locations, state_protocol]
          properties:
            framework:
              type: string
            project_root:
              type: string
            document_locations:
              type: object
            state_protocol:
              type: object

  - id: plan
    name: Plan Stories
    type: analysis
    skill: dartclaw-plan
    contextInputs: [project_index]
    prompt: |
      Requirements:
      {{REQUIREMENTS}}

      Project index:
      {{context.project_index}}
    contextOutputs: [stories]
    outputs:
      stories:
        format: json
        schema: story-plan

  - id: spec-plan
    name: Spec and Plan Stories
    type: analysis
    skill: dartclaw-spec-plan
    contextInputs: [project_index, stories]
    prompt: |
      Requirements:
      {{REQUIREMENTS}}

      Project index:
      {{context.project_index}}

      Initial story plan:
      {{context.stories}}
    contextOutputs: [stories, story_spec]
    outputs:
      stories:
        format: json
        schema: story-plan
      story_spec:
        format: json

  - id: story-pipeline
    name: Per-Story Pipeline
    type: foreach
    map_over: stories
    max_parallel: "{{MAX_PARALLEL}}"
    max_items: 20
    project: "{{PROJECT}}"
    contextOutputs: [story_results]
    steps:
      - id: implement
        name: Implement Story
        type: coding
        skill: dartclaw-exec-spec
        project: "{{PROJECT}}"
        review: always
        prompt: |
          Story {{map.display_index}} of {{map.length}}:
          {{map.item.title}} ({{map.item.id}})

          Story spec:
          {{context.story_spec[map.index]}}

          Acceptance criteria:
          {{map.item.acceptance_criteria}}

          Project index:
          {{context.project_index}}
        contextInputs: [project_index, stories, story_spec]
        contextOutputs: [story_result]
        outputs:
          story_result:
            format: text

      - id: verify-refine
        name: Validate Story
        type: coding
        skill: dartclaw-verify-refine
        project: "{{PROJECT}}"
        review: never
        prompt: |
          Story {{map.display_index}} of {{map.length}}:
          {{map.item.title}} ({{map.item.id}})

          Requirements:
          {{REQUIREMENTS}}

          Project index:
          {{context.project_index}}

          Story implementation:
          {{context.implement.story_result}}
        contextInputs: [project_index]
        contextOutputs: [validation_summary, findings_count, verify-refine.findings_count]

      - id: quick-review
        name: Quick Review Story
        type: analysis
        skill: dartclaw-review-gap
        prompt: |
          Story {{map.display_index}} of {{map.length}}:
          {{map.item.title}} ({{map.item.id}})

          Requirements:
          {{REQUIREMENTS}}

          Story spec:
          {{context.story_spec[map.index]}}

          Story implementation:
          {{context.implement.story_result}}

          Validation summary:
          {{context.verify-refine.validation_summary}}
        contextInputs: [project_index, story_spec]
        contextOutputs: [quick_review_summary, quick_review_findings_count]

  - id: plan-review
    name: Review Full Implementation
    type: analysis
    skill: dartclaw-review-gap
    contextInputs: [project_index, stories, story_spec, story_results]
    prompt: |
      Requirements:
      {{REQUIREMENTS}}

      Project index:
      {{context.project_index}}

      Story plan:
      {{context.stories}}

      Story specs:
      {{context.story_spec}}

      Per-story results (implement / validate / quick-review for each story):
      {{context.story_results}}
    contextOutputs: [implementation_summary, remediation_plan, findings_count, plan-review.findings_count]

  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "plan-review.findings_count > 0"
    exitGate: "re-review.findings_count == 0 && re-verify-refine.findings_count == 0"
    steps:
      - id: remediate
        name: Remediate Findings
        type: coding
        skill: dartclaw-remediate-findings
        project: "{{PROJECT}}"
        review: always
        prompt: |
          Project index:
          {{context.project_index}}

          Remediation plan:
          {{context.remediation_plan}}

          Implementation summary:
          {{context.implementation_summary}}
        contextInputs: [project_index, remediation_plan, implementation_summary]
        contextOutputs: [remediation_summary, diff_summary]

      - id: re-verify-refine
        name: Re-validate After Remediation
        type: coding
        skill: dartclaw-verify-refine
        project: "{{PROJECT}}"
        review: never
        prompt: |
          Requirements:
          {{REQUIREMENTS}}

          Project index:
          {{context.project_index}}

          Remediation summary:
          {{context.remediation_summary}}

          Updated diff summary:
          {{context.diff_summary}}
        contextInputs: [project_index, remediation_summary, diff_summary]
        contextOutputs: [validation_summary, findings_count, re-verify-refine.findings_count]

      - id: re-review
        name: Re-review After Remediation
        type: analysis
        skill: dartclaw-review-gap
        prompt: |
          Requirements:
          {{REQUIREMENTS}}

          Project index:
          {{context.project_index}}

          Story plan:
          {{context.stories}}

          Implementation summary:
          {{context.implementation_summary}}

          Re-validation summary:
          {{context.validation_summary}}

          Remediation summary:
          {{context.remediation_summary}}

          Updated diff summary:
          {{context.diff_summary}}
        contextInputs: [project_index, stories, implementation_summary, validation_summary, remediation_summary, diff_summary]
        contextOutputs: [remediation_plan, findings_count, re-review.findings_count]

  - id: update-state
    name: Update State
    type: coding
    skill: dartclaw-update-state
    project: "{{PROJECT}}"
    prompt: |
      Project index:
      {{context.project_index}}

      Requirements:
      {{REQUIREMENTS}}

      Implementation summary:
      {{context.implementation_summary}}

      Remediation summary:
      {{context.remediation_summary}}
    contextInputs: [project_index, implementation_summary, remediation_summary]
    contextOutputs: [state_update_summary]
