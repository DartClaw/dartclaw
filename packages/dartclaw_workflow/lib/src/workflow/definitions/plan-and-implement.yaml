name: plan-and-implement
description: >-
  Multi-story pipeline — discover the project, draft and review a PRD, plan and spec all stories in one pass,
  implement + validate + review each story, iterate plan-level remediation, and update state.
variables:
  REQUIREMENTS:
    required: true
    description: Requirements, PRD, or feature description to implement
  PROJECT:
    required: false
    description: Project ID for worktree isolation
  BRANCH:
    required: false
    description: Base branch/ref used for workflow bootstrap and comparisons
    default: "main"
  MAX_PARALLEL:
    required: false
    description: Max parallel story executions
    default: "2"

gitStrategy:
  bootstrap: true
  worktree: per-map-item
  promotion: merge
  publish:
    enabled: true
  # Auto-commit generated artifacts (PRD, plan, per-story FIS) on the workflow
  # branch so per-map-item worktrees inherit them when created. Required when
  # artifact-producing steps (dartclaw-prd / dartclaw-plan / dartclaw-spec)
  # are combined with worktree: per-map-item.
  artifacts:
    commit: true
    commitMessage: "chore(workflow): artifacts for run {{runId}}"
    project: "{{PROJECT}}"

stepDefaults:
  # Patterns without `*` are matched by literal equality (step_config_resolver),
  # so `prd` here does NOT catch `review-prd` — the `*review*` match below owns it.
  # Do NOT promote to `prd*` without also moving it below the `*review*` entry.
  - match: "prd"
    provider: "@planner"
    model: "@planner"
  - match: "plan"
    provider: "@planner"
    model: "@planner"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*verify*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "update-state"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  # Discover the project layout and document/state locations before planning begins.
  - id: discover-project
    name: Discover Project
    type: research
    skill: dartclaw-discover-project
    project: "{{PROJECT}}"
    allowedTools: [shell, file_read]
    prompt: |
      Branch: {{BRANCH}}
    contextOutputs: [project_index]
    outputs:
      project_index:
        format: json
        schema: project-index
        description: Normalized snapshot of the project layout — framework, root path, document locations, and state protocol.

  # Synthesize a PRD from the input requirements, or reuse an existing one at
  # context.project_index.active_prd. Writes prd.md to disk and emits the path
  # + a source tag — never emits the PRD body inline.
  - id: prd
    name: Draft PRD
    type: analysis
    skill: dartclaw-prd
    contextInputs: [project_index]
    allowedTools: [shell, file_read, file_write]
    prompt: |
      <REQUIREMENTS>
      {{REQUIREMENTS}}
      </REQUIREMENTS>

      <project_index>
      {{context.project_index}}
      </project_index>
    contextOutputs: [prd, prd_source]
    outputs:
      prd:
        format: path
        description: Workspace-relative path to prd.md on disk (either reused or freshly synthesized).
      prd_source:
        format: text
        description: "'existing' when reused from context.project_index.active_prd, 'synthesized' when this step wrote a new file."

  # Review the PRD on disk via file_read. Read-only — never mutates the file.
  # Skipped when the upstream prd step reused an existing PRD (prd_source ==
  # existing); revision, if needed, is a separate downstream remediation step.
  - id: review-prd
    name: Review PRD
    type: analysis
    skill: dartclaw-review-doc
    entryGate: "prd_source == synthesized"
    continueSession: prd
    contextInputs: [project_index, prd]
    allowedTools: [file_read]
    prompt: |
      Read the PRD from disk at the workspace-relative path `{{context.prd}}`
      via `file_read` and review it for clarity, completeness, correctness, and
      implementability. Return structured findings only — **do not mutate the
      PRD file on disk**. If findings_count > 0 a downstream remediation step
      will apply the fixes.

      <project_index>
      {{context.project_index}}
      </project_index>

      <prd_path>
      {{context.prd}}
      </prd_path>
    contextOutputs: [prd, prd_review_findings, findings_count]
    outputs:
      prd:
        format: path
        description: Pass-through of the PRD file path — unchanged from input (review is read-only).
      prd_review_findings:
        format: json
        schema: verdict
        description: Structured review findings against the on-disk PRD.
      findings_count:
        format: json
        schema: non-negative-integer
        description: Count of actionable review findings; 0 means the PRD is clean.

  # Plan stories and per-story FIS files from the reviewed PRD path. Reuses
  # context.project_index.active_plan when it exists; otherwise synthesizes.
  # Writes plan.md, optional technical-research.md, and per-story FIS files;
  # emits file paths + structured records, never inline artifact bodies.
  - id: plan
    name: Plan Stories and Specs
    type: analysis
    skill: dartclaw-plan
    contextInputs: [project_index, prd, prd_review_findings]
    allowedTools: [shell, file_read, file_write]
    prompt: |
      Read the reviewed PRD from the workspace-relative path `{{context.prd}}`
      via `file_read`. Incorporate the review findings below into the planning
      pass so the resulting stories address the review points. Write plan.md to
      `context.project_index.artifact_locations.plan` and per-story FIS files
      under `context.project_index.artifact_locations.fis_dir`. Emit structured
      per-story records with a `spec_path` field pointing at each FIS on disk.

      <project_index>
      {{context.project_index}}
      </project_index>

      <prd_path>
      {{context.prd}}
      </prd_path>

      <prd_review_findings>
      {{context.prd_review_findings}}
      </prd_review_findings>
    contextOutputs: [stories, story_specs, plan, plan_source, prd, technical_research]
    outputs:
      stories:
        format: json
        schema: story-plan
        description: Ordered list of stories parsed from the Story Catalog in plan.md.
      story_specs:
        format: json
        schema: story-specs
        description: Per-story structured records (id, title, spec_path, acceptance_criteria, phase, wave, dependencies, key_files). spec_path is the workspace-relative FIS file path.
      plan:
        format: path
        description: Workspace-relative path to plan.md on disk.
      plan_source:
        format: text
        description: "'existing' when reused from context.project_index.active_plan, 'synthesized' when this step wrote a new file."
      prd:
        format: path
        description: Pass-through of the PRD file path — unchanged (plan does not rewrite the PRD).
      technical_research:
        format: path
        description: Workspace-relative path to technical-research.md when one was written (null otherwise).

  # Run the implement/validate/review sub-pipeline independently for each planned story.
  - id: story-pipeline
    name: Per-Story Pipeline
    type: foreach
    map_over: story_specs
    max_parallel: "{{MAX_PARALLEL}}"
    max_items: 20
    project: "{{PROJECT}}"
    contextOutputs: [story_results]
    steps:
      # Implement one story against its generated story spec.
      # The FIS body is read from disk via file_read — per-story worktrees
      # inherit the committed FIS files from the workflow branch, or receive
      # a per-story copy when gitStrategy.worktree.externalArtifactMount is
      # configured.
      - id: implement
        name: Implement Story
        type: coding
        skill: dartclaw-exec-spec
        project: "{{PROJECT}}"
        review: always
        allowedTools: [shell, file_read, file_write]
        prompt: |
          Story {{map.display_index}} of {{map.length}}:
          {{map.item.title}} ({{map.item.id}})

          <acceptance_criteria>
          {{map.item.acceptance_criteria}}
          </acceptance_criteria>

          Read the FIS body from disk at the workspace-relative path
          `{{map.item.spec_path}}` via `file_read`. Do not rely on inline FIS
          content in this prompt — the authoritative spec is the file.

          <story_record>
          {{map.item}}
          </story_record>

          <project_index>
          {{context.project_index}}
          </project_index>
        contextInputs: [project_index, story_specs]
        contextOutputs: [story_result]
        outputs:
          story_result:
            format: text
            schema: story-result

      # Validate the story implementation before the story-level review pass.
      - id: verify-refine
        name: Validate Story
        type: coding
        skill: dartclaw-verify-refine
        project: "{{PROJECT}}"
        review: never
        continueSession: implement
        prompt: |
          Story {{map.display_index}} of {{map.length}}:
          {{map.item.title}} ({{map.item.id}})

          <project_index>
          {{context.project_index}}
          </project_index>

          <story_result>
          {{context.implement.story_result}}
          </story_result>
        contextInputs: [project_index]
        contextOutputs: [validation_summary, findings_count]
        outputs:
          validation_summary:
            format: text
            schema: validation-summary
          findings_count:
            format: json
            schema: non-negative-integer
            description: Number of remaining issues after validation; 0 means the story is clean.

      # Review the implemented story against its story-specific requirements and spec.
      - id: quick-review
        name: Quick Review Story
        type: analysis
        skill: dartclaw-quick-review
        allowedTools: [file_read]
        prompt: |
          Story {{map.display_index}} of {{map.length}}:
          {{map.item.title}} ({{map.item.id}})

          Read the story's FIS from disk via `file_read` at
          `{{map.item.spec_path}}` when you need the full acceptance criteria
          or task detail.

          <project_index>
          {{context.project_index}}
          </project_index>

          <story_record>
          {{map.item}}
          </story_record>

          <story_result>
          {{context.implement.story_result}}
          </story_result>

          <validation_summary>
          {{context.validation_summary}}
          </validation_summary>
        contextInputs: [project_index]
        contextOutputs: [quick_review_summary, quick_review_findings_count]
        outputs:
          quick_review_summary:
            format: text
            description: Short assessment of whether the story implementation meets its spec and acceptance criteria.
          quick_review_findings_count:
            format: json
            schema: non-negative-integer
            description: Number of issues flagged by the story-level quick review; 0 means clean.

  # Review the batch outcome across all stories and decide whether plan-level remediation is needed.
  # Skipped when the upstream plan step reused an existing plan (plan_source == existing);
  # if the pre-existing plan's stories need gap review, run this workflow's
  # remediation loop on that artifact instead.
  - id: plan-review
    name: Review Full Implementation
    type: analysis
    skill: dartclaw-review-gap
    entryGate: "plan_source == synthesized"
    contextInputs: [project_index, story_specs, story_results, plan]
    allowedTools: [file_read]
    prompt: |
      Read the plan from disk via `file_read` at `{{context.plan}}` — each
      story's FIS lives under the directory referenced by
      `context.project_index.artifact_locations.fis_dir`.

      <project_index>
      {{context.project_index}}
      </project_index>

      <plan_path>
      {{context.plan}}
      </plan_path>

      <story_specs>
      {{context.story_specs}}
      </story_specs>

      <story_results>
      {{context.story_results}}
      </story_results>
    contextOutputs: [review_findings, findings_count, plan-review.findings_count]
    outputs:
      review_findings:
        format: text
        description: Summary of all issues identified during the review that require remediation.
      findings_count:
        format: json
        schema: non-negative-integer
        description: Total number of issues requiring remediation; 0 means the remediation loop can exit.
      plan-review.findings_count:
        format: json
        schema: non-negative-integer
        description: Step-scoped copy of the plan review findings count used by remediation loop gates.

  # Iterate plan-level remediation until validation and re-review both pass or the loop is exhausted.
  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "plan-review.findings_count > 0"
    exitGate: "re-review.findings_count == 0 && re-verify-refine.findings_count == 0"
    steps:
      # Apply the remediation plan produced by the plan-level review.
      - id: remediate
        name: Remediate Findings
        type: coding
        skill: dartclaw-remediate-findings
        project: "{{PROJECT}}"
        review: always
        prompt: |
          <project_index>
          {{context.project_index}}
          </project_index>

          <review_findings>
          {{context.review_findings}}
          </review_findings>

          <story_results>
          {{context.story_results}}
          </story_results>
        contextInputs: [project_index, review_findings, story_results]
        contextOutputs: [remediation_summary, diff_summary]
        outputs:
          remediation_summary:
            format: text
            schema: remediation-summary
          diff_summary:
            format: text
            schema: diff-summary

      # Re-run validation after the remediation pass to confirm the fixes hold.
      - id: re-verify-refine
        name: Re-validate After Remediation
        type: coding
        skill: dartclaw-verify-refine
        project: "{{PROJECT}}"
        review: never
        continueSession: remediate
        prompt: |
          <project_index>
          {{context.project_index}}
          </project_index>

          <remediation_summary>
          {{context.remediation_summary}}
          </remediation_summary>

          <diff_summary>
          {{context.diff_summary}}
          </diff_summary>
        contextInputs: [project_index, remediation_summary, diff_summary]
        contextOutputs: [validation_summary, findings_count, re-verify-refine.findings_count]
        outputs:
          validation_summary:
            format: text
            schema: validation-summary
          findings_count:
            format: json
            schema: non-negative-integer
            description: Number of validation findings after the remediation pass.
          re-verify-refine.findings_count:
            format: json
            schema: non-negative-integer
            description: Step-scoped copy of the remediation validation findings count used by loop gates.

      # Re-review the full implementation after remediation using the updated summaries and diff.
      - id: re-review
        name: Re-review After Remediation
        type: analysis
        skill: dartclaw-quick-review
        prompt: |
          <project_index>
          {{context.project_index}}
          </project_index>

          <story_specs>
          {{context.story_specs}}
          </story_specs>

          <story_results>
          {{context.story_results}}
          </story_results>

          <validation_summary>
          {{context.validation_summary}}
          </validation_summary>

          <remediation_summary>
          {{context.remediation_summary}}
          </remediation_summary>

          <diff_summary>
          {{context.diff_summary}}
          </diff_summary>
        contextInputs: [project_index, story_specs, story_results, validation_summary, remediation_summary, diff_summary]
        contextOutputs: [review_findings, findings_count, re-review.findings_count]
        outputs:
          review_findings:
            format: text
            description: Summary of all issues identified during the review that require remediation.
          findings_count:
            format: json
            schema: non-negative-integer
            description: Number of remaining plan-level issues after this re-review; 0 contributes to exiting the remediation loop.
          re-review.findings_count:
            format: json
            schema: non-negative-integer
            description: Step-scoped copy of the re-review findings count used by remediation loop gates.

  # Record the completed plan execution state back into the project state document.
  - id: update-state
    name: Update State
    type: coding
    skill: dartclaw-update-state
    project: "{{PROJECT}}"
    prompt: |
      <project_index>
      {{context.project_index}}
      </project_index>

      <story_specs>
      {{context.story_specs}}
      </story_specs>

      <story_results>
      {{context.story_results}}
      </story_results>
    contextInputs: [project_index, story_specs, story_results]
    contextOutputs: [state_update_summary]
    outputs:
      state_update_summary:
        format: text
        schema: state-update-summary
