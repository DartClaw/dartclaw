name: plan-and-implement
description: >-
  Multi-story pipeline — discover the project, draft a PRD, plan and spec all stories in one pass,
  implement + validate + review each story, iterate plan-level remediation, and update state.
variables:
  REQUIREMENTS:
    required: true
    description: Requirements, PRD, or feature description to implement
  PROJECT:
    required: false
    description: Project ID for worktree isolation
  BRANCH:
    required: false
    description: Base branch/ref used for workflow bootstrap and comparisons
    default: ""
  MAX_PARALLEL:
    required: false
    description: Max parallel story executions
    default: "2"

project: "{{PROJECT}}"

gitStrategy:
  bootstrap: true
  worktree: auto
  publish:
    enabled: true
  # Auto-commit generated artifacts (PRD, plan, per-story FIS) on the workflow
  # branch so parallel per-story worktrees inherit them when created. Required
  # when artifact-producing steps (andthen-prd / andthen-plan /
  # andthen-spec) run under worktree: auto with max_parallel > 1.
  artifacts:
    commit: true
    commitMessage: "chore(workflow): artifacts for run {{runId}}"
    project: "{{PROJECT}}"

stepDefaults:
  # `revise*` is listed before the literal `prd` / `plan` matches so the
  # validator's literal-token-match forward-compatibility check doesn't flag
  # `prd` / `plan` as ambiguous with `revise-prd`. Literal matches are
  # evaluated by equality at runtime, so `prd` never catches `revise-prd`
  # regardless of order; the reorder is purely for validator hygiene.
  - match: "revise*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "prd"
    provider: "@planner"
    model: "@planner"
  - match: "plan"
    provider: "@planner"
    model: "@planner"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "update-state"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  # Discover the project layout and document/state locations before planning begins.
  # Existing PRD/plan state lives in `project_index.active_prd` /
  # `project_index.active_plan`. Discover-project republishes `active_prd` as
  # the flat `prd` handoff key immediately. It republishes `active_plan` as
  # the flat `plan` key only when `project_index.active_story_specs` is
  # present, meaning the reused plan is executable without re-running the
  # plan step. The flat `story_specs` output remains the foreach handoff key.
  - id: discover-project
    name: Discover Project
    type: custom
    skill: dartclaw-discover-project
    allowedTools: [shell, file_read]
    workflowVariables: [REQUIREMENTS]
    contextOutputs: [project_index, prd, plan, story_specs]
    outputs:
      project_index:
        format: json
        schema: project-index
        description: Normalized snapshot of the project layout, active artifacts, and state protocol.
      prd:
        format: path
        description: Workspace-relative path to prd.md on disk — pre-authored (if REQUIREMENTS resolves to one) or freshly synthesized by the prd step.
      plan:
        format: path
        description: Workspace-relative path to plan.md on disk — pre-authored (if REQUIREMENTS resolves to one) or freshly synthesized by the plan step.
      story_specs:
        format: json
        schema: story-specs
        description: Per-story records driving the foreach controller; populated from project_index.active_story_specs for an active plan or by the plan step for a synthesized plan.

  # Synthesize a PRD from the input requirements, or reuse an existing one at
  # context.project_index.active_prd. Writes prd.md to disk and emits the path
  # + a source tag — never emits the PRD body inline. Also emits a 1-10
  # self-rated confidence score; downstream review/revise steps are gated on
  # this value so high-confidence PRDs skip the review loop entirely. Skipped
  # entirely when discover-project found `project_index.active_prd`.
  - id: prd
    name: Draft PRD
    type: custom
    skill: andthen-prd
    entryGate: "project_index.active_prd == null"
    contextInputs: [project_index]
    workflowVariables: [REQUIREMENTS]
    allowedTools: [shell, file_read, file_write]
    contextOutputs: [prd, prd_confidence]
    prompt: "Use the prd skill to synthesize a PRD from the provided requirements, clarification artifacts, or draft PRD. Writes prd.md only — do not plan stories or create FIS files here."
    outputs:
      prd:
        format: path
        description: Workspace-relative path to prd.md on disk — pre-authored (if REQUIREMENTS resolves to one) or freshly synthesized by the prd step.
      prd_confidence:
        format: json
        schema: non-negative-integer
        description: "Skill's self-rated 1-10 readiness of the synthesized PRD. `<7` triggers the revise-prd step when this workflow authored the PRD."

  # Review-and-revise pass gated on the PRD skill's own confidence score.
  # The `--fix` flag on andthen-review writes a doc-review report and
  # delegates remediation to andthen-remediate-findings in one invocation.
  # Skipped entirely when the PRD was reused via project_index.active_prd or
  # when confidence is already >= 7.
  - id: revise-prd
    name: Revise PRD (low confidence)
    type: custom
    skill: andthen-review
    entryGate: "project_index.active_prd == null && prd_confidence < 7"
    contextInputs: [project_index, prd, prd_confidence]
    allowedTools: [shell, file_read, file_write]
    prompt: |
      Review `{{context.prd}}` with `--mode doc --fix`
      (PRD skill confidence {{context.prd_confidence}}/10).
    # revise-prd modifies the PRD file in place at the same path. No new
    # context value is produced — downstream steps continue reading
    # {{context.prd}} written by the prd step, which now points at the
    # revised file contents.

  # Plan stories and per-story FIS files from the reviewed PRD path. Reuses
  # context.project_index.active_plan when it exists; otherwise synthesizes.
  # Writes plan.md, optional technical-research.md, and per-story FIS files;
  # emits file paths + structured records, never inline artifact bodies.
  - id: plan
    name: Plan Stories and Specs
    type: custom
    skill: andthen-plan
    entryGate: "plan == null"
    allowedTools: [shell, file_read, file_write]
    contextInputs: [project_index, prd]
    # Retry once on failure so we recover from a flaky plan pass where the
    # agent reports `succeeded` without writing every per-story FIS file
    # (post-extraction validation in `_validateStorySpecOutputs` promotes
    # that silent drop-out to a real failure; this gives the skill a
    # fresh turn to fill the gap before the workflow hard-fails).
    onFailure: retry
    maxRetries: 1
    contextOutputs: [story_specs, plan]
    prompt: "Use the plan skill to create an implementation plan with story breakdown and FIS specs for every story. Requires an existing prd.md in the input directory — run the prd skill first if one is missing."
    outputs:
      story_specs:
        format: json
        schema: story-specs
        description: Per-story records driving the foreach controller; populated from project_index.active_story_specs for an active plan or by the plan step for a synthesized plan.
      plan:
        format: path
        description: Workspace-relative path to plan.md on disk — pre-authored (if REQUIREMENTS resolves to one) or freshly synthesized by the plan step.

  # Run the implement/validate/review sub-pipeline independently for each planned story.
  - id: story-pipeline
    name: Per-Story Pipeline
    type: foreach
    map_over: story_specs
    max_parallel: "{{MAX_PARALLEL}}"
    #max_items: 20
    contextOutputs: [story_results]
    steps:
      # Implement one story against its generated story spec.
      # andthen-exec-spec reads the FIS body from disk at story.spec_path;
      # per-story worktrees inherit the committed FIS from the workflow branch.
      - id: implement
        name: Implement Story
        type: custom
        skill: andthen-exec-spec
        allowedTools: [shell, file_read, file_write]
        # Transient Codex CLI exits (exit code 1 with only `thread.started`
        # on stdout, typically under memory pressure with parallel runners)
        # have been observed mid-turn. Retry once before failing the story.
        onFailure: retry
        maxRetries: 1
        prompt: |
          Use the exec-spec skill to execute the provided local FIS with full verification and status gates. When the authoritative FIS is provided as a workspace path, read it from disk with file_read instead of relying on inline excerpts.
          {{map.item.spec_path}} (story {{map.display_index}} of {{map.length}}):
        contextInputs: [project_index, story_specs]
        contextOutputs: [story_result]
        outputs:
          story_result:
            format: text
            schema: story-result

      # Review the implemented story against its spec and acceptance criteria.
      # exec-spec already ran analysis/tests/linting; this step gates the outcome.
      - id: quick-review
        name: Quick Review Story
        type: custom
        skill: andthen-quick-review
        allowedTools: [file_read]
        # Same transient-crash mitigation as `implement`; a dropped Codex
        # process on the review turn shouldn't fail the story when a retry
        # would succeed.
        onFailure: retry
        maxRetries: 1
        prompt: |
          Use the quick-review skill to run a fast fresh-context review of the recent changes. When the relevant spec or plan is provided as a workspace path, read it from disk with file_read before judging requirements fit.
          Story {{map.display_index}}/{{map.length}}:
          <story>{{map.item}}</story>
          <story_result>{{context.story_result}}</story_result>
        contextInputs: [project_index]
        contextOutputs: [quick_review_summary, quick_review_findings_count]
        outputs:
          quick_review_summary:
            format: text
            description: Short assessment of whether the story implementation meets its spec and acceptance criteria.
          quick_review_findings_count:
            format: json
            schema: non-negative-integer
            description: Number of issues flagged by the story-level quick review; 0 means clean.

  # Review the batch outcome across all stories and decide whether plan-level remediation is needed.
  # Runs regardless of whether the upstream plan step synthesized a new plan
  # or reused an existing one — the review concerns the implemented batch,
  # not plan authoring quality.
  - id: plan-review
    name: Review Full Implementation
    type: custom
    skill: andthen-review
    contextInputs: [project_index, story_specs, story_results, plan]
    allowedTools: [file_read]
    contextOutputs: [review_findings, plan-review.findings_count]
    prompt: "Use the review skill to review the provided target and route to the appropriate review mode (code / doc / gap / mixed), with optional --council for multi-perspective adversarial review."
    outputs:
      review_findings:
        format: text
        description: Summary of all issues identified during the review that require remediation.
      plan-review.findings_count:
        format: json
        schema: non-negative-integer
        description: Total number of issues requiring remediation; 0 means the remediation loop can exit.

  # Iterate plan-level remediation until validation and re-review both pass or the loop is exhausted.
  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "plan-review.findings_count > 0"
    exitGate: "re-review.findings_count == 0"
    steps:
      # Apply the remediation plan produced by the plan-level review.
      - id: remediate
        name: Remediate Findings
        type: custom
        skill: andthen-remediate-findings
        contextInputs: [project_index, review_findings, story_results]
        contextOutputs: [remediation_summary, diff_summary]
        prompt: "Use the remediate-findings skill to address the findings in the provided review report with minimal safe changes. When the report or requirements baseline names a workspace path, read the authoritative file from disk with file_read instead of relying on inline excerpts."
        outputs:
          remediation_summary:
            format: text
            schema: remediation-summary
          diff_summary:
            format: text
            schema: diff-summary

      # Re-review the full implementation after remediation using the updated summaries and diff.
      # The remediation skill is responsible for running analysis/tests/linting on
      # its edits; this review gates loop exit.
      - id: re-review
        name: Re-review After Remediation
        type: custom
        skill: andthen-quick-review
        allowedTools: [file_read]
        contextInputs: [project_index, story_specs, story_results, remediation_summary, diff_summary]
        contextOutputs: [review_findings, re-review.findings_count]
        prompt: "Use the quick-review skill to run a fast fresh-context review of the recent changes. When the relevant spec or plan is provided as a workspace path, read it from disk with file_read before judging requirements fit."
        outputs:
          review_findings:
            format: text
            description: Summary of all issues identified during the review that require remediation.
          re-review.findings_count:
            format: json
            schema: non-negative-integer
            description: Number of remaining plan-level issues after this re-review; 0 exits the remediation loop.

  # Record the completed plan execution state back into the project state document.
  - id: update-state
    name: Update State
    type: custom
    skill: andthen-ops
    contextInputs: [project_index, story_specs, story_results]
    contextOutputs: [state_update_summary]
    prompt: "Update the project's state using the discovered protocol. Project index or state instruction: "
    outputs:
      state_update_summary:
        format: text
        schema: state-update-summary
