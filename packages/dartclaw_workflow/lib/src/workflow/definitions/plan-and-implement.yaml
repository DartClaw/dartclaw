name: plan-and-implement
description: >-
  Multi-story pipeline — discover the project, plan stories, spec each story,
  implement each story, review each story, synthesize results, iterate
  remediation, and update state in authored order.
variables:
  REQUIREMENTS:
    required: true
    description: Requirements, PRD, or feature description to implement
  PROJECT:
    required: false
    description: Project ID for worktree isolation
  BRANCH:
    required: false
    description: Base branch/ref used for workflow bootstrap and comparisons
    default: "main"
  MAX_PARALLEL:
    required: false
    description: Max parallel story executions
    default: "2"

gitStrategy:
  bootstrap: true
  worktree: per-map-item
  quickReview: true
  promotion: merge
  finalReview: true
  publish:
    enabled: true
  cleanup: preserve-on-failure

stepDefaults:
  - match: "plan"
    provider: "@planner"
    model: "@planner"
  - match: "spec"
    provider: "@planner"
    model: "@planner"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*validate*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "update-state"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  - id: discover-project
    name: Discover Project
    type: research
    skill: dartclaw-discover-project
    prompt: |
      Requirements:
      {{REQUIREMENTS}}
    contextOutputs: [project_index]
    outputs:
      project_index:
        format: json
        schema:
          type: object
          required: [framework, project_root, document_locations, state_protocol]
          properties:
            framework:
              type: string
            project_root:
              type: string
            document_locations:
              type: object
            state_protocol:
              type: object

  - id: plan
    name: Plan Stories
    type: analysis
    skill: dartclaw-plan
    contextInputs: [project_index]
    prompt: |
      Requirements:
      {{REQUIREMENTS}}

      Project index:
      {{context.project_index}}
    contextOutputs: [stories]
    outputs:
      stories:
        format: json
        schema: story-plan

  - id: spec
    name: Spec Stories
    type: analysis
    skill: dartclaw-spec
    map_over: stories
    max_parallel: "{{MAX_PARALLEL}}"
    max_items: 20
    prompt: |
      Story {{map.display_index}} of {{map.length}}:
      {{map.item.title}} ({{map.item.id}})

      Story description:
      {{map.item.description}}

      Acceptance criteria:
      {{map.item.acceptance_criteria}}

      Key files:
      {{map.item.key_files}}

      Project index:
      {{context.project_index}}

      For workflow handoff, end with `## Context Output` and a JSON object containing `story_spec`.
    contextInputs: [project_index, stories]
    contextOutputs: [story_spec]
    outputs:
      story_spec:
        format: text

  - id: implement
    name: Implement Stories
    type: coding
    skill: dartclaw-exec-spec
    map_over: stories
    max_parallel: "{{MAX_PARALLEL}}"
    max_items: 20
    project: "{{PROJECT}}"
    review: always
    prompt: |
      Story {{map.display_index}} of {{map.length}}:
      {{map.item.title}} ({{map.item.id}})

      Story spec:
      {{context.story_spec[map.index]}}

      Acceptance criteria:
      {{map.item.acceptance_criteria}}

      Project index:
      {{context.project_index}}

      End with `## Context Output` and a JSON object containing `story_result`.
    contextInputs: [project_index, stories, story_spec]
    contextOutputs: [story_result]
    outputs:
      story_result:
        format: text

  - id: validate
    name: Validate Batch
    type: coding
    skill: dartclaw-validate
    project: "{{PROJECT}}"
    review: never
    prompt: |
      Requirements:
      {{REQUIREMENTS}}

      Project index:
      {{context.project_index}}

      Story implementations:
      {{context.story_result}}

      Run build, tests, static analysis, and simplification checks across the merged implementation result.
      If the project has no runnable test surface, skip tests and say so explicitly.

      End with `## Context Output` and a JSON object containing:
      - validation_summary
      - findings_count
    contextInputs: [project_index, story_result]
    contextOutputs: [validation_summary, findings_count]

  - id: synthesize
    name: Synthesize Stories
    type: analysis
    prompt: |
      Synthesize the mapped story results into a single delivery summary.

      Requirements:
      {{REQUIREMENTS}}

      Project index:
      {{context.project_index}}

      Story plans:
      {{context.stories}}

      Story specs:
      {{context.story_spec}}

      Story implementations:
      {{context.story_result}}

      Validation summary:
      {{context.validation_summary}}

      Summarize:
      - Which stories are complete
      - Which stories still need work
      - Cross-story risks or integration gaps
      - Whether remediation is needed before state update

      Set needs_remediation to true if any story still has unresolved findings.
      End with `## Context Output` and a JSON object containing:
      - implementation_summary
      - remediation_plan
      - needs_remediation
    contextInputs: [project_index, stories, story_spec, story_result, validation_summary, findings_count]
    contextOutputs: [implementation_summary, remediation_plan, needs_remediation]

  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    exitGate: "re-review.findings_count == 0 && re-validate.findings_count == 0"
    steps:
      - id: remediate
        name: Remediate Findings
        type: coding
        skill: dartclaw-remediate-findings
        project: "{{PROJECT}}"
        review: always
        prompt: |
          Project index:
          {{context.project_index}}

          Remediation plan:
          {{context.remediation_plan}}

          Story implementations:
          {{context.story_result}}

          Validation summary:
          {{context.validation_summary}}

          If no remediation is needed, say so plainly.
          End with `## Context Output` and a JSON object containing:
          - remediation_summary
          - diff_summary
        contextInputs: [project_index, remediation_plan, story_result, validation_summary]
        contextOutputs: [remediation_summary, diff_summary]

      - id: re-validate
        name: Re-validate Batch
        type: coding
        skill: dartclaw-validate
        project: "{{PROJECT}}"
        review: never
        prompt: |
          Requirements:
          {{REQUIREMENTS}}

          Project index:
          {{context.project_index}}

          Remediation summary:
          {{context.remediation_summary}}

          Updated diff summary:
          {{context.diff_summary}}

          Run build, tests, static analysis, and simplification checks after remediation.
          If the project has no runnable test surface, skip tests and say so explicitly.

          End with `## Context Output` and a JSON object containing:
          - validation_summary
          - findings_count
          - re-validate.findings_count
        contextInputs: [project_index, remediation_summary, diff_summary]
        contextOutputs: [validation_summary, findings_count, re-validate.findings_count]

      - id: re-review
        name: Re-review Batch
        type: analysis
        skill: dartclaw-review
        prompt: |
          Requirements:
          {{REQUIREMENTS}}
          Mode: gap

          Project index:
          {{context.project_index}}

          Story plan:
          {{context.stories}}

          Original implementation summary:
          {{context.implementation_summary}}

          Re-validation summary:
          {{context.validation_summary}}

          Remediation summary:
          {{context.remediation_summary}}

          Updated diff summary:
          {{context.diff_summary}}

          For workflow handoff, end with `## Context Output` and a JSON object containing:
          - remediation_plan
          - findings_count
          - re-review.findings_count
        contextInputs: [project_index, stories, implementation_summary, validation_summary, remediation_summary, diff_summary]
        contextOutputs: [remediation_plan, findings_count, re-review.findings_count]

  - id: update-state
    name: Update State
    type: coding
    skill: dartclaw-update-state
    project: "{{PROJECT}}"
    prompt: |
      Project index:
      {{context.project_index}}

      Requirements:
      {{REQUIREMENTS}}

      Implementation summary:
      {{context.implementation_summary}}

      Remediation summary:
      {{context.remediation_summary}}

      End with `## Context Output` and a JSON object containing `state_update_summary`.
    contextInputs: [project_index, implementation_summary, remediation_summary]
    contextOutputs: [state_update_summary]
