name: plan-and-implement
description: >-
  Multi-story pipeline — discover the project, draft a PRD, plan and spec all stories in one pass,
  implement + validate + review each story, iterate plan-level remediation, and update state.
variables:
  REQUIREMENTS:
    required: true
    description: Requirements, PRD, or feature description to implement
  PROJECT:
    required: false
    description: Project ID for worktree isolation
  BRANCH:
    required: false
    description: Base branch/ref used for workflow bootstrap and comparisons
    default: "main"
  MAX_PARALLEL:
    required: false
    description: Max parallel story executions
    default: "2"

project: "{{PROJECT}}"

gitStrategy:
  bootstrap: true
  worktree: auto
  publish:
    enabled: true
  # Auto-commit generated artifacts (PRD, plan, per-story FIS) on the workflow
  # branch so parallel per-story worktrees inherit them when created. Required
  # when artifact-producing steps (dartclaw-prd / dartclaw-plan /
  # dartclaw-spec) run under worktree: auto with max_parallel > 1.
  artifacts:
    commit: true
    commitMessage: "chore(workflow): artifacts for run {{runId}}"
    project: "{{PROJECT}}"

stepDefaults:
  # `revise*` is listed before the literal `prd` / `plan` matches so the
  # validator's literal-token-match forward-compatibility check doesn't flag
  # `prd` / `plan` as ambiguous with `revise-prd`. Literal matches are
  # evaluated by equality at runtime, so `prd` never catches `revise-prd`
  # regardless of order; the reorder is purely for validator hygiene.
  - match: "revise*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "prd"
    provider: "@planner"
    model: "@planner"
  - match: "plan"
    provider: "@planner"
    model: "@planner"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "update-state"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  # Discover the project layout and document/state locations before planning begins.
  - id: discover-project
    name: Discover Project
    type: custom
    skill: dartclaw-discover-project
    allowedTools: [shell, file_read]
    contextOutputs: [project_index]
    outputs:
      project_index:
        format: json
        schema: project-index
        description: Normalized snapshot of the project layout — framework, root path, document locations, and state protocol.

  # Synthesize a PRD from the input requirements, or reuse an existing one at
  # context.project_index.active_prd. Writes prd.md to disk and emits the path
  # + a source tag — never emits the PRD body inline. Also emits a 1-10
  # self-rated confidence score; downstream review/revise steps are gated on
  # this value so high-confidence PRDs skip the review loop entirely.
  - id: prd
    name: Draft PRD
    type: custom
    skill: dartclaw-prd
    contextInputs: [project_index]
    workflowVariables: [REQUIREMENTS]
    allowedTools: [shell, file_read, file_write]
    contextOutputs: [prd, prd_source, prd_confidence]
    outputs:
      prd:
        format: path
        description: Workspace-relative path to prd.md on disk (either reused or freshly synthesized).
      prd_source:
        format: text
        description: "'existing' when reused from context.project_index.active_prd, 'synthesized' when this step wrote a new file."
      prd_confidence:
        format: json
        schema: non-negative-integer
        description: "Skill's self-rated 1-10 readiness of the synthesized PRD. `0` when prd_source == existing (pass-through). `<7` triggers the revise-prd step."

  # Review-and-revise pass gated on the PRD skill's own confidence score.
  # The `--fix` flag on dartclaw-review writes a doc-review report and
  # delegates remediation to dartclaw-remediate-findings in one invocation.
  # Skipped entirely when the PRD was reused (prd_source == existing) or
  # when confidence is already >= 7.
  - id: revise-prd
    name: Revise PRD (low confidence)
    type: custom
    skill: dartclaw-review
    entryGate: "prd_source == synthesized && prd_confidence < 7"
    contextInputs: [project_index, prd, prd_confidence]
    allowedTools: [shell, file_read, file_write]
    prompt: |
      Review `{{context.prd}}` with `--mode doc --fix`
      (PRD skill confidence {{context.prd_confidence}}/10).
    # revise-prd modifies the PRD file in place at the same path. No new
    # context value is produced — downstream steps continue reading
    # {{context.prd}} written by the prd step, which now points at the
    # revised file contents.

  # Plan stories and per-story FIS files from the reviewed PRD path. Reuses
  # context.project_index.active_plan when it exists; otherwise synthesizes.
  # Writes plan.md, optional technical-research.md, and per-story FIS files;
  # emits file paths + structured records, never inline artifact bodies.
  - id: plan
    name: Plan Stories and Specs
    type: custom
    skill: dartclaw-plan
    allowedTools: [shell, file_read, file_write]
    contextInputs: [project_index, prd]    
    contextOutputs: [story_specs, plan, plan_source]
    outputs:
      story_specs:
        format: json
        schema: story-specs
        description: Per-story records — id, title, spec_path. Drives the foreach; exec-spec reads the FIS body (including acceptance criteria) from disk at spec_path.
      plan:
        format: path
        description: Workspace-relative path to plan.md on disk.
      plan_source:
        format: text
        description: "'existing' when reused from context.project_index.active_plan, 'synthesized' when this step wrote a new file. Gates plan-review."

  # Run the implement/validate/review sub-pipeline independently for each planned story.
  - id: story-pipeline
    name: Per-Story Pipeline
    type: foreach
    map_over: story_specs
    max_parallel: "{{MAX_PARALLEL}}"
    #max_items: 20
    contextOutputs: [story_results]
    steps:
      # Implement one story against its generated story spec.
      # dartclaw-exec-spec reads the FIS body from disk at story.spec_path;
      # per-story worktrees inherit the committed FIS from the workflow branch.
      - id: implement
        name: Implement Story
        type: custom
        skill: dartclaw-exec-spec
        allowedTools: [shell, file_read, file_write]
        prompt: |
          {{map.item.spec_path}} (story {{map.display_index}} of {{map.length}}):
        contextInputs: [project_index, story_specs]
        contextOutputs: [story_result]
        outputs:
          story_result:
            format: text
            schema: story-result

      # Review the implemented story against its spec and acceptance criteria.
      # exec-spec already ran analysis/tests/linting; this step gates the outcome.
      - id: quick-review
        name: Quick Review Story
        type: custom
        skill: dartclaw-quick-review
        allowedTools: [file_read]
        prompt: |
          Story {{map.display_index}}/{{map.length}}:
          <story>{{map.item}}</story>
          <story_result>{{context.story_result}}</story_result>
        contextInputs: [project_index]
        contextOutputs: [quick_review_summary, quick_review_findings_count]
        outputs:
          quick_review_summary:
            format: text
            description: Short assessment of whether the story implementation meets its spec and acceptance criteria.
          quick_review_findings_count:
            format: json
            schema: non-negative-integer
            description: Number of issues flagged by the story-level quick review; 0 means clean.

  # Review the batch outcome across all stories and decide whether plan-level remediation is needed.
  # Skipped when the upstream plan step reused an existing plan (plan_source == existing);
  # if the pre-existing plan's stories need gap review, run this workflow's
  # remediation loop on that artifact instead.
  - id: plan-review
    name: Review Full Implementation
    type: custom
    skill: dartclaw-review
    entryGate: "plan_source == synthesized"
    contextInputs: [project_index, story_specs, story_results, plan]
    allowedTools: [file_read]
    contextOutputs: [review_findings, plan-review.findings_count]
    outputs:
      review_findings:
        format: text
        description: Summary of all issues identified during the review that require remediation.
      plan-review.findings_count:
        format: json
        schema: non-negative-integer
        description: Total number of issues requiring remediation; 0 means the remediation loop can exit.

  # Iterate plan-level remediation until validation and re-review both pass or the loop is exhausted.
  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "plan-review.findings_count > 0"
    exitGate: "re-review.findings_count == 0"
    steps:
      # Apply the remediation plan produced by the plan-level review.
      - id: remediate
        name: Remediate Findings
        type: custom
        skill: dartclaw-remediate-findings
        contextInputs: [project_index, review_findings, story_results]
        contextOutputs: [remediation_summary, diff_summary]
        outputs:
          remediation_summary:
            format: text
            schema: remediation-summary
          diff_summary:
            format: text
            schema: diff-summary

      # Re-review the full implementation after remediation using the updated summaries and diff.
      # The remediation skill is responsible for running analysis/tests/linting on
      # its edits; this review gates loop exit.
      - id: re-review
        name: Re-review After Remediation
        type: custom
        skill: dartclaw-quick-review
        contextInputs: [project_index, story_specs, story_results, remediation_summary, diff_summary]
        contextOutputs: [review_findings, re-review.findings_count]
        outputs:
          review_findings:
            format: text
            description: Summary of all issues identified during the review that require remediation.
          re-review.findings_count:
            format: json
            schema: non-negative-integer
            description: Number of remaining plan-level issues after this re-review; 0 exits the remediation loop.

  # Record the completed plan execution state back into the project state document.
  - id: update-state
    name: Update State
    type: custom
    skill: dartclaw-update-state
    contextInputs: [project_index, story_specs, story_results]
    contextOutputs: [state_update_summary]
    outputs:
      state_update_summary:
        format: text
        schema: state-update-summary
