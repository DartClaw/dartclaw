name: plan-and-implement
description: >-
  Multi-story pipeline – discover existing PRD/plan state, plan and spec all stories in one pass,
  implement + validate + review each story, and iterate plan-level remediation.
variables:
  FEATURE:
    required: true
    description: "Path to a PRD or path hint pointing at one – plan-and-implement requires an existing PRD"
  PROJECT:
    required: false
    description: Project ID for worktree isolation
  BRANCH:
    required: false
    description: Base branch/ref used for workflow integration-branch creation and comparisons
    default: ""
  MAX_PARALLEL:
    required: false
    description: Max parallel story executions
    default: "2"

project: "{{PROJECT}}"

gitStrategy:
  integrationBranch: true
  worktree: auto
  promotion: merge
  publish:
    enabled: true
  # Per-story worktrees inherit committed files from the workflow branch.
  # Required when artifact-producing planning steps run under worktree: auto
  # with max_parallel > 1.
  artifacts:
    commit: true
    commitMessage: "chore(workflow): {{step.id}} artifacts"
  merge_resolve:
    enabled: true
    max_attempts: 2
    token_ceiling: 100000
    escalation: serialize-remaining

stepDefaults:
  - match: "plan"
    provider: "@planner"
    model: "@planner"
  - match: "revise*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate*"
    provider: "@executor"
    model: "@executor"
  - match: "simplify-code"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  # PRD-driven: missing PRD is a fail-fast discovery error, not a reason to
  # synthesize a PRD inside plan-and-implement.
  - id: discover-plan-state
    name: Discover Plan State
    skill: dartclaw-discover-andthen-plan
    allowedTools: [shell, file_read]
    # FEATURE is auto-framed as a <FEATURE> data tag (untrusted
    # input). Never reference {{FEATURE}} inline – that would suppress
    # auto-framing and route attacker-controlled text through as instructions.
    workflowVariables: [FEATURE]
    outputs:
      prd: prd_path
      plan: plan_path
      story_specs: story_specs

  # Reuses a discovered plan when it exists; otherwise synthesizes. Writes
  # plan.json + per-story FIS files; emits file paths, not inline bodies.
  - id: plan
    name: Plan Stories and Specs
    skill: andthen:plan
    entryGate: "plan == null || plan == '' || story_specs == null || story_specs.items == null"
    inputs: [prd, plan]
    # Retry once so we recover from a flaky pass where the agent reports
    # `succeeded` without writing every per-story FIS file – post-extraction
    # validation promotes that silent drop-out to a real failure.
    onFailure: retry
    maxRetries: 1
    prompt: "--auto {{context.prd}}"
    outputs:
      story_specs: story_specs
      plan: plan_path

  - id: story-pipeline
    name: Per-Story Pipeline
    type: foreach
    map_over: story_specs
    max_parallel: "{{MAX_PARALLEL}}"
    # Story failures are captured in story_results and reviewed later; they
    # should not block independent stories from running.
    onFailure: continue
    outputs:
      story_results:
        format: json
    steps:
      - id: revise-story-spec
        name: Revise Story Spec (low confidence)
        skill: andthen:review
        entryGate: "map.item.fis_source == synthesized && map.item.spec_confidence > 0 && map.item.spec_confidence < 7"
        inputs: [story_specs]
        # TD-104: shared reviews dir until revise gates become parallel.
        prompt: >-
          --mode doc --fix --auto
          --output-dir "{{workflow.runtime_artifacts_dir}}/reviews"
          {{map.item.spec_path}}

      - id: implement
        name: Implement Story
        skill: andthen:exec-spec
        # Transient Codex CLI exits (exit 1 with only `thread.started` on
        # stdout, typically under memory pressure with parallel runners) get
        # one retry. Explicit failed step outcomes remain story results.
        maxRetries: 1
        prompt: "--auto {{map.item.spec_path}}"
        inputs: [story_specs]
        outputs:
          story_result: story_result

      - id: quick-review
        name: Quick Review Story
        skill: andthen:quick-review
        # Pin to @executor so continueSession honors the implement step's
        # session – continueSession requires the same provider family as
        # the root step. The *review* stepDefault would otherwise route
        # this to @reviewer and trigger a runtime fallback warning.
        provider: "@executor"
        model: "@executor"
        continueSession: true
        maxRetries: 1
        prompt: "--fix --auto"
        inputs: [story_result]
        # No outputs – quick-review fixes issues in-session via --fix; its
        # findings are absorbed into the working tree, not handed to a
        # downstream step.

      - id: simplify-code
        name: Simplify Story Code
        skill: andthen:simplify-code
        # Pin to @executor so continueSession honors the implement step's
        # session – continueSession requires the same provider family as
        # the root step. Per-iteration session isolation is structural:
        # foreach_iteration_runner builds a fresh iterContext per iteration
        # and writes the bare `${implement.id}.providerSessionId` only into
        # that iterContext (parent context receives only [iterIndex]-suffixed
        # keys), so iteration N+1's continueSession cannot resolve to
        # iteration N's session.
        provider: "@executor"
        model: "@executor"
        continueSession: true
        maxRetries: 1
        prompt: >-
          --auto simplify only the changes for this story; preserve
          behavior; no scope creep into other packages.
        inputs: [story_result]

  # plan-review and architecture-review form a parallel group: consecutive
  # `parallel: true` steps execute concurrently via Future.wait and merge
  # outputs back into context before the workflow continues serially. Each
  # writes to distinct context keys so the merge is conflict-free.
  - id: plan-review
    name: Review Full Implementation
    skill: andthen:review
    parallel: true
    inputs: [story_specs, story_results, plan]
    # File-backed review: step writes a report artifact and emits its path,
    # so it needs file_write. shell/web_fetch/mcp_call cover git diff, dart
    # analyze, doc lookup, MCP-routed checks.
    allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
    prompt: >-
      --mode mixed --auto
      --output-dir "{{workflow.runtime_artifacts_dir}}/reviews"
      Review implementation of {{context.plan}},
      i.e. all the changes in the current branch.
    outputs:
      review_findings: review_report_path
      plan-review.findings_count: findings_count
      plan-review.gating_findings_count: gating_findings_count

  # Independent concern (modularity, coupling, anti-patterns, fitness) from
  # gap/code review. Prompt narrows attention to this branch's changes so the
  # review stays proportional to what the plan delivered.
  - id: architecture-review
    name: Architecture Review
    skill: andthen:architecture
    parallel: true
    inputs: [story_specs, story_results, plan]
    allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
    prompt: >-
      --mode review --auto {{context.plan}}. Scope the review to changes
      introduced on the current branch (vs the base ref) – skip packages
      untouched by this plan.
    outputs:
      architecture_review_findings: review_report_path
      architecture-review.findings_count: findings_count
      architecture-review.gating_findings_count: gating_findings_count

  - id: review-aggregate
    name: Aggregate Review Findings
    type: aggregate-reviews
    aggregateReviews: [plan-review, architecture-review]
    outputs:
      review_findings: review_report_path
      findings_count: findings_count
      gating_findings_count: gating_findings_count

  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "gating_findings_count > 0"
    exitGate: "gating_findings_count == 0"
    steps:
      - id: remediate
        name: Remediate Findings
        skill: andthen:remediate-findings
        entryGate: "gating_findings_count > 0"
        inputs: [review_findings, story_results]
        prompt: "--auto {{context.review_findings}}"
        outputs:
          remediation_summary: remediation_summary

      # No session continuity – andthen:review reads the plan and the
      # current workspace state on each iteration.
      - id: re-review
        name: Re-review After Remediation
        skill: andthen:review
        allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
        inputs: [story_specs, story_results, remediation_summary]
        prompt: >-
          --mode mixed --auto
          --output-dir "{{workflow.runtime_artifacts_dir}}/reviews"
          Review implementation of {{context.plan}},
          i.e. all the changes in the current branch.
        outputs:
          review_findings: review_report_path
          findings_count: findings_count
          gating_findings_count: gating_findings_count
