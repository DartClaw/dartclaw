name: plan-and-implement
description: >-
  Multi-story pipeline — discover the project, plan stories, spec-plan the full story set,
  implement + validate + review each story, iterate plan-level remediation, and update state.
variables:
  REQUIREMENTS:
    required: true
    description: Requirements, PRD, or feature description to implement
  PROJECT:
    required: false
    description: Project ID for worktree isolation
  BRANCH:
    required: false
    description: Base branch/ref used for workflow bootstrap and comparisons
    default: "main"
  MAX_PARALLEL:
    required: false
    description: Max parallel story executions
    default: "2"

gitStrategy:
  bootstrap: true
  worktree: per-map-item
  promotion: merge
  publish:
    enabled: true

stepDefaults:
  - match: "plan"
    provider: "@planner"
    model: "@planner"
  - match: "revise-plan"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "spec*"
    provider: "@planner"
    model: "@planner"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*verify*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "update-state"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  # Discover the project layout and document/state locations before planning begins.
  - id: discover-project
    name: Discover Project
    type: research
    skill: dartclaw-discover-project
    project: "{{PROJECT}}"
    allowedTools: [shell, file_read]
    prompt: |
      Branch: {{BRANCH}}
    contextOutputs: [project_index]
    outputs:
      project_index:
        format: json
        schema: project-index
        description: Normalized snapshot of the project layout — framework, root path, document locations, and state protocol.

  # Turn the requested requirements into a PRD and an initial story plan.
  - id: plan
    name: Plan Stories
    type: analysis
    skill: dartclaw-plan
    continueSession: discover-project
    contextInputs: [project_index]
    prompt: |
      <REQUIREMENTS>
      {{REQUIREMENTS}}
      </REQUIREMENTS>

      <project_index>
      {{context.project_index}}
      </project_index>
    contextOutputs: [prd, stories]
    outputs:
      prd:
        format: text
        description: Product requirements document drafted from the input requirements.
      stories:
        format: json
        schema: story-plan
        description: Ordered list of stories that implement the PRD, ready for spec-plan.

  # Review the draft PRD and story plan and emit revised artifacts plus findings for traceability.
  - id: revise-plan
    name: Revise Plan
    type: analysis
    skill: dartclaw-review-doc
    continueSession: plan
    contextInputs: [project_index, prd, stories]
    prompt: |
      Review the PRD and story plan for clarity, completeness, correctness, sequencing, and implementability.
      Revise both artifacts to address any actionable findings you identify.
      Preserve the existing intent when the review is already clean; only make minimal cleanup edits in that case.
      Return the full revised PRD, the full revised story plan, and the plan review findings for traceability.

      <project_index>
      {{context.project_index}}
      </project_index>

      <prd>
      {{context.prd}}
      </prd>

      <stories>
      {{context.stories}}
      </stories>
    contextOutputs: [prd, stories, plan_review_findings]
    outputs:
      prd:
        format: text
        description: Full revised PRD after the plan-level review pass.
      stories:
        format: json
        schema: story-plan
        description: Full revised story plan after the plan-level review pass.
      plan_review_findings:
        format: json
        schema: verdict
        description: Structured review findings produced while revising the PRD and plan.

  # Generate story-level specifications and tighten the story plan before implementation starts.
  - id: spec-plan
    name: Spec and Plan Stories
    type: analysis
    skill: dartclaw-spec-plan
    continueSession: revise-plan
    contextInputs: [project_index, prd, stories]
    prompt: |
      <project_index>
      {{context.project_index}}
      </project_index>

      <prd>
      {{context.prd}}
      </prd>

      <stories>
      {{context.stories}}
      </stories>
    contextOutputs: [story_specs]
    outputs:
      story_specs:
        format: json
        schema: story-specs
        description: Per-story specifications that drive the per-story implementation loop.

  # Run the implement/validate/review sub-pipeline independently for each planned story.
  - id: story-pipeline
    name: Per-Story Pipeline
    type: foreach
    map_over: story_specs
    max_parallel: "{{MAX_PARALLEL}}"
    max_items: 20
    project: "{{PROJECT}}"
    contextOutputs: [story_results]
    steps:
      # Implement one story against its generated story spec.
      - id: implement
        name: Implement Story
        type: coding
        skill: dartclaw-exec-spec
        project: "{{PROJECT}}"
        review: always
        prompt: |
          Story {{map.display_index}} of {{map.length}}:
          {{map.item.title}} ({{map.item.id}})

          <acceptance_criteria>
          {{map.item.acceptance_criteria}}
          </acceptance_criteria>

          <story_spec>
          {{map.item}}
          </story_spec>

          <project_index>
          {{context.project_index}}
          </project_index>
        contextInputs: [project_index, story_specs]
        contextOutputs: [story_result]
        outputs:
          story_result:
            format: text
            description: Summary of what was implemented for this story — files changed, key decisions, and verification notes.

      # Validate the story implementation before the story-level review pass.
      - id: verify-refine
        name: Validate Story
        type: coding
        skill: dartclaw-verify-refine
        project: "{{PROJECT}}"
        review: never
        continueSession: implement
        prompt: |
          Story {{map.display_index}} of {{map.length}}:
          {{map.item.title}} ({{map.item.id}})

          <project_index>
          {{context.project_index}}
          </project_index>

          <story_result>
          {{context.implement.story_result}}
          </story_result>
        contextInputs: [project_index]
        contextOutputs: [validation_summary, findings_count]
        outputs:
          validation_summary:
            format: text
            description: Summary of validation outcomes for this story (build, tests, analyzer, and any refinements applied).
          findings_count:
            format: json
            schema: non-negative-integer
            description: Number of remaining issues after validation; 0 means the story is clean.

      # Review the implemented story against its story-specific requirements and spec.
      - id: quick-review
        name: Quick Review Story
        type: analysis
        skill: dartclaw-quick-review
        continueSession: verify-refine
        prompt: |
          Story {{map.display_index}} of {{map.length}}:
          {{map.item.title}} ({{map.item.id}})

          <project_index>
          {{context.project_index}}
          </project_index>

          <story_spec>
          {{map.item}}
          </story_spec>

          <story_result>
          {{context.implement.story_result}}
          </story_result>

          <validation_summary>
          {{context.validation_summary}}
          </validation_summary>
        contextInputs: [project_index]
        contextOutputs: [quick_review_summary, quick_review_findings_count]
        outputs:
          quick_review_summary:
            format: text
            description: Short assessment of whether the story implementation meets its spec and acceptance criteria.
          quick_review_findings_count:
            format: json
            schema: non-negative-integer
            description: Number of issues flagged by the story-level quick review; 0 means clean.

  # Review the batch outcome across all stories and decide whether plan-level remediation is needed.
  - id: plan-review
    name: Review Full Implementation
    type: analysis
    skill: dartclaw-review-gap
    contextInputs: [project_index, story_specs, story_results]
    prompt: |
      <project_index>
      {{context.project_index}}
      </project_index>

      <story_specs>
      {{context.story_specs}}
      </story_specs>

      <story_results>
      {{context.story_results}}
      </story_results>
    contextOutputs: [review_findings, findings_count, plan-review.findings_count]
    outputs:
      review_findings:
        format: text
        description: Summary of all issues identified during the review that require remediation. 
      findings_count:
        format: json
        schema: non-negative-integer
        description: Total number of issues requiring remediation; 0 means the remediation loop can exit.
      plan-review.findings_count:
        format: json
        schema: non-negative-integer
        description: Step-scoped copy of the plan review findings count used by remediation loop gates.

  # Iterate plan-level remediation until validation and re-review both pass or the loop is exhausted.
  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "plan-review.findings_count > 0"
    exitGate: "re-review.findings_count == 0 && re-verify-refine.findings_count == 0"
    steps:
      # Apply the remediation plan produced by the plan-level review.
      - id: remediate
        name: Remediate Findings
        type: coding
        skill: dartclaw-remediate-findings
        project: "{{PROJECT}}"
        review: always
        prompt: |
          <project_index>
          {{context.project_index}}
          </project_index>

          <review_findings>
          {{context.review_findings}}
          </review_findings>

          <story_results>
          {{context.story_results}}
          </story_results>
        contextInputs: [project_index, review_findings, story_results]
        contextOutputs: [remediation_summary, diff_summary]
        outputs:
          remediation_summary:
            format: text
            description: Summary of what was changed during this remediation pass — issues addressed, approach taken, and any deferrals.
          diff_summary:
            format: text
            description: Compact description of file-level changes produced by this remediation pass.

      # Re-run validation after the remediation pass to confirm the fixes hold.
      - id: re-verify-refine
        name: Re-validate After Remediation
        type: coding
        skill: dartclaw-verify-refine
        project: "{{PROJECT}}"
        review: never
        continueSession: remediate
        prompt: |
          <project_index>
          {{context.project_index}}
          </project_index>

          <remediation_summary>
          {{context.remediation_summary}}
          </remediation_summary>

          <diff_summary>
          {{context.diff_summary}}
          </diff_summary>
        contextInputs: [project_index, remediation_summary, diff_summary]
        contextOutputs: [validation_summary, findings_count, re-verify-refine.findings_count]
        outputs:
          validation_summary:
            format: text
            description: Summary of validation outcomes after remediation (build, tests, analyzer, and any refinements applied).
          findings_count:
            format: json
            schema: non-negative-integer
            description: Number of validation findings after the remediation pass.
          re-verify-refine.findings_count:
            format: json
            schema: non-negative-integer
            description: Step-scoped copy of the remediation validation findings count used by loop gates.

      # Re-review the full implementation after remediation using the updated summaries and diff.
      - id: re-review
        name: Re-review After Remediation
        type: analysis
        skill: dartclaw-quick-review
        continueSession: re-verify-refine
        prompt: |
          <project_index>
          {{context.project_index}}
          </project_index>

          <story_specs>
          {{context.story_specs}}
          </story_specs>

          <story_results>
          {{context.story_results}}
          </story_results>

          <validation_summary>
          {{context.validation_summary}}
          </validation_summary>

          <remediation_summary>
          {{context.remediation_summary}}
          </remediation_summary>

          <diff_summary>
          {{context.diff_summary}}
          </diff_summary>
        contextInputs: [project_index, story_specs, story_results, validation_summary, remediation_summary, diff_summary]
        contextOutputs: [review_findings, findings_count, re-review.findings_count]
        outputs:
          review_findings:
            format: text
            description: Summary of all issues identified during the review that require remediation. 
          findings_count:
            format: json
            schema: non-negative-integer
            description: Number of remaining plan-level issues after this re-review; 0 contributes to exiting the remediation loop.
          re-review.findings_count:
            format: json
            schema: non-negative-integer
            description: Step-scoped copy of the re-review findings count used by remediation loop gates.

  # Record the completed plan execution state back into the project state document.
  - id: update-state
    name: Update State
    type: coding
    skill: dartclaw-update-state
    project: "{{PROJECT}}"
    prompt: |
      <project_index>
      {{context.project_index}}
      </project_index>

      <story_specs>
      {{context.story_specs}}
      </story_specs>

      <story_results>
      {{context.story_results}}
      </story_results>
    contextInputs: [project_index, story_specs, story_results]
    contextOutputs: [state_update_summary]
    outputs:
      state_update_summary:
        format: text
        description: Summary of what was written to the project state document for this plan execution.
