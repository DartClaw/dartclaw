name: spec-and-implement
description: >-
  Full feature pipeline — discover the project, write a specification,
  review and remediate it, implement it with exec-spec, run integrated review,
  and update state in authored order.
variables:
  FEATURE:
    required: true
    description: Feature description — what to build and why
  PROJECT:
    required: false
    description: Target project for coding steps (omit for default project)
  BRANCH:
    required: false
    description: Base branch/ref used for workflow bootstrap and comparisons
    default: "main"

gitStrategy:
  bootstrap: true
  worktree: shared
  promotion: merge
  finalReview: true
  publish:
    enabled: true
  cleanup: preserve-on-failure

stepDefaults:
  - match: "spec"
    provider: "@planner"
    model: "@planner"
  - match: "revise-spec"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*verify*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "update-state"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  # Discover the project layout and document/state locations before authoring work starts.
  - id: discover-project
    name: Discover Project
    type: research
    skill: dartclaw-discover-project
    project: "{{PROJECT}}"
    allowedTools: [shell, file_read]
    prompt: |
      Branch: {{BRANCH}}
    contextOutputs: [project_index]
    outputs:
      project_index:
        format: json
        schema:
          type: object
          required: [framework, project_root, document_locations, state_protocol]
          properties:
            framework:
              type: string
            project_root:
              type: string
            document_locations:
              type: object
            state_protocol:
              type: object

  # Draft the initial implementation spec from the requested feature and discovered project context.
  - id: spec
    name: Generate Specification
    type: writing
    skill: dartclaw-spec
    continueSession: discover-project
    contextInputs: [project_index]
    prompt: |
      <FEATURE>
      {{FEATURE}}
      </FEATURE>

      <project_index>
      {{context.project_index}}
      </project_index>
    contextOutputs: [spec_document]

  # Review the draft spec and emit a revised spec plus structured findings for traceability.
  - id: revise-spec
    name: Revise Spec
    type: analysis
    skill: dartclaw-review-doc
    continueSession: spec
    prompt: |
      Review the specification for clarity, completeness, correctness, and implementability.
      Revise it to address any actionable findings you identify.
      Preserve the existing intent when the review is already clean; only make minimal cleanup edits in that case.
      Return the full revised specification and the spec review findings for traceability.

      <project_index>
      {{context.project_index}}
      </project_index>

      <spec_document>
      {{context.spec_document}}
      </spec_document>
    contextInputs: [project_index, spec_document]
    contextOutputs: [spec_document, spec_review_findings]
    outputs:
      spec_review_findings:
        format: json
        schema: verdict

  # Implement the feature against the revised specification.
  - id: implement
    name: Implement
    type: coding
    skill: dartclaw-exec-spec
    project: "{{PROJECT}}"
    review: always
    prompt: |
      <project_index>
      {{context.project_index}}
      </project_index>

      <spec_document>
      {{context.spec_document}}
      </spec_document>
    contextInputs: [project_index, spec_document]
    contextOutputs: [diff_summary]
    outputs:
      diff_summary:
        format: text

  # Validate the implementation and capture any remaining findings.
  - id: verify-refine
    name: Validate Implementation
    type: coding
    skill: dartclaw-verify-refine
    project: "{{PROJECT}}"
    review: never
    continueSession: implement
    prompt: |
      <project_index>
      {{context.project_index}}
      </project_index>

      <spec_document>
      {{context.spec_document}}
      </spec_document>

      <diff_summary>
      {{context.diff_summary}}
      </diff_summary>
    contextInputs: [project_index, diff_summary, spec_document]
    contextOutputs: [validation_summary, findings_count, verify-refine.findings_count]

  # Run an integrated implementation review after validation to decide whether remediation is needed.
  - id: integrated-review
    name: Integrated Review
    type: analysis
    skill: dartclaw-review-code
    continueSession: verify-refine
    prompt: |
      <project_index>
      {{context.project_index}}
      </project_index>

      <spec_document>
      {{context.spec_document}}
      </spec_document>

      <validation_summary>
      {{context.validation_summary}}
      </validation_summary>

      <diff_summary>
      {{context.diff_summary}}
      </diff_summary>
    contextInputs: [project_index, spec_document, validation_summary, diff_summary]
    contextOutputs: [review_findings, findings_count, integrated-review.findings_count]
    outputs:
      review_findings:
        format: json
        schema: verdict

  # Iterate remediation until both validation and re-review report a clean result or the loop is exhausted.
  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "integrated-review.findings_count > 0"
    exitGate: "re-review.findings_count == 0 && re-verify-refine.findings_count == 0"
    steps:
      # Apply fixes for the current set of integrated-review findings.
      - id: remediate
        name: Remediate Findings
        type: coding
        skill: dartclaw-remediate-findings
        project: "{{PROJECT}}"
        review: always
        prompt: |
          <project_index>
          {{context.project_index}}
          </project_index>

          <review_findings>
          {{context.review_findings}}
          </review_findings>

          <validation_summary>
          {{context.validation_summary}}
          </validation_summary>

          <spec_document>
          {{context.spec_document}}
          </spec_document>
        contextInputs: [project_index, spec_document, review_findings, validation_summary]
        contextOutputs: [remediation_summary, diff_summary]

      # Re-run validation after remediation to confirm the fixes hold.
      - id: re-verify-refine
        name: Re-validate Implementation
        type: coding
        skill: dartclaw-verify-refine
        project: "{{PROJECT}}"
        review: never
        continueSession: remediate
        prompt: |
          <project_index>
          {{context.project_index}}
          </project_index>

          <spec_document>
          {{context.spec_document}}
          </spec_document>

          <remediation_summary>
          {{context.remediation_summary}}
          </remediation_summary>

          <diff_summary>
          {{context.diff_summary}}
          </diff_summary>
        contextInputs: [project_index, spec_document, remediation_summary, diff_summary]
        contextOutputs: [validation_summary, findings_count, re-verify-refine.findings_count]

      # Re-check the remediated implementation against the specification baseline.
      - id: re-review
        name: Re-review Gaps
        type: analysis
        skill: dartclaw-review-gap
        continueSession: re-verify-refine
        prompt: |
          <project_index>
          {{context.project_index}}
          </project_index>

          <spec_document>
          {{context.spec_document}}
          </spec_document>

          <validation_summary>
          {{context.validation_summary}}
          </validation_summary>

          <remediation_summary>
          {{context.remediation_summary}}
          </remediation_summary>

          <diff_summary>
          {{context.diff_summary}}
          </diff_summary>
        contextInputs: [project_index, spec_document, validation_summary, remediation_summary, diff_summary]
        contextOutputs: [review_findings, findings_count, re-review.findings_count]
        outputs:
          review_findings:
            format: json
            schema: verdict

  # Record the finished workflow outcome in the project state document.
  - id: update-state
    name: Update State
    type: coding
    skill: dartclaw-update-state
    project: "{{PROJECT}}"
    prompt: |
      <project_index>
      {{context.project_index}}
      </project_index>

      <spec_document>
      {{context.spec_document}}
      </spec_document>

      <diff_summary>
      {{context.diff_summary}}
      </diff_summary>

      <remediation_summary>
      {{context.remediation_summary}}
      </remediation_summary>
    contextInputs: [project_index, spec_document, diff_summary, remediation_summary]
    contextOutputs: [state_update_summary]
