name: spec-and-implement
description: >-
  Full feature pipeline — discover the project, write a specification,
  implement it with exec-spec, run integrated review, and update state in
  authored order.
variables:
  FEATURE:
    required: true
    description: Feature description — what to build and why
  PROJECT:
    required: false
    description: Target project for coding steps (omit for default project)
  BRANCH:
    required: false
    description: Base branch/ref used for workflow bootstrap and comparisons
    default: "main"

gitStrategy:
  bootstrap: true
  worktree: shared
  publish:
    enabled: true

stepDefaults:
  # Literal matches (no `*`) are evaluated by equality — `spec` does NOT
  # catch `revise-spec`. The `revise*` match below owns `revise-spec` and
  # routes it to the reviewer provider since it runs the `dartclaw-review`
  # skill.
  - match: "spec"
    provider: "@planner"
    model: "@planner"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "revise*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "update-state"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  # Discover the project layout and document/state locations before authoring work starts.
  - id: discover-project
    name: Discover Project
    type: research
    skill: dartclaw-discover-project
    project: "{{PROJECT}}"
    allowedTools: [shell, file_read]
    contextOutputs: [project_index]
    outputs:
      project_index:
        format: json
        schema: project-index
        description: Normalized snapshot of the project layout — framework, root path, document locations, and state protocol.

  # Draft the initial implementation spec from the requested feature and
  # discovered project context. Also emits a 1-10 self-rated confidence
  # score; downstream review/revise steps are gated on this value so
  # high-confidence specs skip the review loop entirely.
  - id: spec
    name: Generate Specification
    type: writing
    skill: dartclaw-spec
    contextInputs: [project_index]
    contextOutputs: [spec_path, spec_source, spec_confidence]
    outputs:
      spec_path:
        format: path
        description: Workspace-relative path to the generated FIS on disk.
      spec_source:
        format: text
        description: "'existing' when the skill reused a spec, 'synthesized' when it wrote a new one."
      spec_confidence:
        format: json
        schema: non-negative-integer
        description: "Skill's self-rated 1-10 readiness of the synthesized FIS (per the Confidence Check in fis-authoring-guidelines.md). `0` when spec_source == existing (pass-through). `<7` triggers the revise-spec step."

  # Review-and-revise pass gated on the spec skill's own confidence score.
  # The `--fix` flag on dartclaw-review writes a doc-review report and
  # delegates remediation to dartclaw-remediate-findings in one invocation.
  # Skipped entirely when the spec was reused (spec_source == existing) or
  # when confidence is already >= 7.
  - id: revise-spec
    name: Revise Spec (low confidence)
    type: analysis
    skill: dartclaw-review
    entryGate: "spec_source == synthesized && spec_confidence < 7"
    project: "{{PROJECT}}"
    contextInputs: [project_index, spec_path, spec_confidence]
    allowedTools: [shell, file_read, file_write]
    prompt: "Review `{{context.spec_path}}` with `--mode doc --fix` (spec skill confidence {{context.spec_confidence}}/10)."
    contextOutputs: [spec_path]
    outputs:
      spec_path:
        format: path
        description: Pass-through of the FIS file path — same location, revised contents after the --fix pass.

  # Implement the feature against the on-disk specification.
  - id: implement
    name: Implement
    type: coding
    skill: dartclaw-exec-spec
    project: "{{PROJECT}}"
    contextInputs: [project_index, spec_path]
    contextOutputs: [diff_summary]
    outputs:
      diff_summary:
        format: text
        schema: diff-summary

  # Run an integrated implementation review to decide whether remediation is needed.
  # exec-spec is responsible for running analysis/tests/linting and fixing issues
  # before emitting a completed diff; this review inspects the resulting change set
  # holistically and hands any remaining findings to the remediation loop.
  - id: integrated-review
    name: Integrated Review
    type: analysis
    skill: dartclaw-review
    contextInputs: [project_index, spec_path, diff_summary]
    contextOutputs: [review_findings, integrated-review.findings_count]
    outputs:
      review_findings:
        format: json
        schema: verdict
        description: Summary of all issues identified during the review that require remediation.
      integrated-review.findings_count:
        format: json
        schema: non-negative-integer
        description: Number of issues flagged by the integrated review; 0 means the remediation loop can exit.

  # Iterate remediation until re-review reports a clean result or the loop is exhausted.
  # The remediation skill is responsible for running analysis/tests/linting on its
  # edits; re-review inspects the outcome and gates loop exit.
  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "integrated-review.findings_count > 0"
    exitGate: "re-review.findings_count == 0"
    steps:
      # Apply fixes for the current set of integrated-review findings.
      - id: remediate
        name: Remediate Findings
        type: coding
        skill: dartclaw-remediate-findings
        project: "{{PROJECT}}"
        contextInputs: [project_index, spec_path, review_findings]
        contextOutputs: [remediation_summary, diff_summary]
        outputs:
          remediation_summary:
            format: text
            schema: remediation-summary
          diff_summary:
            format: text
            schema: diff-summary

      # Re-check the remediated implementation against the specification baseline.
      - id: re-review
        name: Re-review Gaps
        type: analysis
        skill: dartclaw-quick-review
        contextInputs: [project_index, spec_path, remediation_summary, diff_summary]
        contextOutputs: [review_findings, re-review.findings_count]
        outputs:
          review_findings:
            format: json
            schema: verdict
            description: Summary of all issues identified during the review that require remediation.
          re-review.findings_count:
            format: json
            schema: non-negative-integer
            description: Number of remaining issues after this re-review; 0 exits the remediation loop.

  # Record the finished workflow outcome in the project state document.
  - id: update-state
    name: Update State
    type: coding
    skill: dartclaw-update-state
    project: "{{PROJECT}}"
    contextInputs: [project_index, spec_path, diff_summary]
    contextOutputs: [state_update_summary]
    outputs:
      state_update_summary:
        format: text
        schema: state-update-summary
