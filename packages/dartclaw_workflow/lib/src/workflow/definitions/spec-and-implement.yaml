name: spec-and-implement
description: >-
  Full feature pipeline — discover the project, write a specification,
  review and remediate it, implement it with exec-spec, run integrated review,
  and update state in authored order.
variables:
  FEATURE:
    required: true
    description: Feature description — what to build and why
  PROJECT:
    required: false
    description: Target project for coding steps (omit for default project)
  BRANCH:
    required: false
    description: Base branch/ref used for workflow bootstrap and comparisons
    default: "main"

gitStrategy:
  bootstrap: true
  worktree: shared
  promotion: merge
  finalReview: true
  publish:
    enabled: true
  cleanup: preserve-on-failure

stepDefaults:
  - match: "spec"
    provider: "@planner"
    model: "@planner"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*verify*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "update-state"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  - id: discover-project
    name: Discover Project
    type: research
    skill: dartclaw-discover-project
    project: "{{PROJECT}}"
    allowedTools: [shell, file_read]
    prompt: |
      Branch: {{BRANCH}}
    contextOutputs: [project_index]
    outputs:
      project_index:
        format: json
        schema:
          type: object
          required: [framework, project_root, document_locations, state_protocol]
          properties:
            framework:
              type: string
            project_root:
              type: string
            document_locations:
              type: object
            state_protocol:
              type: object

  - id: spec
    name: Generate Specification
    type: writing
    skill: dartclaw-spec
    contextInputs: [project_index]
    prompt: |
      Feature: {{FEATURE}}
      Branch: {{BRANCH}}

      Project index:
      {{context.project_index}}
    contextOutputs: [spec_document, acceptance_criteria]

  - id: review-spec
    name: Review Spec
    type: analysis
    skill: dartclaw-review-doc
    prompt: |
      Feature: {{FEATURE}}
      Branch: {{BRANCH}}
      Project index:
      {{context.project_index}}
      Specification:
      {{context.spec_document}}
      Acceptance criteria:
      {{context.acceptance_criteria}}
    contextInputs: [project_index, spec_document, acceptance_criteria]
    contextOutputs: [review_findings]
    outputs:
      review_findings:
        format: json
        schema: verdict

  - id: implement
    name: Implement
    type: coding
    skill: dartclaw-exec-spec
    project: "{{PROJECT}}"
    review: always
    prompt: |
      Project index:
      {{context.project_index}}

      Specification:
      {{context.spec_document}}

      Acceptance criteria:
      {{context.acceptance_criteria}}
    contextInputs: [project_index, spec_document, acceptance_criteria]
    contextOutputs: [diff_summary]
    outputs:
      diff_summary:
        format: text

  - id: verify-refine
    name: Validate Implementation
    type: coding
    skill: dartclaw-verify-refine
    project: "{{PROJECT}}"
    review: never
    prompt: |
      Project index:
      {{context.project_index}}

      Specification:
      {{context.spec_document}}

      Implementation diff:
      {{context.diff_summary}}
    contextInputs: [project_index, diff_summary, spec_document]
    contextOutputs: [validation_summary, findings_count, verify-refine.findings_count]

  - id: integrated-review
    name: Integrated Review
    type: analysis
    skill: dartclaw-review-code
    prompt: |
      Project index:
      {{context.project_index}}

      Specification:
      {{context.spec_document}}

      Validation summary:
      {{context.validation_summary}}

      Acceptance criteria:
      {{context.acceptance_criteria}}

      Implementation diff:
      {{context.diff_summary}}
    contextInputs: [project_index, spec_document, validation_summary, acceptance_criteria, diff_summary]
    contextOutputs: [review_findings, findings_count, integrated-review.findings_count]
    outputs:
      review_findings:
        format: json
        schema: verdict

  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "integrated-review.findings_count > 0"
    exitGate: "re-review.findings_count == 0 && re-verify-refine.findings_count == 0"
    steps:
      - id: remediate
        name: Remediate Findings
        type: coding
        skill: dartclaw-remediate-findings
        project: "{{PROJECT}}"
        review: always
        prompt: |
          Project index:
          {{context.project_index}}

          Integrated review findings:
          {{context.review_findings}}

          Validation summary:
          {{context.validation_summary}}

          Specification:
          {{context.spec_document}}
        contextInputs: [project_index, spec_document, review_findings, validation_summary]
        contextOutputs: [remediation_summary, diff_summary]

      - id: re-verify-refine
        name: Re-validate Implementation
        type: coding
        skill: dartclaw-verify-refine
        project: "{{PROJECT}}"
        review: never
        prompt: |
          Project index:
          {{context.project_index}}

          Specification:
          {{context.spec_document}}

          Remediation summary:
          {{context.remediation_summary}}

          Updated diff summary:
          {{context.diff_summary}}
        contextInputs: [project_index, spec_document, remediation_summary, diff_summary]
        contextOutputs: [validation_summary, findings_count, re-verify-refine.findings_count]

      - id: re-review
        name: Re-review Gaps
        type: analysis
        skill: dartclaw-review-gap
        prompt: |
          Project index:
          {{context.project_index}}

          Requirements baseline:
          {{context.spec_document}}

          Acceptance criteria:
          {{context.acceptance_criteria}}

          Re-validation summary:
          {{context.validation_summary}}

          Remediation summary:
          {{context.remediation_summary}}

          Updated diff summary:
          {{context.diff_summary}}
        contextInputs: [project_index, spec_document, acceptance_criteria, validation_summary, remediation_summary, diff_summary]
        contextOutputs: [review_findings, findings_count, re-review.findings_count]
        outputs:
          review_findings:
            format: json
            schema: verdict

  - id: update-state
    name: Update State
    type: coding
    skill: dartclaw-update-state
    project: "{{PROJECT}}"
    prompt: |
      Project index:
      {{context.project_index}}

      Specification:
      {{context.spec_document}}

      Implementation summary:
      {{context.diff_summary}}

      Remediation summary:
      {{context.remediation_summary}}
    contextInputs: [project_index, spec_document, diff_summary, remediation_summary]
    contextOutputs: [state_update_summary]
