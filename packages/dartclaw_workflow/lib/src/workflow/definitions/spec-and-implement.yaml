name: spec-and-implement
description: >-
  Full feature pipeline — discover the project, write a specification,
  implement it with exec-spec, run integrated review, and update state in
  authored order.
variables:
  FEATURE:
    required: true
    description: Feature description — what to build and why
  PROJECT:
    required: false
    description: Target project for coding steps (omit for default project)
  BRANCH:
    required: false
    description: Base branch/ref used for workflow bootstrap and comparisons
    default: "main"

gitStrategy:
  bootstrap: true
  worktree: shared
  promotion: merge
  publish:
    enabled: true

stepDefaults:
  - match: "spec"
    provider: "@planner"
    model: "@planner"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*verify*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "update-state"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  # Discover the project layout and document/state locations before authoring work starts.
  - id: discover-project
    name: Discover Project
    type: research
    skill: dartclaw-discover-project
    project: "{{PROJECT}}"
    allowedTools: [shell, file_read]
    contextOutputs: [project_index]
    outputs:
      project_index:
        format: json
        schema: project-index
        description: Normalized snapshot of the project layout — framework, root path, document locations, and state protocol.

  # Draft the initial implementation spec from the requested feature and discovered project context.
  - id: spec
    name: Generate Specification
    type: writing
    skill: dartclaw-spec
    contextInputs: [project_index]
    contextOutputs: [spec_path, spec_source]
    outputs:
      spec_path:
        format: path
        description: Workspace-relative path to the generated FIS on disk.
      spec_source:
        format: text
        description: "'existing' when the skill reused a spec, 'synthesized' when it wrote a new one."

  # Implement the feature against the on-disk specification.
  - id: implement
    name: Implement
    type: coding
    skill: dartclaw-exec-spec
    project: "{{PROJECT}}"
    review: always
    contextInputs: [project_index, spec_path]
    contextOutputs: [diff_summary]
    outputs:
      diff_summary:
        format: text
        schema: diff-summary

  # Validate the implementation and capture any remaining findings.
  - id: verify-refine
    name: Validate Implementation
    type: coding
    skill: dartclaw-verify-refine
    project: "{{PROJECT}}"
    review: never
    continueSession: implement
    contextInputs: [project_index, diff_summary, spec_path]
    contextOutputs: [validation_summary]
    outputs:
      validation_summary:
        format: text
        schema: validation-summary

  # Run an integrated implementation review after validation to decide whether remediation is needed.
  - id: integrated-review
    name: Integrated Review
    type: analysis
    skill: dartclaw-review-gap
    contextInputs: [project_index, spec_path, validation_summary, diff_summary]
    contextOutputs: [review_findings, findings_count, integrated-review.findings_count]
    outputs:
      review_findings:
        format: json
        schema: verdict
        description: Summary of all issues identified during the review that require remediation. 
      findings_count:
        format: json
        schema: non-negative-integer
        description: Number of issues flagged by the integrated review; 0 means the remediation loop can exit.
      integrated-review.findings_count:
        format: json
        schema: non-negative-integer
        description: Step-scoped copy of the integrated review findings count used by remediation loop gates.

  # Iterate remediation until both validation and re-review report a clean result or the loop is exhausted.
  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "integrated-review.findings_count > 0"
    exitGate: "re-review.findings_count == 0 && re-verify-refine.findings_count == 0"
    steps:
      # Apply fixes for the current set of integrated-review findings.
      - id: remediate
        name: Remediate Findings
        type: coding
        skill: dartclaw-remediate-findings
        project: "{{PROJECT}}"
        review: always
        contextInputs: [project_index, spec_path, review_findings]
        contextOutputs: [remediation_summary, diff_summary]
        outputs:
          remediation_summary:
            format: text
            schema: remediation-summary
          diff_summary:
            format: text
            schema: diff-summary

      # Re-run validation after remediation to confirm the fixes hold.
      - id: re-verify-refine
        name: Re-validate Implementation
        type: coding
        skill: dartclaw-verify-refine
        project: "{{PROJECT}}"
        review: never
        continueSession: remediate
        contextInputs: [project_index, spec_path, remediation_summary, diff_summary]
        contextOutputs: [validation_summary, findings_count, re-verify-refine.findings_count]
        outputs:
          validation_summary:
            format: text
            schema: validation-summary
          findings_count:
            format: json
            schema: non-negative-integer
            description: Number of validation findings after remediation.
          re-verify-refine.findings_count:
            format: json
            schema: non-negative-integer
            description: Step-scoped copy of the remediation validation findings count used by loop gates.

      # Re-check the remediated implementation against the specification baseline.
      - id: re-review
        name: Re-review Gaps
        type: analysis
        skill: dartclaw-quick-review
        contextInputs: [project_index, spec_path, validation_summary, remediation_summary, diff_summary]
        contextOutputs: [review_findings, findings_count, re-review.findings_count]
        outputs:
          review_findings:
            format: json
            schema: verdict
            description: Summary of all issues identified during the review that require remediation. 
          findings_count:
            format: json
            schema: non-negative-integer
            description: Number of remaining issues after this re-review; 0 contributes to exiting the remediation loop.
          re-review.findings_count:
            format: json
            schema: non-negative-integer
            description: Step-scoped copy of the re-review findings count used by remediation loop gates.

  # Record the finished workflow outcome in the project state document.
  - id: update-state
    name: Update State
    type: coding
    skill: dartclaw-update-state
    project: "{{PROJECT}}"
    contextInputs: [project_index, spec_path, diff_summary]
    contextOutputs: [state_update_summary]
    outputs:
      state_update_summary:
        format: text
        schema: state-update-summary
