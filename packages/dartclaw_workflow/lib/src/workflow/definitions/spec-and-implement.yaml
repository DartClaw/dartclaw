name: spec-and-implement
description: >-
  Full feature pipeline — discover the project, write a specification,
  approve it, implement it with exec-spec, analyze gaps, iterate remediation,
  and update state in authored order.
variables:
  FEATURE:
    required: true
    description: Feature description — what to build and why
  PROJECT:
    required: false
    description: Target project for coding steps (omit for default project)
  BASE_BRANCH:
    required: false
    description: Base branch used for validation context and comparisons
    default: "main"

stepDefaults:
  - match: "implement*"
    provider: claude
  - match: "review*"
    model: claude-opus-4
  - match: "*"
    provider: claude

steps:
  - id: discover-project
    name: Discover Project
    type: research
    skill: dartclaw-discover-project
    prompt: |
      Feature: {{FEATURE}}
      Base branch: {{BASE_BRANCH}}
    contextOutputs: [project_index]
    outputs:
      project_index:
        format: json
        schema:
          type: object
          required: [framework, project_root, document_locations, state_protocol]
          properties:
            framework:
              type: string
            project_root:
              type: string
            document_locations:
              type: object
            state_protocol:
              type: object

  - id: spec
    name: Generate Specification
    type: writing
    skill: dartclaw-spec
    contextInputs: [project_index]
    prompt: |
      Feature: {{FEATURE}}
      Base branch: {{BASE_BRANCH}}

      Project index:
      {{context.project_index}}

      For workflow handoff, end with `## Context Output` and a JSON object with:
      - spec_document
      - acceptance_criteria
    contextOutputs: [spec_document, acceptance_criteria]

  - id: approve-spec
    name: Approve Spec
    type: approval
    prompt: |
      Approve the specification before implementation.

      Reject if the scope is unclear, the acceptance criteria are not binary-testable,
      or the project index does not match the discovered framework.
    contextInputs: [project_index, spec_document, acceptance_criteria]

  - id: implement
    name: Implement
    type: coding
    skill: dartclaw-exec-spec
    project: "{{PROJECT}}"
    review: always
    prompt: |
      Project index:
      {{context.project_index}}

      Specification:
      {{context.spec_document}}

      Acceptance criteria:
      {{context.acceptance_criteria}}

      For workflow handoff, end with `## Context Output` and a JSON object with:
      - diff_summary
    contextInputs: [project_index, spec_document, acceptance_criteria]
    contextOutputs: [diff_summary]
    outputs:
      diff_summary:
        format: text

  - id: review-code
    name: Review Code
    type: analysis
    skill: dartclaw-review-code
    prompt: |
      Review this implementation comprehensively for correctness, security, and architecture.

      Project index:
      {{context.project_index}}

      Specification:
      {{context.spec_document}}

      Acceptance criteria:
      {{context.acceptance_criteria}}

      Implementation diff:
      {{context.diff_summary}}
    contextInputs: [project_index, spec_document, acceptance_criteria, diff_summary]
    contextOutputs: [review_findings]
    outputs:
      review_findings:
        format: json
        schema: verdict

  - id: gap-analysis
    name: Gap Analysis
    type: analysis
    skill: dartclaw-review-gap
    prompt: |
      Project index:
      {{context.project_index}}

      Requirements baseline:
      {{context.spec_document}}

      Acceptance criteria:
      {{context.acceptance_criteria}}

      Code review findings:
      {{context.review_findings}}

      Diff summary:
      {{context.diff_summary}}

      For workflow handoff, end with `## Context Output` and a JSON object with:
      - gap_report
      - needs_remediation
    contextInputs: [project_index, spec_document, acceptance_criteria, review_findings, diff_summary]
    contextOutputs: [gap_report, needs_remediation]

  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    exitGate: "re-review.findings_count == 0"
    steps:
      - id: remediate
        name: Remediate Findings
        type: coding
        skill: dartclaw-remediate-findings
        project: "{{PROJECT}}"
        review: always
        prompt: |
          Project index:
          {{context.project_index}}

          Gap report:
          {{context.gap_report}}

          Specification:
          {{context.spec_document}}

          Code review findings:
          {{context.review_findings}}

          If no remediation is needed, say so plainly.
          For workflow handoff, end with `## Context Output` and a JSON object with:
          - remediation_summary
          - diff_summary
        contextInputs: [project_index, gap_report, spec_document, review_findings]
        contextOutputs: [remediation_summary, diff_summary]

      - id: re-review
        name: Re-review Gaps
        type: analysis
        skill: dartclaw-review-gap
        prompt: |
          Project index:
          {{context.project_index}}

          Requirements baseline:
          {{context.spec_document}}

          Acceptance criteria:
          {{context.acceptance_criteria}}

          Original gap report:
          {{context.gap_report}}

          Remediation summary:
          {{context.remediation_summary}}

          Updated diff summary:
          {{context.diff_summary}}

          For workflow handoff, end with `## Context Output` and a JSON object with:
          - findings_count
        contextInputs: [project_index, spec_document, acceptance_criteria, gap_report, remediation_summary, diff_summary]
        contextOutputs: [findings_count]

  - id: update-state
    name: Update State
    type: coding
    skill: dartclaw-update-state
    project: "{{PROJECT}}"
    prompt: |
      Project index:
      {{context.project_index}}

      Specification:
      {{context.spec_document}}

      Implementation summary:
      {{context.diff_summary}}

      Remediation summary:
      {{context.remediation_summary}}

      End with `## Context Output` and a JSON object with:
      - state_update_summary
    contextInputs: [project_index, spec_document, diff_summary, remediation_summary]
    contextOutputs: [state_update_summary]
