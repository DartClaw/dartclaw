name: spec-and-implement
description: >-
  Full feature pipeline — discover the project, write a specification,
  implement it with exec-spec, and run integrated review in authored order.
variables:
  FEATURE:
    required: true
    description: Feature description — what to build and why
  PROJECT:
    required: false
    description: Target project for coding steps (omit for default project)
  BRANCH:
    required: false
    description: Base branch/ref used for workflow bootstrap and comparisons
    default: ""

project: "{{PROJECT}}"

gitStrategy:
  bootstrap: true
  worktree: shared
  promotion: merge
  publish:
    enabled: true
  merge_resolve:
    enabled: true
    max_attempts: 2
    token_ceiling: 100000
    escalation: serialize-remaining

stepDefaults:
  - match: "spec"
    provider: "@planner"
    model: "@planner"
  - match: "revise*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "implement*"
    provider: "@executor"
    model: "@executor"
  - match: "*review*"
    provider: "@reviewer"
    model: "@reviewer"
  - match: "remediate"
    provider: "@executor"
    model: "@executor"
  - match: "*"
    provider: "@workflow"
    model: "@workflow"

steps:
  # Discover the project layout and document/state locations before authoring work starts.
  # When FEATURE is already a path to an existing spec/FIS file in this project,
  # discover-project emits it as `spec_path` and marks `spec_source` as
  # `existing` so the next step can skip spec authoring.
  - id: discover-project
    name: Discover Project
    skill: dartclaw-discover-project
    # read-only: discovers project layout, no writes — narrow surface preserves
    # step_config_policy.stepIsReadOnly inference (file_write non-membership).
    allowedTools: [shell, file_read]
    workflowVariables: [FEATURE]
    outputs:
      project_index:
        format: json
        schema: project-index
        description: Normalized snapshot of the project layout, active artifacts, and state protocol.
      spec_path:
        format: path
        description: Workspace-relative path to the FIS on disk — pre-authored (if FEATURE resolves to one) or freshly synthesized by the spec step.
      spec_source:
        format: text
        description: "'existing' when the skill reused a spec, 'synthesized' when it wrote a new one."

  # Draft the initial implementation spec from the requested feature and
  # discovered project context. Also emits a 1-10 self-rated confidence
  # score; downstream review/revise steps are gated on this value so
  # high-confidence specs skip the review loop entirely. Skipped entirely
  # when discover-project already marked `spec_source` as `existing`.
  - id: spec
    name: Generate Specification
    skill: dartclaw-spec
    entryGate: "spec_source == synthesized"
    inputs: [project_index]
    workflowVariables: [FEATURE]
    prompt: "--auto {{FEATURE}}"
    outputs:
      spec_path:
        format: path
        description: Workspace-relative path to the FIS on disk — pre-authored (if FEATURE resolves to one) or freshly synthesized by the spec step.
      spec_source:
        format: text
        description: "'existing' when the skill reused a spec, 'synthesized' when it wrote a new one."
      spec_confidence:
        format: json
        schema: non-negative-integer
        description: "Skill's self-rated 1-10 readiness of the synthesized FIS (per the Confidence Check in fis-authoring-guidelines.md). `0` when spec_source == existing (pass-through). `<7` triggers the revise-spec step."

  # Review-and-revise pass gated on the spec skill's own confidence score.
  # The `--fix` flag on dartclaw-review writes a doc-review report and
  # delegates remediation to dartclaw-remediate-findings in one invocation.
  # Skipped entirely when the spec was reused (spec_source == existing) or
  # when confidence is already >= 7.
  - id: revise-spec
    name: Revise Spec (low confidence)
    skill: dartclaw-review
    entryGate: "spec_source == synthesized && spec_confidence < 7"
    inputs: [project_index, spec_path, spec_confidence]
    prompt: "--mode doc --fix --auto {{context.spec_path}}"
    # revise-spec modifies the FIS file in place at the same path. No new
    # context value is produced — downstream steps continue reading
    # {{context.spec_path}} written by the spec step, which now points at the
    # revised file contents.

  # Implement the feature against the on-disk specification.
  - id: implement
    name: Implement
    skill: dartclaw-exec-spec
    inputs: [project_index, spec_path]
    prompt: "--auto {{context.spec_path}}"
    outputs:
      diff_summary:
        format: text
        schema: diff-summary

  # Run an integrated implementation review to decide whether remediation is needed.
  # exec-spec is responsible for running analysis/tests/linting and fixing issues
  # before emitting a completed diff; this review inspects the resulting change set
  # holistically and hands any remaining findings to the remediation loop.
  - id: integrated-review
    name: Integrated Review
    skill: dartclaw-review
    parallel: true
    # read-only review: file_write absent preserves step_config_policy's
    # read-only inference. shell/web_fetch/mcp_call enable `git diff`,
    # `dart analyze`, doc lookup, and MCP-routed checks.
    allowedTools: [shell, file_read, web_fetch, mcp_call]
    inputs: [project_index, spec_path, diff_summary]
    prompt: "--mode gap,code --auto {{context.spec_path}}"
    outputs:
      review_findings:
        format: json
        schema: verdict
        description: Summary of all issues identified during the review that require remediation.
      integrated-review.findings_count:
        format: json
        schema: non-negative-integer
        description: Number of issues flagged by the integrated review; 0 means the remediation loop can exit.
      integrated-review.gating_findings_count:
        format: json
        schema: non-negative-integer
        description: "Count of MEDIUM-or-higher severity findings (per the unified severity scale in references/review-verdict.md). 0 means only LOW-severity findings remain — the remediation loop reads this field to decide whether to iterate."

  - id: architecture-review
    name: Architecture Review
    skill: dartclaw-architecture
    parallel: true
    inputs: [project_index, spec_path, diff_summary]
    # File-backed review: the step writes a review report artifact and emits
    # its workspace-relative path, so it needs a project worktree and file_write.
    allowedTools: [shell, file_read, file_write, web_fetch, mcp_call]
    prompt: "--mode review --auto {{context.spec_path}}. Scope the review to changes introduced on the current branch (vs the base ref) — skip packages untouched by this spec."
    outputs:
      architecture_review_findings:
        format: path
        description: Workspace-relative path to the architecture review report file written by dartclaw-architecture.
      architecture-review.findings_count:
        format: json
        schema: non-negative-integer
        description: Number of architecture findings; combined with integrated-review.findings_count to gate the remediation loop.
      architecture-review.gating_findings_count:
        format: json
        schema: non-negative-integer
        description: "Count of MEDIUM-or-higher severity findings (per the unified severity scale in references/review-verdict.md). 0 means only LOW-severity findings remain — the remediation loop reads this field to decide whether to iterate."

  # Iterate remediation until re-review reports a clean result or the loop is exhausted.
  # The remediation skill is responsible for running analysis/tests/linting on its
  # edits; re-review inspects the outcome and gates loop exit.
  - id: remediation-loop
    name: Remediation Loop
    type: loop
    maxIterations: 3
    entryGate: "integrated-review.gating_findings_count > 0 || architecture-review.gating_findings_count > 0"
    exitGate: "re-review.gating_findings_count == 0"
    steps:
      # Apply fixes for the current set of integrated-review findings.
      - id: remediate
        name: Remediate Findings
        skill: dartclaw-remediate-findings
        inputs: [project_index, spec_path, review_findings, architecture_review_findings]
        prompt: "--auto {{context.review_findings}} {{context.architecture_review_findings}}"
        outputs:
          remediation_summary:
            format: text
            schema: remediation-summary
          diff_summary:
            format: text
            schema: diff-summary

      # Re-check the remediated implementation against the specification baseline.
      - id: re-review
        name: Re-review Gaps
        skill: dartclaw-quick-review
        # read-only review: matches integrated-review's surface.
        allowedTools: [shell, file_read, web_fetch, mcp_call]
        inputs: [project_index, spec_path, remediation_summary, diff_summary]
        prompt: "--auto {{context.spec_path}}"
        outputs:
          review_findings:
            format: json
            schema: verdict
            description: Summary of all issues identified during the review that require remediation.
          re-review.findings_count:
            format: json
            schema: non-negative-integer
            description: Number of remaining issues after this re-review; 0 exits the remediation loop.
          re-review.gating_findings_count:
            format: json
            schema: non-negative-integer
            description: "Count of MEDIUM-or-higher severity findings (per the unified severity scale in references/review-verdict.md). 0 means only LOW-severity findings remain — the remediation loop reads this field to decide whether to iterate."
