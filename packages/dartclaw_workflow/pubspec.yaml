name: dartclaw_workflow
description: Unified DartClaw workflow parsing, validation, registry, and execution utilities.
publish_to: none
version: 0.16.0
repository: https://github.com/DartClaw/dartclaw/tree/main/packages/dartclaw_workflow
homepage: https://github.com/DartClaw/dartclaw
issue_tracker: https://github.com/DartClaw/dartclaw/issues
topics:
  - ai
  - cli
  - agents
  - workflows

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  dartclaw_config:
    path: ../dartclaw_config
  dartclaw_core:
    path: ../dartclaw_core
  dartclaw_models:
    path: ../dartclaw_models
  dartclaw_security:
    path: ../dartclaw_security
  dartclaw_storage:
    path: ../dartclaw_storage
  logging: ^1.3.0
  path: ^1.9.1
  uuid: ^4.5.3
  yaml: ^3.1.3

dev_dependencies:
  dartclaw_cli:
    path: ../../apps/dartclaw_cli
  dartclaw_server:
    path: ../dartclaw_server
  dartclaw_testing:
    path: ../dartclaw_testing
  fake_async: ^1.3.3
  sqlite3: ^3.1.6
  test: ^1.31.0
  lints: ^6.1.0
